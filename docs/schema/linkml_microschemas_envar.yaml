name: linkml-microschemas-envar
description: "LinkML microschemas for environmental exposure variables (EnVar). Initial\n\
  scope: heat-related exposures (Tmax, WBGT, heat index, heat-wave flags)\nand the\
  \ surrounding provenance metadata needed to load them into OMOP\nexternal_exposure\
  \ with full reproducibility.\n\nThis umbrella schema imports the fourteen modules\
  \ that together define the\nEnVar metadata layer:\n\n  - envar_common         shared\
  \ enums and slots\n  - envar_variable       variable identity (CF, UCUM, target-vocab\
  \ concept, ECTO, ENVO)\n  - envar_layout         data layout (column bindings into\
  \ the companion data file)\n  - envar_spatial        spatial reference, extraction\n\
  \  - envar_temporal       temporal reference, day-boundary convention\n  - envar_source\
  \         upstream source dataset\n  - envar_model          exposure model character\n\
  \  - envar_uncertainty    uncertainty and quality\n  - envar_linkage        gridded-to-patient\
  \ linkage\n  - envar_toolrun        tool run and W3C-PROV provenance chain\n  -\
  \ envar_heat_metric    derived heat metrics (WBGT, HI, UTCI, heat-wave)\n  - envar_health_layer\
  \   health-data-layer linkage (OMOP, BDC, …) and FAIR deposit\n  - envar_record\
  \         the top EnvironmentalExposureRecord composite\n  - envar_examples    \
  \   concrete record subclasses (Tmax, Tmin, WBGT, EHD)"
title: EnVar Microschemas — Umbrella Schema
id: https://w3id.org/linkml/microschemas/envar
version: 0.1.0
license: Apache-2.0
prefixes:
  envar:
    prefix_prefix: envar
    prefix_reference: https://w3id.org/linkml/microschemas/envar/
  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  xsd:
    prefix_prefix: xsd
    prefix_reference: http://www.w3.org/2001/XMLSchema#
  shex:
    prefix_prefix: shex
    prefix_reference: http://www.w3.org/ns/shex#
  schema:
    prefix_prefix: schema
    prefix_reference: http://schema.org/
  dcterms:
    prefix_prefix: dcterms
    prefix_reference: http://purl.org/dc/terms/
  prov:
    prefix_prefix: prov
    prefix_reference: http://www.w3.org/ns/prov#
  CF:
    prefix_prefix: CF
    prefix_reference: http://vocab.nerc.ac.uk/standard_name/
  UCUM:
    prefix_prefix: UCUM
    prefix_reference: https://ucum.org/
  ECTO:
    prefix_prefix: ECTO
    prefix_reference: http://purl.obolibrary.org/obo/ECTO_
  ENVO:
    prefix_prefix: ENVO
    prefix_reference: http://purl.obolibrary.org/obo/ENVO_
  LOINC:
    prefix_prefix: LOINC
    prefix_reference: https://loinc.org/
  SNOMED:
    prefix_prefix: SNOMED
    prefix_reference: http://snomed.info/id/
  SPDX:
    prefix_prefix: SPDX
    prefix_reference: https://spdx.org/licenses/
  EPSG:
    prefix_prefix: EPSG
    prefix_reference: https://epsg.io/
  ENVAR:
    prefix_prefix: ENVAR
    prefix_reference: https://w3id.org/linkml/microschemas/envar/vocab/
  msprofile:
    prefix_prefix: msprofile
    prefix_reference: https://w3id.org/linkml/linkml-microschema-profile/
default_prefix: envar
default_range: string
types:
  string:
    name: string
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string. If you are authoring schemas in LinkML YAML, the type is referenced
      with the lower case "string".
    from_schema: https://w3id.org/linkml/microschemas/envar
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/microschemas/envar
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/microschemas/envar
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/microschemas/envar
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/microschemas/envar
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/microschemas/envar
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/microschemas/envar
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/microschemas/envar
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/microschemas/envar
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/microschemas/envar
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/microschemas/envar
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/microschemas/envar
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/microschemas/envar
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/microschemas/envar
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/microschemas/envar
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/microschemas/envar
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/microschemas/envar
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/microschemas/envar
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/microschemas/envar
    base: str
    uri: xsd:string
    repr: str
enums:
  MissingReasonEnum:
    name: MissingReasonEnum
    description: Controlled reasons that a slot value is missing. Distinguishes a
      slot the source genuinely does not produce (terminal) from one we could extract
      but did not (roadmap) from a bug in the chain.
    title: Missing-Value Reason
    from_schema: https://w3id.org/linkml/microschemas/envar
    permissible_values:
      not_provided_by_source:
        text: not_provided_by_source
        description: Source product does not produce this information. Terminal.
      available_but_not_extracted:
        text: available_but_not_extracted
        description: Source produces this information but the current pipeline does
          not surface it. Roadmap item.
      upstream_data_not_propagated:
        text: upstream_data_not_propagated
        description: An upstream tool emitted this information but the current pipeline
          dropped it on the way through. Bug.
      under_investigation:
        text: under_investigation
        description: We are working on populating this slot.
      not_applicable:
        text: not_applicable
        description: This slot does not apply to this variable / record.
  DataTypeEnum:
    name: DataTypeEnum
    description: The data type of an exposure value.
    title: Value Data Type
    from_schema: https://w3id.org/linkml/microschemas/envar
    permissible_values:
      continuous_numeric:
        text: continuous_numeric
        description: Continuous numeric value (e.g. temperature in °C).
      categorical:
        text: categorical
        description: Categorical value (e.g. land-use class).
      binary_flag:
        text: binary_flag
        description: Binary flag (e.g. extreme-heat-day yes/no).
      count:
        text: count
        description: Integer count (e.g. consecutive heat days).
      event_marker:
        text: event_marker
        description: Date-stamped event (e.g. wildfire smoke plume).
  PhiStatusEnum:
    name: PhiStatusEnum
    description: PHI content of the sidecar.
    title: PHI Status
    from_schema: https://w3id.org/linkml/microschemas/envar
    permissible_values:
      no_phi:
        text: no_phi
        description: The sidecar carries no PHI.
      aggregated_no_phi:
        text: aggregated_no_phi
        description: The sidecar carries aggregated values with no PHI.
      phi_present:
        text: phi_present
        description: The sidecar carries PHI. Should never happen; sidecars are by
          design PHI-free.
  ConceptStatusEnum:
    name: ConceptStatusEnum
    description: Status of a variable's representation in the target health-data vocabulary
      named by `target_concept_vocabulary` (e.g. the OHDSI Standardised Vocabulary,
      the BioData Catalyst model). `existing` = a concept id is available now; `proposed`
      = a submission is in flight; `gap` = no concept exists and none is proposed.
    title: Concept Status
    from_schema: https://w3id.org/linkml/microschemas/envar
    see_also:
    - https://athena.ohdsi.org/
    - https://biodatacatalyst.nhlbi.nih.gov/
    permissible_values:
      existing:
        text: existing
        description: A concept id is available in the target vocabulary.
      proposed:
        text: proposed
        description: A concept submission is in flight.
      gap:
        text: gap
        description: No concept exists yet and none is yet proposed.
  TableOrientationEnum:
    name: TableOrientationEnum
    description: How variables map onto columns in the companion data file.
    title: Table Orientation
    from_schema: https://w3id.org/linkml/microschemas/envar
    permissible_values:
      wide:
        text: wide
        description: One column per variable; column name identifies the variable.
      long:
        text: long
        description: One shared value column; the variable is discriminated by a row
          value in a variable column (tidy format).
  ExtractionMethodEnum:
    name: ExtractionMethodEnum
    description: How a gridded value was extracted at a target location.
    title: Extraction Method
    from_schema: https://w3id.org/linkml/microschemas/envar
    permissible_values:
      nearest_cell:
        text: nearest_cell
        description: Take the value from the single nearest grid cell.
      bilinear:
        text: bilinear
        description: Bilinear interpolation of the four nearest cells.
      inverse_distance_weighted_4_nearest_cells:
        text: inverse_distance_weighted_4_nearest_cells
        description: Inverse-distance-weighted average of the 4 nearest cells. Default
          for DeGAUSS `daymet` and `narr`.
      area_weighted_polygon_mean:
        text: area_weighted_polygon_mean
        description: Area-weighted mean of cells overlapping a polygon.
      population_weighted_mean:
        text: population_weighted_mean
        description: Population-weighted mean over a target geography (e.g. tract).
      point_station_lookup:
        text: point_station_lookup
        description: Direct lookup at a point station observation.
  TargetGeographyTypeEnum:
    name: TargetGeographyTypeEnum
    description: Geographic unit the exposure is attached to.
    title: Target Geography Type
    from_schema: https://w3id.org/linkml/microschemas/envar
    see_also:
    - https://www.census.gov/programs-surveys/geography/guidance/geo-areas.html
    - https://h3geo.org/
    permissible_values:
      point_residence:
        text: point_residence
        description: Attached to the patient's exact lat / lon.
      census_block_group:
        text: census_block_group
        description: US Census Block Group.
      census_tract:
        text: census_tract
        description: US Census Tract.
      zcta:
        text: zcta
        description: ZIP Code Tabulation Area.
      county:
        text: county
        description: US County (FIPS).
      h3_hex:
        text: h3_hex
        description: H3 hexagon at some resolution. Resolution captured separately.
      public_water_system:
        text: public_water_system
        description: Public water system service area polygon.
  TemporalResolutionEnum:
    name: TemporalResolutionEnum
    description: Native temporal grain of the source product.
    title: Temporal Resolution
    from_schema: https://w3id.org/linkml/microschemas/envar
    permissible_values:
      instantaneous:
        text: instantaneous
        description: Instantaneous snapshot at a timestamp.
      hourly:
        text: hourly
        description: One value per hour.
      three_hourly:
        text: three_hourly
        description: One value per 3-hour window (NARR sub-daily).
        title: 3-hourly
      daily:
        text: daily
        description: One value per day.
      monthly:
        text: monthly
        description: One value per calendar month.
      seasonal:
        text: seasonal
        description: One value per season (3-month window).
      annual:
        text: annual
        description: One value per year.
  TemporalAggregationMethodEnum:
    name: TemporalAggregationMethodEnum
    description: How sub-period values were aggregated. CF `cell_methods` aligned.
    title: Temporal Aggregation Method
    from_schema: https://w3id.org/linkml/microschemas/envar
    see_also:
    - https://cfconventions.org/cf-conventions/cf-conventions.html#cell-methods
    permissible_values:
      mean:
        text: mean
        description: Arithmetic mean over the window.
      maximum:
        text: maximum
        description: 'Maximum over the window. `time: maximum` in CF.'
      minimum:
        text: minimum
        description: 'Minimum over the window. `time: minimum` in CF.'
      sum:
        text: sum
        description: Sum over the window.
      percentile:
        text: percentile
        description: A percentile of the values in the window.
      point_in_time:
        text: point_in_time
        description: A point-in-time sample with no aggregation applied.
  DayBoundaryConventionEnum:
    name: DayBoundaryConventionEnum
    description: Where the 24-hour day window starts. The single most-omitted slot
      in the environmental-health literature.
    title: Day-Boundary Convention
    from_schema: https://w3id.org/linkml/microschemas/envar
    permissible_values:
      local_midnight:
        text: local_midnight
        description: Day starts at local midnight at the target location. Daymet convention.
      utc_midnight:
        text: utc_midnight
        description: Day starts at 00:00 UTC. NARR / ERA5 sub-daily are computed against
          this.
      ending_1200_gmt:
        text: ending_1200_gmt
        description: 24-hour window ending 12:00 GMT, used by PRISM and historically
          common in US station-network products.
        title: 24h ending 1200 GMT
      solar_noon_centered:
        text: solar_noon_centered
        description: 24-hour window centered on local solar noon.
      observation_dependent:
        text: observation_dependent
        description: Day boundary follows whatever the underlying observation network
          uses (e.g. weather-station local custom).
      not_applicable:
        text: not_applicable
        description: No day boundary applies — e.g. an annual or monthly aggregate
          where the sub-daily window is not a meaningful concept (SPEC §5).
  CalendarEnum:
    name: CalendarEnum
    description: CF `calendar` values.
    title: CF Calendar
    from_schema: https://w3id.org/linkml/microschemas/envar
    see_also:
    - https://cfconventions.org/cf-conventions/cf-conventions.html#calendar
    permissible_values:
      gregorian:
        text: gregorian
        description: Standard mixed Julian / Gregorian calendar (default).
      noleap:
        text: noleap
        description: 365-day calendar with no leap days. Common in climate-model output.
      all_leap:
        text: all_leap
        description: 366-day calendar with all years leap.
      day_360:
        text: day_360
        description: 12 months of 30 days each (CF `calendar` value `360_day`). Common
          in some climate-model outputs.
        title: 360_day
      julian:
        text: julian
        description: Proleptic Julian calendar.
      proleptic_gregorian:
        text: proleptic_gregorian
        description: Proleptic Gregorian calendar.
  HomogenisationStatusEnum:
    name: HomogenisationStatusEnum
    description: For station-based products, the homogenisation status of values across
      the record period.
    title: Homogenisation Status
    from_schema: https://w3id.org/linkml/microschemas/envar
    see_also:
    - https://en.wikipedia.org/wiki/Homogenization_(climate)
    permissible_values:
      homogenised:
        text: homogenised
        description: Values have been homogenised against breakpoints.
      not_homogenised:
        text: not_homogenised
        description: Values are as-observed, with no homogenisation applied.
      partial:
        text: partial
        description: Partial homogenisation has been applied.
  SourceNativeFormatEnum:
    name: SourceNativeFormatEnum
    description: Format the source ships in.
    title: Source Native Format
    from_schema: https://w3id.org/linkml/microschemas/envar
    permissible_values:
      netcdf4_cf:
        text: netcdf4_cf
        description: NetCDF version 4 with CF Conventions metadata.
        title: NetCDF-4/CF
      hdf5:
        text: hdf5
        description: Hierarchical Data Format version 5.
        title: HDF5
      geotiff:
        text: geotiff
        description: GeoTIFF raster format.
        title: GeoTIFF
      grib1:
        text: grib1
        description: WMO GRIB-1 format.
        title: GRIB-1
      grib2:
        text: grib2
        description: WMO GRIB-2 format.
        title: GRIB-2
      csv_station_observations:
        text: csv_station_observations
        description: CSV file of station observations.
        title: CSV station observations
      zarr:
        text: zarr
        description: Zarr cloud-optimised array format.
        title: Zarr
      parquet:
        text: parquet
        description: Apache Parquet tabular format.
        title: Parquet
  ExposureModelTypeEnum:
    name: ExposureModelTypeEnum
    description: The class of model that produced the values.
    title: Exposure Model Type
    from_schema: https://w3id.org/linkml/microschemas/envar
    permissible_values:
      direct_measurement:
        text: direct_measurement
        description: Direct instrument observation.
      spatial_interpolation:
        text: spatial_interpolation
        description: Station observations interpolated to a grid (Daymet).
      reanalysis:
        text: reanalysis
        description: Data-assimilation reanalysis (NARR, ERA5).
      statistical_blend:
        text: statistical_blend
        description: Blend of multiple sources (GridMET = PRISM + NLDAS-2).
      chemical_transport_model:
        text: chemical_transport_model
        description: Deterministic chemical transport model (CMAQ, GEOS-Chem).
      ensemble_machine_learning:
        text: ensemble_machine_learning
        description: Ensemble ML model (Di et al. PM2.5).
      single_machine_learning:
        text: single_machine_learning
        description: Single ML model (Brokamp PM2.5).
      equation_derived:
        text: equation_derived
        description: Derived analytically from other variables via an equation.
      satellite_retrieval:
        text: satellite_retrieval
        description: Satellite-based retrieval algorithm.
  BiasCorrectionAppliedEnum:
    name: BiasCorrectionAppliedEnum
    description: Whether and how bias correction has been applied.
    title: Bias Correction Method
    from_schema: https://w3id.org/linkml/microschemas/envar
    permissible_values:
      none:
        text: none
        description: No bias correction applied.
      quantile_mapping:
        text: quantile_mapping
        description: Quantile-mapping bias correction.
      linear_scaling:
        text: linear_scaling
        description: Linear scaling bias correction.
      delta_method:
        text: delta_method
        description: Delta-method bias correction.
      other:
        text: other
        description: Some other bias-correction method has been applied.
  UncertaintyTypeEnum:
    name: UncertaintyTypeEnum
    description: Kind of per-value uncertainty.
    title: Uncertainty Type
    from_schema: https://w3id.org/linkml/microschemas/envar
    permissible_values:
      standard_error:
        text: standard_error
        description: Standard error of the value.
      prediction_interval:
        text: prediction_interval
        description: Prediction interval; the percentile (e.g. 95 %) is captured implicitly
          in the producer documentation.
      ensemble_std_dev:
        text: ensemble_std_dev
        description: Standard deviation across ensemble members.
      monte_carlo_std_dev:
        text: monte_carlo_std_dev
        description: Standard deviation from Monte Carlo sampling.
  MissingDataHandlingEnum:
    name: MissingDataHandlingEnum
    description: How the source handles missing values.
    title: Missing Data Handling
    from_schema: https://w3id.org/linkml/microschemas/envar
    permissible_values:
      none:
        text: none
        description: Values are passed through as missing.
      spatiotemporal_interpolation:
        text: spatiotemporal_interpolation
        description: Missing cells are filled by spatiotemporal interpolation.
      forward_fill:
        text: forward_fill
        description: Forward fill from the previous non-missing observation.
      nearest_neighbour:
        text: nearest_neighbour
        description: Fill from the nearest non-missing neighbour cell.
  LinkageStrategyEnum:
