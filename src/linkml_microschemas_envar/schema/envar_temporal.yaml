id: https://w3id.org/linkml/microschemas/envar/temporal
name: envar-temporal
title: EnVar Microschemas — Temporal Reference
version: "0.1.0"
description: |-
  Temporal reference slots: resolution, aggregation method, day-boundary
  convention, coverage, calendar. Covers §4 of
  envar-heat-scenario-requirements.md. (Lag alignment was relocated to
  envar_linkage — it attaches a value to a clinical event, a join concern,
  not an intrinsic temporal property.)
license: Apache-2.0

prefixes:
  envar: https://w3id.org/linkml/microschemas/envar/
  linkml: https://w3id.org/linkml/
default_prefix: envar
default_range: string

imports:
- linkml:types
- envar_common

#────────────────────────────────────────────────────────────────
# CLASSES
#────────────────────────────────────────────────────────────────

classes:

  TemporalReference:
    description: >-
      Temporal provenance of an environmental exposure value: native temporal
      grain, aggregation rule, day-boundary convention, coverage of the source
      product, the extraction window the run actually pulled, and calendar.
      One per record.
    annotations:
      domain_of_use: environmental_exposure
    slots:
    - temporal_resolution
    - temporal_aggregation_method
    - temporal_aggregation_window_seconds
    - day_boundary_convention
    - temporal_coverage_start
    - temporal_coverage_end
    - extraction_window_start
    - extraction_window_end
    - calendar
    slot_usage:
      temporal_resolution:
        required: true
      temporal_aggregation_method:
        required: true
      day_boundary_convention:
        required: true

#────────────────────────────────────────────────────────────────
# SLOTS
#────────────────────────────────────────────────────────────────

slots:

  temporal_resolution:
    range: TemporalResolutionEnum
    description: Native temporal grain of the values.

    annotations:
      tier: core
  temporal_aggregation_method:
    range: TemporalAggregationMethodEnum
    description: >-
      How the value summarises sub-period values. Maps 1:1 to CF cell_methods.

    annotations:
      tier: core
  temporal_aggregation_window_seconds:
    range: integer
    description: >-
      Redundant with `temporal_resolution` but explicit for machine use; e.g.
      86400 for daily, 3600 for hourly.

    annotations:
      tier: recommended
  day_boundary_convention:
    range: DayBoundaryConventionEnum
    description: >-
      Where the 24-hour day window starts. **Mandatory.** Daymet =
      `local_midnight`; PRISM = `24h_ending_1200_GMT`; NARR / ERA5 sub-daily =
      `utc_midnight`. The single most-omitted slot in the literature and a
      known source of cross-study disagreement.

    annotations:
      tier: core
  temporal_coverage_start:
    range: date
    description: Start of the source product's full temporal coverage.

    annotations:
      tier: recommended
  temporal_coverage_end:
    range: date
    description: >-
      End of the source product's coverage. May be an "ongoing" sentinel for
      live products.

    annotations:
      tier: recommended
  extraction_window_start:
    range: date
    description: Actual start date the run extracted.

    annotations:
      tier: recommended
  extraction_window_end:
    range: date
    description: Actual end date the run extracted.

    annotations:
      tier: recommended
  calendar:
    range: CalendarEnum
    description: >-
      CF calendar. `gregorian` is the default; only matters when a source uses
      a non-standard calendar (some climate model output does).

    annotations:
      tier: recommended
#────────────────────────────────────────────────────────────────
# ENUMS
#────────────────────────────────────────────────────────────────

enums:

  TemporalResolutionEnum:
    description: Native temporal grain of the source product.
    permissible_values:
      instantaneous:
        description: Instantaneous snapshot at a timestamp.
      hourly:
        description: One value per hour.
      three_hourly:
        title: 3-hourly
        description: One value per 3-hour window (NARR sub-daily).
      daily:
        description: One value per day.
      monthly:
        description: One value per calendar month.
      seasonal:
        description: One value per season (3-month window).
      annual:
        description: One value per year.

  TemporalAggregationMethodEnum:
    description: >-
      How sub-period values were aggregated. CF `cell_methods` aligned.
    permissible_values:
      mean:
        description: Arithmetic mean over the window.
      maximum:
        description: "Maximum over the window. `time: maximum` in CF."
      minimum:
        description: "Minimum over the window. `time: minimum` in CF."
      sum:
        description: Sum over the window.
      percentile:
        description: A percentile of the values in the window.
      point_in_time:
        description: A point-in-time sample with no aggregation applied.

  DayBoundaryConventionEnum:
    description: >-
      Where the 24-hour day window starts. The single most-omitted slot in the
      environmental-health literature.
    permissible_values:
      local_midnight:
        description: >-
          Day starts at local midnight at the target location. Daymet
          convention.
      utc_midnight:
        description: >-
          Day starts at 00:00 UTC. NARR / ERA5 sub-daily are computed against
          this.
      ending_1200_gmt:
        title: 24h ending 1200 GMT
        description: >-
          24-hour window ending 12:00 GMT, used by PRISM and historically
          common in US station-network products.
      solar_noon_centered:
        description: 24-hour window centered on local solar noon.
      observation_dependent:
        description: >-
          Day boundary follows whatever the underlying observation network
          uses (e.g. weather-station local custom).
      not_applicable:
        description: >-
          No day boundary applies — e.g. an annual or monthly aggregate where
          the sub-daily window is not a meaningful concept (SPEC §5).

  CalendarEnum:
    description: CF `calendar` values.
    permissible_values:
      gregorian:
        description: Standard mixed Julian / Gregorian calendar (default).
      noleap:
        description: 365-day calendar with no leap days. Common in climate-model output.
      all_leap:
        description: 366-day calendar with all years leap.
      day_360:
        title: 360_day
        description: >-
          12 months of 30 days each (CF `calendar` value `360_day`). Common in
          some climate-model outputs.
      julian:
        description: Proleptic Julian calendar.
      proleptic_gregorian:
        description: Proleptic Gregorian calendar.
