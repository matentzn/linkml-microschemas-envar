# Heat Index demo — input B: the relative-humidity parent sidecar.
# ERA5 reanalysis, ~31 km (0.25°) grid, UTC day boundary, daily MEAN.
# Referenced by heat_index_derived.yaml via equation_inputs[input_role=relative_humidity].
# This is the COARSER, utc, mean-aggregated input. Every line marked "<-- diverges"
# is a divergence from input A that the single output number would otherwise hide.
---
schema_version: "0.1"
provenance_id: "01HFA7K8R3M6XP-era5-rh"

variable_identity:
  variable_name: rh
  variable_label: "daily mean near-surface relative humidity"
  standard_name: CF:relative_humidity
  concept_status: proposed
  cf_cell_methods: "time: mean"
  units_ucum: "%"
  units_display: "%"
  value_data_type: continuous_numeric
  value_range_plausible_min: 0
  value_range_plausible_max: 100

data_layout:
  table_orientation: wide
  value_column: rh

spatial_reference:
  native_spatial_resolution_m: 31000               # <-- diverges from input A (1000 m)
  native_spatial_resolution_descriptor: "~31 km (0.25°) reanalysis grid"
  crs: "EPSG:4326"
  spatial_extent_descriptor: "global"
  extraction_method: nearest_cell
  target_geography_type: point_residence

temporal_reference:
  temporal_resolution: daily
  temporal_aggregation_method: mean                # <-- diverges from input A (maximum)
  temporal_aggregation_window_seconds: 86400
  day_boundary_convention: utc                     # <-- diverges from input A (local_midnight)
  temporal_coverage_start: "1940-01-01"
  temporal_coverage_end: "2024-12-31"
  extraction_window_start: "2022-07-18"
  extraction_window_end: "2022-07-20"
  calendar: gregorian

source_dataset:
