  source_dataset_short_code: era5
  source_dataset_doi: "10.24381/cds.adbb2d47"
  source_dataset_version: "ERA5"
  source_producer_institution: "ECMWF / Copernicus Climate Change Service (C3S)"
  source_license_spdx: "Copernicus-Licence"
  source_native_format: grib1
  source_access_url: "https://cds.climate.copernicus.eu/"

exposure_model:
  exposure_model_type: reanalysis
  exposure_model_inputs:
  - "ECMWF IFS 4D-Var assimilation of multi-source observations"
  exposure_model_known_biases:
  - "near-surface humidity biased in arid regions"
  - "coarse grid smooths sub-grid humidity gradients"

linkage_method:
  linkage_strategy: point_extraction_at_residence
  geocoding_precision_propagated: range
  geocoding_score_propagated: 0.95
  address_period_alignment: address_history_from_emr

tool_run:
  tool_name: era5_extract
  tool_version: "0.4.2"
  container_image_repository: "ghcr.io/envar-org/era5-extract"
  container_image_digest: "sha256:f4e3d2c1b0a9..."
