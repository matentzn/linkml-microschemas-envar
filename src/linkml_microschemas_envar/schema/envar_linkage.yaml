id: https://w3id.org/linkml/microschemas/envar/linkage
name: envar-linkage
title: EnVar Microschemas — Linkage Method (gridded → patient)
version: "0.1.0"
description: |-
  Linkage-method slots: how a gridded value is attached to a patient's
  location and clinical date — the spatiotemporal trajectory-resolution step.
  Linkage strategy, buffer parameters, propagated geocoder quality,
  address-period alignment (spatial axis), and clinical-date-assignment
  convention, partial-day attribution, and lag alignment (temporal axis).
  Covers §9 and the temporal-linkage parts of §4 of
  envar-heat-scenario-requirements.md.
license: Apache-2.0

prefixes:
  envar: https://w3id.org/linkml/microschemas/envar/
  linkml: https://w3id.org/linkml/
default_prefix: envar
default_range: string

imports:
- linkml:types
- envar_common

#────────────────────────────────────────────────────────────────
# CLASSES
#────────────────────────────────────────────────────────────────

classes:

  LinkageMethod:
    title: Linkage Method
    description: >-
      How a gridded environmental value gets attached to a patient: the
      resolution of the patient's spatiotemporal trajectory down to the
      resolution the exposure data supports. Covers the linkage strategy and
      buffer parameters, the propagated geocoder precision and score, how
      patient location-over-time is modelled (the spatial axis), and the
      clinical-date-assignment convention, partial-day attribution, and lag
      alignment (the temporal axis). One per record.
    see_also:
    - https://degauss.org/
    annotations:
      domain_of_use: environmental_exposure
    slots:
    - linkage_strategy
    - linkage_buffer_radius_m
    - linkage_buffer_radius_m_missing_reason
    - linkage_buffer_aggregation_method
    - linkage_buffer_aggregation_method_missing_reason
    - linkage_max_distance_to_station_m
    - linkage_max_distance_to_station_m_missing_reason
    - linkage_working_crs
    - geocoding_precision_propagated
    - geocoding_score_propagated
    - geocoding_score_propagated_missing_reason
    - address_period_alignment
    - clinical_date_assignment_convention
    - clinical_date_assignment_convention_missing_reason
    - partial_day_attribution_rule
    - partial_day_attribution_rule_missing_reason
    - lag_alignment_applied
    - lag_alignment_specifier
    - lag_alignment_applied_missing_reason
    slot_usage:
      linkage_strategy:
        required: true
    rules:
    - description: >-
        Buffer aggregation needs its radius: the buffer size is a
        hyperparameter that changes which cells contribute to the value
        (tier conditionally_core context "buffer strategies").
      preconditions:
        slot_conditions:
          linkage_strategy:
            equals_string: buffer_aggregation_around_residence
      postconditions:
        slot_conditions:
          linkage_buffer_radius_m:
            required: true
    - description: >-
        Strategies that aggregate over an area (buffer, polygon membership,
        population-weighted area) must state how cell values were combined
        (tier conditionally_core context "buffer/area strategies").
      preconditions:
        slot_conditions:
          linkage_strategy:
            equals_string_in:
            - buffer_aggregation_around_residence
            - area_membership_residence_in_polygon
            - population_weighted_area_to_residence
      postconditions:
        slot_conditions:
          linkage_buffer_aggregation_method:
            required: true
    - description: >-
        Nearest-station linkage must state its distance cutoff — without it
        "nearest" is unbounded and irreproducible (tier conditionally_core
        context "station strategies").
      preconditions:
        slot_conditions:
          linkage_strategy:
            equals_string: nearest_station_with_max_distance
      postconditions:
        slot_conditions:
          linkage_max_distance_to_station_m:
            required: true
    - description: >-
        Day-boundary cross-check, SPEC.md rule 8: when a lagged or
        event-matched analysis is declared, the clinical-side date convention
        is required so the two declared day rulers can be compared (tier
        conditionally_core context "lag_alignment_applied != none").
      preconditions:
        slot_conditions:
          lag_alignment_applied:
            equals_string_in:
            - lag_n_days
            - distributed_lag
      postconditions:
        slot_conditions:
          clinical_date_assignment_convention:
            required: true

#────────────────────────────────────────────────────────────────
# SLOTS
#────────────────────────────────────────────────────────────────

slots:

  linkage_strategy:
    title: Linkage Strategy
    range: LinkageStrategyEnum
    description: How a gridded value is attached to a patient location.
    examples:
    - value: point_extraction_at_residence
      description: extract the grid-cell value at the geocoded residence (Daymet tmax scenario)
    - value: population_weighted_area_to_residence
      description: population-weighted aggregation over the residence tract (ACAG PM2.5 scenario)

    annotations:
      tier: core
      justification: >-
        The strategy determines which grid cells or stations contribute to a
        patient's value: point extraction, buffer aggregation, and
        population weighting can assign materially different exposures to
        the same address. Without it the person-level value cannot be
        reproduced or compared across studies — this is the "linkage
        descriptor" gap named by the GECC/EIRENE forum.
      explanation: >-
        Environmental data comes as a map of values, but health data belongs
        to people. This slot records the rule used to pick a person's value
        off that map — for example reading the value exactly at their home,
        or averaging the values in a circle around it.
  linkage_buffer_radius_m:
    title: Buffer Radius (Metres)
    range: float
    description: >-
      Buffer radius in metres for buffer-aggregation strategies.
    examples:
    - value: "500"
      description: 500 m buffer around the geocoded residence

    annotations:
      tier: conditionally_core
      justification: >-
        For buffer strategies the radius defines the exposure footprint: a
        500 m and a 5 km buffer around the same residence can average over
        very different air or heat conditions, so the assigned value is not
        reproducible without it.
      explanation: >-
        When exposure is averaged over a circle drawn around a person's
        home, this is how wide that circle is, in metres.
  linkage_buffer_radius_m_missing_reason:
    title: Reason Buffer Radius Is Missing
    range: MissingReasonEnum
    description: Reason `linkage_buffer_radius_m` is null.
    examples:
    - value: not_applicable
      description: strategy is point extraction, so no buffer radius applies

    annotations:
      tier: optional
      justification: >-
        Distinguishes "no buffer applies because the strategy is point
        extraction" from "the radius was simply not recorded" — without it a
        null radius is ambiguous and the linkage cannot be audited.
      explanation: >-
        When the circle-width field is empty, this says why — for example
        because no circle was used at all.
  linkage_buffer_aggregation_method:
    title: Buffer Aggregation Method
    range: BufferAggregationEnum
    description: >-
      Aggregation method applied within the buffer (mean / max / median /
      area-weighted mean).
    examples:
    - value: area_weighted_mean
      description: area-weighted mean over the aggregation area (ACAG PM2.5 scenario)

    annotations:
      tier: conditionally_core
      justification: >-
        Within the same buffer, mean, max, and area-weighted mean yield
        different exposure values; omitting the method makes the assigned
        value irreproducible and cross-study comparisons unsafe.
      explanation: >-
        If several map values fall inside the circle around a home, they
        must be boiled down to one number. This records how — for example by
        taking the average, or the highest value.
  linkage_buffer_aggregation_method_missing_reason:
    title: Reason Buffer Aggregation Is Missing
    range: MissingReasonEnum
    description: Reason `linkage_buffer_aggregation_method` is null.
    examples:
    - value: not_applicable
      description: strategy is point extraction, so no buffer aggregation applies

    annotations:
      tier: optional
      justification: >-
        Separates "not applicable — no buffer aggregation was performed"
        from an undocumented gap; without the reason a null method leaves
        the linkage unauditable.
      explanation: >-
        When the how-values-were-combined field is empty, this says why.
  linkage_max_distance_to_station_m:
    title: Maximum Distance to Station (Metres)
    range: float
    description: >-
      Maximum distance to a station for nearest-station strategies; values
      beyond this distance get null.
    examples:
    - value: "50000"
      description: stations farther than 50 km from the residence yield null

    annotations:
      tier: conditionally_core
      justification: >-
        For nearest-station strategies this cutoff decides whether a distant
        monitor still counts as "nearby"; beyond it the assignment is
        meaningless and should be null. Without the cutoff, values assigned
        from stations tens of kilometres away are indistinguishable from
        tight matches, silently degrading exposure quality.
      explanation: >-
        Some methods take the reading from the closest measuring station.
        This is the farthest a station may be from the home before the match
        is considered too unreliable and no value is assigned.
  linkage_max_distance_to_station_m_missing_reason:
    title: Reason Station Distance Is Missing
    range: MissingReasonEnum
    description: Reason `linkage_max_distance_to_station_m` is null.
    examples:
    - value: not_applicable
      description: strategy is gridded extraction, not nearest-station

    annotations:
      tier: optional
      justification: >-
        Distinguishes "not applicable — the data is gridded, not
        station-based" from an undocumented cutoff; a bare null hides
        whether unlimited-distance station matches were allowed.
      explanation: >-
        When the maximum-station-distance field is empty, this says why.
  linkage_working_crs:
    title: Linkage Working CRS
    range: string
    description: >-
      Coordinate reference system the point-to-cell join was actually
      executed in, as an EPSG identifier or PROJ string, when it differs
      from the native `SpatialReference.crs` — e.g. reprojecting WGS84
      points into an equal-area CRS before the spatial join.
    examples:
    - value: "EPSG:5070"
      description: CONUS Albers equal-area, the `local_epsg` the GAIA spatial join runs in
    comments:
    - >-
      Added after the reverse gap survey (docs/reverse-gap-survey.md,
      2026-07): GAIA's ETL descriptor carries both `epsg` (native, 4326)
      and `local_epsg` (5070) — the working CRS its PostGIS join actually
      executes in. EnVar had exactly one `crs` slot, so the second one had
      no home; the survey's verdict was that the working CRS is a linkage
      hyperparameter, not a duplicate of the native CRS.
    see_also:
    - https://epsg.io/5070

    annotations:
      tier: optional
      justification: >-
        Reprojection can move a point across a cell boundary: two runs with
        the same native CRS but different working CRS are different linkages
        that can assign different exposures to the same address. Recording
        the working CRS makes the join reproducible rather than
        deployment-dependent.
      explanation: >-
        Before matching patient locations to map tiles, software sometimes
        converts all coordinates into a different mapping system that is
        better for measuring areas. This names that intermediate system,
        because the choice can nudge a location into a neighbouring tile.
  geocoding_precision_propagated:
    title: Propagated Geocoding Precision
    range: GeocodingPrecisionEnum
    description: >-
      Quality category propagated from the upstream geocoder (DeGAUSS
      `precision` column).
    examples:
    - value: range
      description: street-centerline point interpolated within an address-range segment
    see_also:
    - https://degauss.org/

    annotations:
      tier: recommended
      justification: >-
        Geocoding precision determines whether "residence" means the actual
        house or a ZIP-code centroid kilometres away — which changes which
        grid cell the patient falls in and therefore their assigned
        exposure. Propagating it lets analysts filter or down-weight
        coarsely located records.
      explanation: >-
        Geocoding means turning a street address into map coordinates, and
        it does not always land on the exact house — sometimes only on the
        street, the ZIP area, or the city. This records how exact the
        landing was.
  geocoding_score_propagated:
    title: Propagated Geocoding Score
    range: float
    description: >-
      Geocoder score (0-1) propagated from the upstream geocoder so the
      exposure record knows the spatial precision of its anchor.
    examples:
    - value: "0.95"
    see_also:
    - https://degauss.org/

    annotations:
      tier: recommended
      justification: >-
        The score quantifies how confident the geocoder was in its address
        match; without it downstream analysts cannot apply quality cutoffs,
        and poorly matched addresses contaminate the exposure assignment
        invisibly.
      explanation: >-
        When software converts an address into map coordinates it also rates
        its own confidence, from 0 to 1. This carries that rating along with
        the exposure record.
  geocoding_score_propagated_missing_reason:
    title: Reason Geocoding Score Is Missing
    range: MissingReasonEnum
    description: Reason `geocoding_score_propagated` is null.
    examples:
    - value: upstream_data_not_propagated
      description: the geocoder emitted a score but the pipeline dropped it

    annotations:
      tier: optional
      justification: >-
        Records whether the score was never produced or was produced but
        dropped by the pipeline — the difference between an upstream
        limitation and a fixable ETL gap.
      explanation: >-
        When the geocoder-confidence field is empty, this says why.
  address_period_alignment:
    title: Address Period Alignment
    range: AddressPeriodAlignmentEnum
    description: >-
      How the patient's location-over-time (the spatial axis of trajectory
      resolution) was modelled.
    examples:
    - value: address_history_from_emr
      description: an EMR-sourced address history covers the observation period
    annotations:
      tier: recommended
      justification: >-
        Assuming a single static address smears home-location exposure
        across days the patient was actually elsewhere; how
        location-over-time was modelled changes which days get which values
        and can bias exposure estimates.
      explanation: >-
        People move house and travel, so "where the patient was" changes
        over time. This records whether the study used one fixed address, a
        full address history, or accounted for known trips away from home.
  clinical_date_assignment_convention:
    title: Clinical Date Assignment Convention
    range: ClinicalDateAssignmentEnum
    description: >-
      The clinical-side mirror of `day_boundary_convention` (envar_temporal):
      which timezone / day-boundary rule collapsed the clinical timestamp to
      the date used in the join. A boundary mismatch between this and the
      exposure-side `day_boundary_convention` silently misattributes
      boundary-hour events to the wrong day, which is what makes the Core
      `day_boundary_convention` checkable at all. Metadata *about the join* —
      never the clinical timestamp itself; carries no PHI.
    examples:
    - value: local_midnight
      description: matches the exposure-side day_boundary_convention (Daymet tmax scenario)
    - value: date_only_no_time
      description: clinical record carried only a date, so no boundary rule applies (ACAG PM2.5 scenario)
    annotations:
      tier: conditionally_core
      justification: >-
        If the clinical side collapsed timestamps to dates with a different
        day-boundary rule than the exposure side, events near midnight are
        silently joined to the wrong day's exposure; recording both rules is
        what makes that mismatch detectable at all.
      explanation: >-
        A hospital visit at 11 pm can count as "today" or "tomorrow"
        depending on which clock and cutoff you use. This records the rule
        the clinical data used to turn a timestamp into a calendar date.
  clinical_date_assignment_convention_missing_reason:
    title: Reason Date Convention Is Missing
    range: MissingReasonEnum
    description: Reason `clinical_date_assignment_convention` is null.
    examples:
    - value: available_but_not_extracted
      description: the clinical system documents its convention but the pipeline does not yet surface it
    annotations:
      tier: optional
      justification: >-
        Distinguishes a convention that is undocumented at the source from
        one the pipeline has not yet extracted — which determines whether
        the day-boundary cross-check can ever be completed.
      explanation: >-
        When the clinical date-rule field is empty, this says why.
  partial_day_attribution_rule:
    title: Partial-Day Attribution Rule
    range: PartialDayAttributionEnum
    description: >-
      How boundary / transition days of the patient's trajectory (trip start /
      end, travel days) are attributed when location changes within a day. The
      temporal partner to the `known_travel_interval` address alignment.
    examples:
    - value: not_applicable
      description: no trajectory transitions occur in the observation period
    annotations:
      tier: recommended
      justification: >-
        On a transition day the patient is in two places; whether that day
        is credited to the origin, the destination, both, or excluded
        changes which exposure value the day receives, and an undocumented
        rule makes the linkage irreproducible.
      explanation: >-
        If someone leaves on a trip mid-day, which place's environment
        "counts" for that day? This records the choice — the place they
        left, the place they arrived, both, or neither.
  partial_day_attribution_rule_missing_reason:
    title: Reason Attribution Rule Is Missing
    range: MissingReasonEnum
    description: Reason `partial_day_attribution_rule` is null.
    examples:
    - value: not_provided_by_source
      description: the trajectory source does not document transition-day handling
    annotations:
      tier: optional
      justification: >-
        Separates "not applicable — the patient never changed location" from
        an undocumented handling of travel days; without it a null rule
        cannot be audited.
      explanation: >-
        When the travel-day rule field is empty, this says why.
  lag_alignment_applied:
    title: Lag Alignment Applied
    range: LagAlignmentEnum
    description: >-
      Whether and how values were lag-aligned to a clinical event. Relocated
      from envar_temporal: lag alignment attaches a value to an event (a
      linkage concern), not an intrinsic temporal property. See
      `lag_alignment_specifier` for the concrete lag value(s).
    examples:
    - value: none
      description: values are at native dates; no lag alignment applied
    see_also:
    - https://cran.r-project.org/package=dlnm
    annotations:
      tier: recommended
      justification: >-
        If values were already shifted relative to the clinical event and
        this is not recorded, an analyst may apply the lag again —
        double-lagging is a silent analytic error that misdates every
        exposure.
      explanation: >-
        Health effects can trail exposure by days — a heat wave today may
        send someone to hospital next week — so analyses sometimes pair a
        clinical event with earlier exposure values. This records whether
        such a shift was already built into the data.
  lag_alignment_specifier:
    title: Lag Alignment Specifier
    range: string
    description: >-
      Free-form specifier paired with `lag_alignment_applied` to capture the
      concrete lag values (e.g. `"3"` for a 3-day lag, or `"0-21"` for a
      distributed lag from 0 to 21 days). Empty when `lag_alignment_applied`
      = `none`.
    examples:
    - value: "0-3"
      description: distributed lag from 0 to 3 days before the clinical event (with lag_alignment_applied = distributed_lag)
    annotations:
      tier: optional
      justification: >-
        Knowing that a lag was applied is useless without the concrete
        value(s); a 3-day lag and a distributed lag over 0-21 days define
        entirely different exposure windows and cannot be reconstructed
        after the fact.
      explanation: >-
        This spells out exactly how many days the exposure values were
        shifted relative to the clinical event — for example 3 days, or a
        whole range like 0 to 21 days.
  lag_alignment_applied_missing_reason:
    title: Reason Lag Alignment Is Missing
    range: MissingReasonEnum
    description: Reason `lag_alignment_applied` is null.
    examples:
    - value: under_investigation
      description: lag-alignment documentation for this ETL is still being populated
    annotations:
      tier: optional
      justification: >-
        Records why the lag-alignment status is unknown; without it analysts
        cannot tell whether the data is safely unlagged or the documentation
        simply has not caught up, leaving the double-lagging risk open.
      explanation: >-
        When the lag field is empty, this says why — for example because the
        documentation is still being written.

#────────────────────────────────────────────────────────────────
# ENUMS
#────────────────────────────────────────────────────────────────

enums:

  LinkageStrategyEnum:
    title: Linkage Strategy
    description: >-
      The spatial rule used to read an environmental value out of the exposure
      surface (a grid, a monitoring network, or a set of administrative areas)
      and assign it to one patient at their location. This is the core
      geographic-join decision, and it trades spatial precision against
      robustness to location error: a point read is precise but breaks if the
      geocode is wrong, whereas an area or buffer read is coarser but more
      forgiving. Each value below names the companion fields it makes required.
    permissible_values:
      point_extraction_at_residence:
        description: >-
          Take the single value at the exact grid cell (or interpolated point)
          that contains the patient's residence coordinates — one location in,
          one value out. The simplest and most precise strategy when the
          residence geocode is accurate and the surface is fine-grained, but
          also the most sensitive to geocoding error, since a misplaced point
          reads the wrong cell.
      buffer_aggregation_around_residence:
        description: >-
          Draw a circle of a fixed radius around the residence and summarise
          every value that falls inside it into one number. This deliberately
          blurs the exact point, smoothing over geocoding uncertainty and
          describing a neighbourhood rather than a single spot, at the cost of
          flattening sharp local gradients. Requires a buffer radius
          (`linkage_buffer_radius_m`) and a summary function
          (`linkage_buffer_aggregation_method`, e.g. mean or max).
      area_membership_residence_in_polygon:
        description: >-
          Give the patient the value already attached to whichever
          administrative or service-area polygon their residence falls in — for
          instance a census tract, a ZIP code, or a public water system's
          service area. Everyone inside the polygon inherits its single value
          regardless of where in it they live. Appropriate when the exposure is
          genuinely defined at the area level (such as a regulated water
          supply) rather than varying continuously across space. Requires a
          summary function (`linkage_buffer_aggregation_method`) stating how the
          polygon's value was derived.
      nearest_station_with_max_distance:
        description: >-
          Use the reading from the closest monitoring station to the residence,
          but only if that station lies within a stated maximum distance;
          past that cutoff no value is assigned rather than trusting a far-off
          station. Typical for sparse observing networks (air-quality or weather
          stations) where a distant station is not representative of local
          conditions. Requires the distance cutoff
          (`linkage_max_distance_to_station_m`), without which "nearest" is
          unbounded and the join is irreproducible.
      population_weighted_area_to_residence:
        description: >-
          Combine the values over an area around the residence, but weight each
          part of that area by how many people live there, so densely populated
          locations count for more than empty ones. The result approximates the
          exposure of a typical resident rather than a plain geographic average
          — useful when population is unevenly spread across the area. Requires
          a summary function (`linkage_buffer_aggregation_method`) for how the
          weighted values were combined.

  BufferAggregationEnum:
    title: Buffer Aggregation Method
    description: Aggregation within a buffer.
    permissible_values:
      mean:
        description: Arithmetic mean of values in the buffer.
      max:
        description: Maximum value in the buffer.
      median:
        description: Median of values in the buffer.
      area_weighted_mean:
        description: Area-weighted mean of values in the buffer.

  GeocodingPrecisionEnum:
    title: Geocoding Precision
    description: >-
      Geocoder precision category, mirroring DeGAUSS `geocoder.precision`.
    see_also:
    - https://degauss.org/
    permissible_values:
      range:
        description: >-
          Street-centerline point interpolated within an address-range
          segment. Highest precision typical for residential addresses.
      street:
        description: Representative point on the matched street segment.
      intersection:
        description: Geocoded crossing of two named streets.
      zip:
        description: Centroid of the matched 5-digit ZIP code.
      city:
        description: City centroid; lowest precision.
      unknown:
        description: Precision is unknown.

  AddressPeriodAlignmentEnum:
    title: Address Period Alignment
    description: >-
      How the patient's location-over-time (the spatial axis of trajectory
      resolution) was modelled.
    permissible_values:
      single_static_address:
        description: A single address is used for the whole observation period.
      address_history_from_emr:
        description: An EMR-sourced address history is used.
      known_travel_interval:
        description: >-
          A documented trip away from the residence is accounted for (e.g. a
          holiday), rather than assuming the residence for the whole period;
          assuming a static address would smear home-location exposure across
          days the patient was elsewhere.
      synthetic_residence_period:
        description: A synthetic residence period was constructed for the patient.

  ClinicalDateAssignmentEnum:
    title: Clinical Date Assignment
    description: >-
      The clinical-side mirror of `DayBoundaryConventionEnum` (envar_temporal):
      which timezone / day-boundary rule was used to collapse the clinical
      timestamp to the date used in the join. Compared against the
      exposure-side `day_boundary_convention` by the day-boundary cross-check.
    permissible_values:
      local_midnight:
        description: Clinical date assigned at local midnight at the patient location.
      utc_midnight:
        description: Clinical date assigned at 00:00 UTC.
      source_system_local_time:
        description: >-
          Clinical date assigned in the source clinical system's local time,
          whose offset may not be documented.
      date_only_no_time:
        description: >-
          The clinical record carried only a date (no time of day), so no
          boundary rule applies; the date is taken as-is.
      unknown:
        description: The clinical-date-assignment convention is unknown.

  PartialDayAttributionEnum:
    title: Partial-Day Attribution
    description: >-
      How boundary / transition days of the patient's trajectory (trip start /
      end, travel days) are attributed when location changes within a day.
    permissible_values:
      origin_location:
        description: The transition day is attributed to the origin location.
      destination_location:
        description: The transition day is attributed to the destination location.
      both_days_included:
        description: >-
          Both ends of the transition are counted (exposure attributed at both
          locations).
      excluded:
        description: Transition days are excluded from exposure attribution.
      not_applicable:
        description: >-
          No trajectory transitions occur (e.g. a single static address), so
          the rule does not apply.

  LagAlignmentEnum:
    title: Lag Alignment
    description: >-
      Whether the values have been pre-aligned to a clinical event window in
      this ETL. Companion slot `lag_alignment_specifier` captures the concrete
      lag pattern (e.g. `lag_3_days`, `distributed_lag_0_21`). Relocated here
      from envar_temporal.
    permissible_values:
      none:
        description: No lag alignment applied; values are at native dates.
      lag_n_days:
        description: >-
          A single-day lag of N days has been applied. Concrete N captured
          in `lag_alignment_specifier`.
      distributed_lag:
        description: >-
          A distributed lag over a range of days has been applied. Range
          captured in `lag_alignment_specifier` (e.g. `"0-21"`).
