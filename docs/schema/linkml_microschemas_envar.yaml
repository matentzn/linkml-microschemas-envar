    slot_usage:
      heat_metric_family:
        name: heat_metric_family
        required: true
      indoor_outdoor:
        name: indoor_outdoor
        required: true
    attributes:
      heat_metric_family:
        name: heat_metric_family
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: Tmax, Heat Index, WBGT, and a heat-wave flag are distinct exposures
              with distinct health associations; without the family, values from different
              metrics are indistinguishable and get pooled as if they measured the
              same thing.
          explanation:
            tag: explanation
            value: There are many different "heat numbers" — plain air temperature,
              composite scores that also fold in humidity, wind and sunshine, or a
              simple yes/no heat-wave flag. This field says which kind of heat number
              the record is about.
        description: The family of heat metric this variable represents.
        title: Heat Metric Family
        examples:
        - value: wbgt_outdoor
          description: outdoor Wet Bulb Globe Temperature (Phoenix 2022 heat-wave
            record)
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DerivedHeatMetric
        domain_of:
        - DerivedHeatMetric
        range: HeatMetricFamilyEnum
        required: true
      equation_variant:
        name: equation_variant
        annotations:
          tier:
            tag: tier
            value: conditionally_core
          justification:
            tag: justification
            value: WBGT approximations diverge materially from the reference model
              — well beyond 2-3 °C in hot-humid conditions — so two studies using
              "WBGT" with different variants are measuring systematically different
              quantities; pooling them without this field mixes those quantities silently.
          explanation:
            tag: explanation
            value: Well-known heat metrics have several published formulas that share
              one name but differ mathematically — like recipes with the same title
              from different cookbooks. This records which exact recipe was used to
              cook the number.
        description: 'For derived heat metrics, the equation variant used. Mandatory
          for WBGT, HI, and UTCI: a Liljegren WBGT and an ACSM WBGT for the same inputs
          can differ by 2-3 °C.'
        title: Equation Variant
        examples:
        - value: liljegren_2008
          description: Liljegren et al. 2008 outdoor WBGT formulation
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://en.wikipedia.org/wiki/Wet-bulb_globe_temperature
        owner: DerivedHeatMetric
        domain_of:
        - DerivedHeatMetric
        range: EquationVariantEnum
      equation_variant_missing_reason:
        name: equation_variant_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Distinguishes "no equation variant exists for this metric" from
              "the variant was used but never captured" — the first is fine, the second
              means the record is unusable for cross-study comparison and someone
              should go back to the producer.
          explanation:
            tag: explanation
            value: 'A blank field is ambiguous: it could mean the thing does not exist,
              or that nobody wrote it down. This companion field says which one it
              is.'
        description: Reason `equation_variant` is null.
        title: Reason Equation Variant Is Missing
        examples:
        - value: not_provided_by_source
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DerivedHeatMetric
        domain_of:
        - DerivedHeatMetric
        range: MissingReasonEnum
      equation_inputs:
        name: equation_inputs
        annotations:
          tier:
            tag: tier
            value: conditionally_core
          justification:
            tag: justification
            value: Multi-input metrics can silently absorb mismatched inputs — e.g.
              a Heat Index built from a 1 km local-midnight daily-max temperature
              and a ~31 km UTC daily-mean humidity. Without per-input references that
              divergence is invisible and no checker can surface it.
          explanation:
            tag: explanation
            value: Composite heat metrics are cooked from several ingredients — temperature,
              humidity, wind, sunshine. This is the ingredient list, where each entry
              points to that ingredient's own full paperwork instead of hiding it
              inside the final number.
        description: 'Typed per-input references for a multi-input derived metric
          (Heat Index from T + RH; WBGT from T + RH + wind + radiation). Each entry
          names the input''s role and points, by `provenance_id`, to the upstream
          sidecar carrying that input''s full context — it is an index into the lineage,
          not an inline copy of it.

          Option-B decomposition (see the `EquationInput` class): when the inputs
          originate from different products and diverge in resolution, day-boundary
          convention, or temporal aggregation, each input is a full upstream sidecar
          referenced here and listed as a step in `provenance_chain`, so the divergence
          stays explicit and checkable.

          Conditionally-Core: optional for a single-input metric, mandatory the moment
          a metric has more than one input.'
        title: Equation Inputs
        comments:
        - 'Cross-input consistency check (completeness checker, not structural LinkML
          validation): when more than one entry is present, dereference each `input_provenance_id`
          and WARN if the referenced inputs'' day-boundary conventions, temporal aggregation
          windows, or native spatial resolutions differ. A divergence is allowed but
          must be recorded via the decomposed sidecars rather than absorbed silently
          into the output value.'
        examples:
        - description: one entry of the list — the air-temperature input of a Liljegren
            WBGT; a wind-speed entry from a divergent product (e.g. ~31 km ERA5) would
            sit alongside it as a second element
          object:
            input_role: air_temperature
            input_provenance_id: 01HFA7K8R3M6XP-daymet-tmax
            input_source_short_code: daymet_v4
        - description: a second list entry from a divergent product (~31 km ERA5 vs
            1 km Daymet), pointing at its own full upstream sidecar
          object:
            input_role: wind_speed
            input_provenance_id: 01HFA7K8R3M6XP-era5-wind
            input_source_short_code: era5
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DerivedHeatMetric
        domain_of:
        - DerivedHeatMetric
        range: EquationInput
        multivalued: true
        inlined: true
        inlined_as_list: true
      equation_validity_range:
        name: equation_validity_range
        annotations:
          tier:
            tag: tier
            value: conditionally_core
          justification:
            tag: justification
            value: The Rothfusz Heat Index is undefined below ~80 °F / 40 % RH; applied
              outside its range an equation produces plausible-looking nonsense. Without
              the recorded range, no downstream consumer can flag values computed
              where the formula does not hold.
          explanation:
            tag: explanation
            value: Every formula only works within a fence of weather conditions it
              was designed for. This field writes the fence down, so anyone can check
              whether a value was computed inside or outside it.
        description: 'Validity-range conditions for the equation, serialised as a
          JSON string. For Heat Index: `{"min_temperature_F": 80, "min_relative_humidity_pct":
          40}` — Rothfusz is undefined below 80 °F / 40 % RH.'
        title: Equation Validity Range
        examples:
        - value: '{"min_wind_speed_m_s": 0.13}'
          description: Liljegren 2008 clamps wind speed below 0.13 m/s
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://www.weather.gov/safety/heat-index
        owner: DerivedHeatMetric
        domain_of:
        - DerivedHeatMetric
        range: string
      equation_validity_range_missing_reason:
        name: equation_validity_range_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Distinguishes "this equation has no published validity range" from
              "the range exists but was not captured" — the difference decides whether
              out-of-range screening is impossible or merely deferred.
          explanation:
            tag: explanation
            value: 'A blank field is ambiguous: it could mean the thing does not exist,
              or that nobody wrote it down. This companion field says which one it
              is.'
        description: Reason `equation_validity_range` is null.
        title: Reason Validity Range Is Missing
        examples:
        - value: not_provided_by_source
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DerivedHeatMetric
        domain_of:
        - DerivedHeatMetric
        range: MissingReasonEnum
      indoor_outdoor:
        name: indoor_outdoor
        annotations:
          tier:
            tag: tier
            value: conditionally_core
          justification:
            tag: justification
            value: Indoor and outdoor WBGT use different equations and carry different
              health interpretations; an indoor formula applied to outdoor conditions
              (or a regime left unstated) makes the value invalid or uninterpretable
              for the exposure being claimed.
          explanation:
            tag: explanation
            value: Heat stress works differently inside and outside — indoors there
              is no direct sun and little wind — so heat metrics come in indoor and
              outdoor versions, and you need to know which one you are looking at.
        description: Indoor / outdoor regime. Mandatory for WBGT (the indoor vs outdoor
          distinction changes the equation and the health interpretation).
        title: Indoor or Outdoor Regime
        examples:
        - value: outdoor
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://www.iso.org/standard/67188.html
        - https://en.wikipedia.org/wiki/Wet-bulb_globe_temperature
        owner: DerivedHeatMetric
        domain_of:
        - DerivedHeatMetric
        range: IndoorOutdoorEnum
        required: true
      wind_speed_measurement_height_m:
        name: wind_speed_measurement_height_m
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: ISO 7243 assumes wind measured at 2 m, but reanalysis products
              usually supply 10 m wind; wind is slower near the ground, so an uncorrected
              10 m input systematically shifts the resulting WBGT.
          explanation:
            tag: explanation
            value: Wind blows faster the higher above the ground you measure it, so
              a "wind speed" is only meaningful together with the height it was taken
              at — this field records that height.
        description: For WBGT and UTCI inputs, the wind-speed measurement height in
          metres. The ISO 7243 standard is 2 m, but reanalysis products often supply
          10 m -- the height affects the WBGT value.
        title: Wind Speed Measurement Height (Metres)
        examples:
        - value: '10'
          description: ERA5 10 m wind used without height adjustment
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://www.iso.org/standard/67188.html
        owner: DerivedHeatMetric
        domain_of:
        - DerivedHeatMetric
        range: float
      wind_speed_measurement_height_m_missing_reason:
        name: wind_speed_measurement_height_m_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Distinguishes "the producer never recorded a measurement height"
              from "it exists upstream but was not extracted" — only the latter is
              recoverable, and only the former precludes a height correction.
          explanation:
            tag: explanation
            value: 'A blank field is ambiguous: it could mean the thing does not exist,
              or that nobody wrote it down. This companion field says which one it
              is.'
        description: Reason `wind_speed_measurement_height_m` is null.
        title: Reason Measurement Height Is Missing
        examples:
        - value: available_but_not_extracted
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DerivedHeatMetric
        domain_of:
        - DerivedHeatMetric
        range: MissingReasonEnum
      solar_radiation_basis:
        name: solar_radiation_basis
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: WBGT and UTCI respond strongly to solar load; whether the sun input
              was a measured shortwave flux, a modelled mean radiant temperature,
              or absent (triggering a fallback formula) changes the value and whether
              two records are comparable at all.
          explanation:
            tag: explanation
            value: How much sunshine hits a person is part of how hot they feel, and
              datasets represent "sunshine" in different ways — or not at all. This
              says which representation fed the calculation.
        description: For WBGT / UTCI inputs, the basis used for solar radiation.
        title: Solar Radiation Basis
        examples:
        - value: surface_downwelling_shortwave_flux
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DerivedHeatMetric
        domain_of:
        - DerivedHeatMetric
        range: SolarRadiationBasisEnum
      solar_radiation_basis_missing_reason:
        name: solar_radiation_basis_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Distinguishes "the source never stated its radiation basis" from
              "it was not extracted" — deciding whether the ambiguity can be resolved
              by going back to the source or is permanent.
          explanation:
            tag: explanation
            value: 'A blank field is ambiguous: it could mean the thing does not exist,
              or that nobody wrote it down. This companion field says which one it
              is.'
        description: Reason `solar_radiation_basis` is null.
        title: Reason Radiation Basis Is Missing
        examples:
        - value: not_provided_by_source
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DerivedHeatMetric
        domain_of:
        - DerivedHeatMetric
        range: MissingReasonEnum
      heat_wave_threshold_definition:
        name: heat_wave_threshold_definition
        annotations:
          tier:
            tag: tier
            value: conditionally_core
          justification:
            tag: justification
            value: At least seven heat-wave definitions are in active use and none
              are convertible after the fact; two definitions can disagree on most
              flagged days, which changes both the exposure series and the resulting
              mortality estimate.
          explanation:
            tag: explanation
            value: There is no universal definition of a heat wave. "Above 35 °C"
              and "hotter than 95 % of days usually are here" are both in use and
              flag different days — this field records which rulebook was applied.
        description: For heat-wave flags, the definition of the threshold (absolute,
          percentile-local, percentile-climatological, NWS advisory, ETCCDI).
        title: Heat-Wave Threshold Definition
        examples:
        - value: percentile_local
          description: 95th percentile of the local Tmax distribution
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://en.wikipedia.org/wiki/Heat_wave
        owner: DerivedHeatMetric
        domain_of:
        - DerivedHeatMetric
        range: HeatWaveThresholdDefinitionEnum
      heat_wave_threshold_definition_missing_reason:
        name: heat_wave_threshold_definition_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Distinguishes "this record is not a heat-wave flag, so no threshold
              definition exists" from "a definition was used but not captured" — the
              first is benign, the second makes the flag unusable.
          explanation:
            tag: explanation
            value: 'A blank field is ambiguous: it could mean the thing does not exist,
              or that nobody wrote it down. This companion field says which one it
              is.'
        description: Reason `heat_wave_threshold_definition` is null.
        title: Reason Threshold Definition Is Missing
        examples:
        - value: not_applicable
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DerivedHeatMetric
        domain_of:
        - DerivedHeatMetric
        range: MissingReasonEnum
      heat_wave_threshold_specifier:
        name: heat_wave_threshold_specifier
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: 'The definition names the rule but not the number: two records
              both marked "percentile_local" are still incomparable unless the concrete
              value (95th vs 90th percentile, 35 vs 40 °C) is recorded here.'
          explanation:
            tag: explanation
            value: The threshold definition is the type of cutoff; this is the actual
              number plugged into it — like knowing a speed limit exists versus knowing
              it is 50.
        description: Free-form specifier paired with `heat_wave_threshold_definition`
          to capture the concrete threshold values (e.g. `"35_Cel"` for an absolute
          threshold, `"95"` for the 95th percentile).
        title: Heat-Wave Threshold Specifier
        examples:
        - value: '95'
          description: percentile, paired with heat_wave_threshold_definition = percentile_local
        - value: 35_Cel
          description: absolute threshold, paired with heat_wave_threshold_definition
            = absolute
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DerivedHeatMetric
        domain_of:
        - DerivedHeatMetric
        range: string
      heat_wave_min_consecutive_days:
        name: heat_wave_min_consecutive_days
        annotations:
          tier:
            tag: tier
            value: conditionally_core
          justification:
            tag: justification
            value: A 2-day rule and a 3-day rule flag different sets of days from
              the same temperature series, changing which person-days count as heat-wave-exposed
              and therefore the effect estimates built on them.
          explanation:
            tag: explanation
            value: A heat wave means it stays hot for several days in a row — but
              how many days count as "several" is a choice (usually 2 or 3), and the
              choice changes which days get flagged.
        description: Minimum-consecutive-days rule for heat-wave flags (commonly 2
          or 3). Changes which days are flagged.
        title: Heat-Wave Minimum Consecutive Days
        examples:
        - value: '3'
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DerivedHeatMetric
        domain_of:
        - DerivedHeatMetric
        range: integer
      heat_wave_min_consecutive_days_missing_reason:
        name: heat_wave_min_consecutive_days_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Distinguishes "not a heat-wave flag, so no consecutive-days rule
              applies" from "a rule was applied but not recorded" — only the latter
              undermines reuse of the flag.
          explanation:
            tag: explanation
            value: 'A blank field is ambiguous: it could mean the thing does not exist,
              or that nobody wrote it down. This companion field says which one it
              is.'
        description: Reason `heat_wave_min_consecutive_days` is null.
        title: Reason Consecutive Days Is Missing
        examples:
        - value: not_applicable
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DerivedHeatMetric
        domain_of:
        - DerivedHeatMetric
        range: MissingReasonEnum
      percentile_reference_period_start:
        name: percentile_reference_period_start
        annotations:
          tier:
            tag: tier
            value: conditionally_core
          justification:
            tag: justification
            value: In a warming climate a "95th percentile" computed over 1971-2000
              is a materially different threshold than one over 2000-2019; leaving
              the baseline unstated makes percentile-based studies non-comparable
              and non-reproducible.
          explanation:
            tag: explanation
            value: '"Unusually hot" means hot compared to some stretch of past years.
              Which years you compare against changes what counts as unusual — this
              field records where that stretch begins.'
        description: 'Start of the reference distribution used for percentile-based
          thresholds. Mandatory for percentile metrics: "95th percentile" over 2000-2019
          gives a different threshold than 1980-2010, and this delta is real.'
        title: Percentile Reference Period Start
        examples:
        - value: '1991-01-01'
          description: start of the 1991-2020 climate-normal baseline
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://www.ncei.noaa.gov/products/land-based-station/us-climate-normals
        owner: DerivedHeatMetric
        domain_of:
        - DerivedHeatMetric
        range: date
      percentile_reference_period_start_missing_reason:
        name: percentile_reference_period_start_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Distinguishes "not a percentile-based metric, so no baseline exists"
              from "a baseline was used but not captured" — without the reason, a
              consumer cannot tell a benign blank from a blocking one.
          explanation:
            tag: explanation
            value: 'A blank field is ambiguous: it could mean the thing does not exist,
              or that nobody wrote it down. This companion field says which one it
              is.'
        description: Reason `percentile_reference_period_start` is null.
        title: Reason Period Start Is Missing
        examples:
        - value: not_applicable
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DerivedHeatMetric
        domain_of:
        - DerivedHeatMetric
        range: MissingReasonEnum
      percentile_reference_period_end:
        name: percentile_reference_period_end
        annotations:
          tier:
            tag: tier
            value: conditionally_core
          justification:
            tag: justification
            value: Together with the start date this pins down the reference distribution;
              an end date that includes or excludes the most recent warm years shifts
              the percentile threshold, so an open-ended baseline is not reproducible.
          explanation:
            tag: explanation
            value: The other end of the stretch of past years used as the comparison
              — start and end together say exactly which years define "normal".
        description: End of the reference distribution.
        title: Percentile Reference Period End
        examples:
        - value: '2020-12-31'
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DerivedHeatMetric
        domain_of:
        - DerivedHeatMetric
        range: date
      percentile_reference_period_end_missing_reason:
        name: percentile_reference_period_end_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Distinguishes "no percentile baseline applies to this metric" from
              "the baseline end was used but never recorded" — deciding whether the
              threshold is merely undocumented or genuinely absent.
          explanation:
            tag: explanation
            value: 'A blank field is ambiguous: it could mean the thing does not exist,
              or that nobody wrote it down. This companion field says which one it
              is.'
        description: Reason `percentile_reference_period_end` is null.
        title: Reason Period End Is Missing
        examples:
        - value: not_applicable
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DerivedHeatMetric
        domain_of:
        - DerivedHeatMetric
        range: MissingReasonEnum
      percentile_reference_geographic_scope:
        name: percentile_reference_geographic_scope
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: A 95th percentile computed over one county and one computed over
              the whole nation are very different thresholds; the scope is what encodes
              "hot for here", and without it the threshold cannot be reproduced or
              compared across studies.
          explanation:
            tag: explanation
            value: '"Unusually hot" can mean hot compared to what is normal HERE,
              or compared to the whole country. This field says which area''s history
              the comparison was made against.'
        description: Geographic scope over which the reference distribution was computed.
          One of `local_tract`, `local_county`, `local_climate_region`, `national`.
        title: Percentile Reference Geographic Scope
        examples:
        - value: local_county
          description: reference distribution computed over Maricopa County
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DerivedHeatMetric
        domain_of:
        - DerivedHeatMetric
        range: string
      percentile_reference_geographic_scope_missing_reason:
        name: percentile_reference_geographic_scope_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Distinguishes "the source never stated its baseline geography"
              from "it was not extracted" — telling consumers whether the ambiguity
              is recoverable from the source or permanent.
          explanation:
            tag: explanation
            value: 'A blank field is ambiguous: it could mean the thing does not exist,
              or that nobody wrote it down. This companion field says which one it
              is.'
        description: Reason `percentile_reference_geographic_scope` is null.
        title: Reason Geographic Scope Is Missing
        examples:
        - value: not_provided_by_source
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DerivedHeatMetric
        domain_of:
        - DerivedHeatMetric
        range: MissingReasonEnum
      percentile_reference_seasonal_window:
        name: percentile_reference_seasonal_window
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: An annual reference distribution includes winter days and drags
              the 95th percentile far below a warm-season-only percentile; two thresholds
              that sound identical diverge substantially when the seasonal window
              is left unstated.
          explanation:
            tag: explanation
            value: Whether "normal" includes the whole year or only the summer months
              changes what counts as unusually hot — a day that is extreme against
              summer-only history may be unremarkable against the full year.
        description: Seasonal window over which the reference was computed. One of
          `annual`, `warm_season_may_sep`, `calendar_month`.
        title: Percentile Reference Seasonal Window
        examples:
        - value: warm_season_may_sep
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DerivedHeatMetric
        domain_of:
        - DerivedHeatMetric
        range: string
      percentile_reference_seasonal_window_missing_reason:
        name: percentile_reference_seasonal_window_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Distinguishes "the source never stated its seasonal window" from
              "it was not extracted" — so consumers know whether asking the producer
              could still recover it.
          explanation:
            tag: explanation
            value: 'A blank field is ambiguous: it could mean the thing does not exist,
              or that nobody wrote it down. This companion field says which one it
              is.'
        description: Reason `percentile_reference_seasonal_window` is null.
        title: Reason Seasonal Window Is Missing
        examples:
        - value: not_provided_by_source
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DerivedHeatMetric
        domain_of:
        - DerivedHeatMetric
        range: MissingReasonEnum
      metric_temporal_aggregation_rule:
        name: metric_temporal_aggregation_rule
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Stamping a five-day event only on its first day versus on every
              day changes which person-days count as exposed, directly altering effect
              estimates in daily time-series and case-crossover designs.
          explanation:
            tag: explanation
            value: A heat wave spans several days but health records are kept day
              by day; this says which calendar days actually get the "heat wave" label
              — just the first day, every day, or the last.
        description: For heat-wave flags, how multi-day exposures are stamped on individual
          days (e.g. `first_day_of_event` / `each_day_of_event` / `last_day_of_event`).
        title: Metric Temporal Aggregation Rule
        examples:
        - value: each_day_of_event
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DerivedHeatMetric
        domain_of:
        - DerivedHeatMetric
        range: string
      metric_temporal_aggregation_rule_missing_reason:
        name: metric_temporal_aggregation_rule_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Distinguishes "no multi-day stamping rule applies to this metric"
              from "a rule was applied but never captured" — only the latter makes
              the daily exposure series ambiguous.
          explanation:
            tag: explanation
            value: 'A blank field is ambiguous: it could mean the thing does not exist,
              or that nobody wrote it down. This companion field says which one it
              is.'
        description: Reason `metric_temporal_aggregation_rule` is null.
        title: Reason Aggregation Rule Is Missing
        examples:
        - value: available_but_not_extracted
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DerivedHeatMetric
        domain_of:
        - DerivedHeatMetric
        range: MissingReasonEnum
  EquationInput:
    name: EquationInput
    annotations:
      domain_of_use:
        tag: domain_of_use
        value: environmental_exposure
    description: 'A single physical-state input to a derived heat metric, recorded
      as a typed reference into the provenance chain rather than an inline copy of
      the input''s metadata. It names the input''s role (a CF standard name) and points,
      via `input_provenance_id`, to the upstream sidecar that carries that input''s
      full spatial / temporal / model context.

      This is the Option-B decomposition: when a multi-input metric (Heat Index from
      T + RH; WBGT from T + RH + wind + radiation) draws its inputs from different
      products that diverge in resolution, day-boundary convention, or temporal aggregation,
      each input remains its own full sidecar — listed here and as a step in `provenance_chain`
      — so the divergence stays explicit and machine-checkable instead of being silently
      absorbed into the single output value.'
    title: Equation Input
    from_schema: https://w3id.org/linkml/microschemas/envar
    see_also:
    - https://cfconventions.org/
    slots:
    - input_role
    - input_provenance_id
    - input_source_short_code
    slot_usage:
      input_role:
        name: input_role
        required: true
      input_provenance_id:
        name: input_provenance_id
        required: true
    attributes:
      input_role:
        name: input_role
        annotations:
          tier:
            tag: tier
            value: conditionally_core
          justification:
            tag: justification
            value: Without a named role, a consumer cannot tell which physical quantity
              each referenced input supplied to the equation, so inputs cannot be
              matched to equation terms and cross-input consistency checks cannot
              run.
          explanation:
            tag: explanation
            value: This labels what each ingredient actually is — temperature versus
              humidity versus wind — using a shared standard vocabulary so that machines
              and people read the label the same way.
        description: The standard-name local token of this input's physical quantity
          (the same quantity the referenced sidecar carries in `standard_name`), e.g.
          `air_temperature`, `relative_humidity`, `wind_speed`, `surface_downwelling_shortwave_flux_in_air`.
        title: Input Role
        examples:
        - value: air_temperature
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://cfconventions.org/
        owner: EquationInput
        domain_of:
        - EquationInput
        range: string
        required: true
      input_provenance_id:
        name: input_provenance_id
        annotations:
          tier:
            tag: tier
            value: conditionally_core
          justification:
            tag: justification
            value: This is the only machine-followable link from an input back to
              its full spatial, temporal, and model context; without it, divergences
              between inputs in resolution, day-boundary convention, or aggregation
              cannot be detected at all.
          explanation:
            tag: explanation
            value: 'Think of it as a tracking number: instead of copying all the details
              of the ingredient into this record, we store a pointer to the record
              that already holds them, and anyone can follow the pointer.'
        description: The `provenance_id` of the upstream sidecar that fully describes
          this input — its source dataset, spatial / temporal reference, and exposure
          model. Dereferencing it lets a consumer (or the completeness checker) compare
          inputs and surface any divergence in resolution, day-boundary convention,
          or temporal aggregation.
        title: Input Provenance ID
        examples:
        - value: 01HFA7K8R3M6XP-daymet-tmax
          description: provenance_id of the upstream Daymet Tmax sidecar
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://www.w3.org/TR/prov-o/
        owner: EquationInput
        domain_of:
        - EquationInput
        range: string
        required: true
      input_source_short_code:
        name: input_source_short_code
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Lets a human scanning the record see at a glance which product
              each input came from without dereferencing every provenance id; because
              it is a non-authoritative duplicate, omitting it costs readability,
              not machine-checkability.
          explanation:
            tag: explanation
            value: A friendly nickname for the dataset an ingredient came from (like
              "daymet_v4"), written next to the tracking number so people do not have
              to look everything up just to get oriented.
        description: Human-readable short code of the input's source product (e.g.
          `daymet_v4`, `era5`), duplicated from the referenced sidecar for convenience
          when scanning the record. Not authoritative — `input_provenance_id` is.
        title: Input Source Short Code
        examples:
        - value: daymet_v4
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: EquationInput
        domain_of:
        - EquationInput
        range: string
  HealthLayerLinkage:
    name: HealthLayerLinkage
    annotations:
      domain_of_use:
        tag: domain_of_use
        value: environmental_exposure
    description: Hooks the sidecar uses to be findable from a downstream health-data
      layer (OMOP, BioData Catalyst, …). These are *not* clinical metadata — they
      are the hooks the exposure record needs so a health-side row can resolve back
      to its provenance. The target layer is named in `health_layer_target`, so no
      single model is privileged. One per record.
    title: Health-Layer Linkage
    from_schema: https://w3id.org/linkml/microschemas/envar
    see_also:
    - https://ohdsi.github.io/CommonDataModel/
    - https://biodatacatalyst.nhlbi.nih.gov/
    slots:
    - health_layer_target
    - health_layer_link_field
    - cohort_size_anchored
    - cohort_size_anchored_missing_reason
    attributes:
      health_layer_target:
        name: health_layer_target
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Without naming the target layer, `health_layer_link_field` is ambiguous
              — a consumer cannot know which data model the link field belongs to,
              so the exposure record cannot be reliably resolved from the health side.
              Naming the target in a slot (rather than baking it into slot names)
              is also what keeps the schema neutral across health data models.
          explanation:
            tag: explanation
            value: Health records are stored in different standard formats — for example
              OMOP, a widely used common format for health records, so tools written
              for one hospital's data work on another's. This slot simply says which
              of those formats this exposure record is meant to plug into.
        description: The downstream health-data layer this sidecar links into. Names
          the target so `health_layer_link_field` is interpreted against the right
          model.
        title: Target Health-Data Layer
        examples:
        - value: omop_external_exposure
          description: OMOP CDM via the OHDSI GIS `external_exposure` table extension
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://ohdsi.github.io/CommonDataModel/
        owner: HealthLayerLinkage
        domain_of:
        - HealthLayerLinkage
        range: HealthLayerTargetEnum
      health_layer_link_field:
        name: health_layer_link_field
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: 'This is the join key declaration: it names the exact field in
              the health-data layer that holds this record''s `provenance_id`. Without
              it, exposure rows cannot be joined back to patients in the health data
              model, and a health-side row cannot resolve to its exposure provenance.'
          explanation:
            tag: explanation
            value: Think of the exposure record and the patient database as two spreadsheets
              that need to be matched up. This slot names the column in the patient-side
              spreadsheet that holds the matching ID, so anyone can connect the two
              tables without guessing.
        description: Name of the field in the target health-data layer that carries
          `provenance_id`. For OMOP this is `external_exposure.exposure_source_value`
          (the default); other layers name their own field.
        title: Health-Layer Link Field
        examples:
        - value: exposure_source_value
          description: the OMOP `external_exposure` field that carries `provenance_id`
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://ohdsi.github.io/CommonDataModel/
        owner: HealthLayerLinkage
        domain_of:
        - HealthLayerLinkage
        range: string
      cohort_size_anchored:
        name: cohort_size_anchored
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: 'Gives downstream consumers a volume expectation: without it, a
              health-layer loader cannot sanity-check whether the number of exposure
              rows it receives matches the number of persons the record was extracted
              for, so silent truncation or duplication goes unnoticed.'
          explanation:
            tag: explanation
            value: 'This is simply a head count: how many different people this exposure
              record covers. It lets whoever receives the data check that nothing
              went missing along the way.'
        description: Number of distinct persons this exposure record was extracted
          for. Helps downstream estimate the volume of health-layer rows the sidecar
          describes.
        title: Anchored Cohort Size
        examples:
        - value: '3'
          description: three cohort members in the worked Phoenix example
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: HealthLayerLinkage
        domain_of:
        - HealthLayerLinkage
        range: integer
      cohort_size_anchored_missing_reason:
        name: cohort_size_anchored_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Distinguishes "the cohort size is genuinely unknown" from "the
              pipeline just did not record it". Without the reason, a null count is
              uninterpretable and downstream users cannot tell whether to chase the
              number or accept its absence.
          explanation:
            tag: explanation
            value: When the head count is missing, this slot says why — for example,
              the tool could have counted but did not, or counting simply does not
              apply. An explained blank is far more useful than a silent one.
        description: Reason `cohort_size_anchored` is null.
        title: Reason Cohort Size Is Missing
        examples:
        - value: available_but_not_extracted
          description: the pipeline could count anchored persons but does not yet
            surface it
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: HealthLayerLinkage
        domain_of:
        - HealthLayerLinkage
        range: MissingReasonEnum
  DepositMetadata:
    name: DepositMetadata
    annotations:
      domain_of_use:
        tag: domain_of_use
        value: environmental_exposure
    description: Deposit-time slots required when the sidecar travels alongside a
      published FAIR object (Zenodo / Dryad / C-HER / etc.). Most slots are pulled
      from other modules; this class names the required-for-deposit subset and adds
      a few deposit-specific slots.
    title: Deposit Metadata
    from_schema: https://w3id.org/linkml/microschemas/envar
    see_also:
    - https://www.go-fair.org/fair-principles/
    - https://zenodo.org/
    slots:
    - deposit_doi
    - deposit_doi_missing_reason
    - deposit_repository
    - deposit_repository_missing_reason
    - deposit_license_spdx
    - deposit_redistribution_constraints_inherited
    - recommended_citation
    - dcat_distribution_url
    - dcat_distribution_url_missing_reason
    attributes:
      deposit_doi:
        name: deposit_doi
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: The DOI is the permanent, citable identifier of the published deposit
              — the F in FAIR. Without it the record cannot be cited, found in catalogues,
              or re-retrieved once the original download link rots.
          explanation:
            tag: explanation
            value: A DOI is a permanent ID for a published dataset, like an ISBN for
              a book. Whatever happens to the hosting website, the DOI keeps pointing
              to the dataset, so people can always find and cite it.
        description: DOI assigned by the deposit repository (e.g. Zenodo).
        title: Deposit DOI (Digital Object Identifier)
        examples:
        - value: 10.5281/zenodo.9999999
          description: illustrative Zenodo DOI from the worked Daymet Tmax example
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://www.doi.org/
        - https://zenodo.org/
        owner: DepositMetadata
        domain_of:
        - DepositMetadata
        range: string
      deposit_doi_missing_reason:
        name: deposit_doi_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Separates "this record was never deposited" from "the DOI is pending".
              Without it, a missing DOI is ambiguous and a consumer cannot tell whether
              a citable identifier will ever exist for this record.
          explanation:
            tag: explanation
            value: If the permanent dataset ID is missing, this slot explains why
              — for instance the record is circulating before publication and the
              ID has not been issued yet.
        description: Reason `deposit_doi` is null (e.g. pre-deposit).
        title: Reason Deposit DOI Is Missing
        examples:
        - value: under_investigation
          description: sidecar circulated pre-deposit; DOI pending
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DepositMetadata
        domain_of:
        - DepositMetadata
        range: MissingReasonEnum
      deposit_repository:
        name: deposit_repository
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Names where the deposited object actually lives, which determines
              access routes, retention guarantees, and how the DOI resolves. Without
              it, the deposit's accessibility (the A in FAIR) rests on the DOI alone
              and cannot be assessed.
          explanation:
            tag: explanation
            value: A deposit repository is a public archive for research data — a
              place like Zenodo where a dataset is published with a permanent ID and
              kept available long-term. This slot records which archive was used.
        description: Repository hosting the deposit.
        title: Deposit Repository
        examples:
        - value: zenodo
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://zenodo.org/
        owner: DepositMetadata
        domain_of:
        - DepositMetadata
        range: DepositRepositoryEnum
      deposit_repository_missing_reason:
        name: deposit_repository_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: 'Makes an absent repository name interpretable: most records are
              never deposited, and this slot records that this is deliberate rather
              than an oversight, so completeness checks do not raise false alarms.'
          explanation:
            tag: explanation
            value: If no archive is named, this slot says why — most often because
              the record was never meant to be published as a standalone dataset in
              the first place.
        description: Reason `deposit_repository` is null.
        title: Reason Deposit Repository Is Missing
        examples:
        - value: not_applicable
          description: the record is not published as a standalone FAIR deposit
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DepositMetadata
        domain_of:
        - DepositMetadata
        range: MissingReasonEnum
      deposit_license_spdx:
        name: deposit_license_spdx
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: States, in a machine-readable form, what a reuser is legally allowed
              to do with the published exposure record. Without it, reuse of the deposit
              is legally uncertain and cautious downstream users must treat the data
              as all-rights-reserved — the R in FAIR fails.
          explanation:
            tag: explanation
            value: A license is the legal permission slip attached to the data — for
              example "you may reuse this if you credit the authors". SPDX is just
              a standard list of short codes for licenses (like CC-BY-4.0), so software
              can read the terms without a lawyer.
        description: SPDX identifier of the license under which the *derived* exposure
          record (not the source) is published.
        title: Deposit License (SPDX Identifier)
        examples:
        - value: CC-BY-4.0
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://spdx.org/licenses/
        owner: DepositMetadata
        domain_of:
        - DepositMetadata
        range: string
      deposit_redistribution_constraints_inherited:
        name: deposit_redistribution_constraints_inherited
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: A derived product can carry restrictions from its inputs even when
              its own license is permissive; without recording them, a deposit may
              violate an upstream license — for example by redistributing grids the
              source forbids sharing. An explicit empty list positively asserts that
              nothing passes through.
          explanation:
            tag: explanation
            value: Datasets built from other datasets can inherit rules from their
              ingredients, the way a recipe using someone's secret sauce may come
              with strings attached. This slot lists any such inherited rules so nobody
              accidentally breaks them when sharing the result.
        description: Constraints from any input source that pass through to the deposit.
        title: Inherited Redistribution Constraints
        examples:
        - value: no redistribution of raw PRISM grids
          description: one inherited pass-through constraint (list element); an empty
            list is also valid and asserts that no constraints pass through
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://spdx.org/licenses/
        owner: DepositMetadata
        domain_of:
        - DepositMetadata
        range: string
        multivalued: true
      recommended_citation:
        name: recommended_citation
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: 'A ready-made citation lowers the barrier to correct attribution:
              without it, reusers assemble citations by hand, producing inconsistent
              references that break citation tracking and deprive the producers of
              credit for the deposit.'
          explanation:
            tag: explanation
            value: This is the one-line "how to credit us" text, like the suggested
              citation on the back of a report. Anyone reusing the dataset can copy
              it verbatim into their paper.
        description: One-line recommended citation derived from the slots above.
        title: Recommended Citation
        examples:
        - value: EnVar exposure record for cohort:phoenix_aki_2022 daily Tmax (Daymet
            V4), 2026. Deposited at Zenodo, doi:10.5281/zenodo.9999999.
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DepositMetadata
        domain_of:
        - DepositMetadata
        range: string
      dcat_distribution_url:
        name: dcat_distribution_url
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: 'This is the machine-actionable download hook for data catalogues:
              with it, the deposit can be indexed and fetched by DCAT-speaking catalogue
              software without human mediation. Without it, the record is findable
              by humans (via the DOI) but invisible to automated catalogue harvesting.'
          explanation:
            tag: explanation
            value: DCAT is a standard way for data catalogues — searchable indexes
              of datasets, like a library catalogue — to describe where a file can
              be downloaded. This slot holds that direct download address so catalogue
              software can list and fetch the data automatically.
        description: DCAT-compatible distribution URL for catalogue integration.
        title: Data-Catalog (DCAT) Distribution URL
        examples:
        - value: https://zenodo.org/record/9999999/files/tmax_phoenix.parquet
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://www.w3.org/TR/vocab-dcat-3/
        owner: DepositMetadata
        domain_of:
        - DepositMetadata
        range: uri
      dcat_distribution_url_missing_reason:
        name: dcat_distribution_url_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Records whether the absence of a catalogue link is deliberate (the
              record is simply not catalogued) or a gap to be filled, so automated
              FAIR-ness assessments do not misreport an intentional omission as missing
              metadata.
          explanation:
            tag: explanation
            value: If there is no catalogue download link, this slot explains why
              — usually because the dataset was never registered in a data catalogue
              at all.
        description: Reason `dcat_distribution_url` is null.
        title: Reason Distribution URL Is Missing
        examples:
        - value: not_applicable
          description: the record is not registered in a DCAT catalogue
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DepositMetadata
        domain_of:
        - DepositMetadata
        range: MissingReasonEnum
  EnvironmentalExposureRecord:
    name: EnvironmentalExposureRecord
    instantiates:
    - MicroschemaDefinition
    annotations:
      domain_of_use:
        tag: domain_of_use
        value: environmental_exposure
    description: 'A single environmental-exposure record sidecar: the complete metadata
      graph that travels alongside a value (or value series) emitted by an upstream
      tool. Composes variable identity, data layout, spatial / temporal reference,
      source dataset, exposure model, uncertainty, linkage, tool run, provenance chain,
      optional derived-heat-metric methodology, health-data-layer linkage hooks, and
      FAIR-deposit metadata.'
    title: Environmental Exposure Record
    from_schema: https://w3id.org/linkml/microschemas/envar
    see_also:
    - https://github.com/linkml/linkml-microschema-profile
    slots:
    - subject
    - variable_identity
    - spatial_reference
    - temporal_reference
    - exposure_model
    - uncertainty
    - derived_heat_metric
    - data_layout
    - source_dataset
    - tool_run
    - provenance_chain
    - linkage_method
    - health_layer_linkage
    - deposit_metadata
    - schema_version
    - provenance_id
    - phi_status
    slot_usage:
      subject:
        name: subject
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: An exposure value is meaningless without knowing whose exposure
              it is. The opaque handle is what lets the sidecar be joined back to
              the right cohort or patient in the health-data layer while staying PHI-free.
          explanation:
            tag: explanation
            value: Who (or what group) the values belong to — a study cohort or an
              individual patient, named by an anonymous code rather than anything
              identifying.
          open_question:
            tag: open_question
            value: '`subject` is the only field in this group that is not a per-value
              predicate: every other field explains an individual value, but a single
              scalar subject is dataset-scoped and cannot distribute over the sidecar''s
              rows (per-row subject identity lives in `subject_column`). Under review
              — should it be dropped, or demoted to a dataset-level cohort handle?
              Feedback welcome.'
        description: The patient or cohort the exposure value is attached to. Carried
          as an opaque identifier; PHI must not appear here.
        title: Subject (Patient or Cohort)
        examples:
        - value: cohort:phoenix_aki_2022
          description: an opaque cohort handle — no PHI
        slot_group: exposure_description
        range: string
      schema_version:
        name: schema_version
        slot_group: record_bookkeeping
      provenance_id:
        name: provenance_id
        slot_group: record_bookkeeping
      phi_status:
        name: phi_status
        slot_group: record_bookkeeping
    attributes:
      subject:
        name: subject
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: An exposure value is meaningless without knowing whose exposure
              it is. The opaque handle is what lets the sidecar be joined back to
              the right cohort or patient in the health-data layer while staying PHI-free.
          explanation:
            tag: explanation
            value: Who (or what group) the values belong to — a study cohort or an
              individual patient, named by an anonymous code rather than anything
              identifying.
          open_question:
            tag: open_question
            value: '`subject` is the only field in this group that is not a per-value
              predicate: every other field explains an individual value, but a single
              scalar subject is dataset-scoped and cannot distribute over the sidecar''s
              rows (per-row subject identity lives in `subject_column`). Under review
              — should it be dropped, or demoted to a dataset-level cohort handle?
              Feedback welcome.'
        description: The patient or cohort the exposure value is attached to. Carried
          as an opaque identifier; PHI must not appear here.
        title: Subject (Patient or Cohort)
        examples:
        - value: cohort:phoenix_aki_2022
          description: an opaque cohort handle — no PHI
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: EnvironmentalExposureRecord
        domain_of:
        - EnvironmentalExposureRecord
        - MicroschemaDefinition
        slot_group: exposure_description
        range: string
        required: true
      variable_identity:
        name: variable_identity
        implements:
        - msprofile:observation_type
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: Without a standard variable identity, "tmax" in one file and "TMAX"
              in another cannot be recognised as the same physical quantity, and unit
              mix-ups (Celsius vs Fahrenheit vs Kelvin) go undetected — pooling and
              cross-study comparison silently break.
          explanation:
            tag: explanation
            value: This block pins down exactly what was measured. Instead of relying
              on a nickname like "tmax", it uses shared vocabularies to say "daily
              maximum air temperature, in degrees Celsius", so any tool or researcher
              reads it the same way.
        description: The variable identity object — what physical quantity is being
          captured. Bound to VariableIdentity (see envar_variable). Readable rename
          of the profile's `observation_type` anatomy slot.
        title: Variable Identity
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            variable_name: tmax
            standard_name: CF:air_temperature
            cf_cell_methods: 'time: maximum'
            units_ucum: Cel
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://cfconventions.org/
        - https://ucum.org/
        aliases:
        - observation_type
        exact_mappings:
        - msprofile:observation_type
        owner: EnvironmentalExposureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: exposure_description
        range: VariableIdentity
        required: true
        inlined: true
      spatial_reference:
        name: spatial_reference
        implements:
        - msprofile:location
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: 'A value without its grid, coordinate system, and extraction method
              cannot be located or compared: a 1 km neighbourhood average and a ~31
              km regional average look identical as numbers but describe very different
              exposures, and the extraction cannot be re-run without the method.'
          explanation:
            tag: explanation
            value: This block says where the number applies and how it was pulled
              out of a map. Environmental data usually comes as a grid of cells covering
              a region; this records how big those cells are and how the value for
              a specific place was picked from them.
        description: Spatial reference object describing the native grid and extraction.
          Bound to SpatialReference (see envar_spatial). Readable rename of the profile's
          `location` anatomy slot.
        title: Spatial Reference
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            native_spatial_resolution_m: 1000
            crs: EPSG:4326
            extraction_method: inverse_distance_weighted_4_nearest_cells
            target_geography_type: point_residence
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://epsg.io/
        aliases:
        - location
        exact_mappings:
        - msprofile:location
        owner: EnvironmentalExposureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: exposure_description
        range: SpatialReference
        required: true
        inlined: true
      temporal_reference:
        name: temporal_reference
        implements:
        - msprofile:temporality
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: 'A "daily maximum" is ambiguous without the day-boundary convention:
              Daymet days end at local midnight while PRISM days end at 12:00 GMT,
              so the same calendar date can cover different physical hours — the most-omitted
              detail in the heat literature and a known source of cross-product disagreement.'
          explanation:
            tag: explanation
            value: 'This block explains the time ruler behind each value: how long
              a period each number summarises (a day, a month), how it was summarised
              (maximum, mean), and — surprisingly important — when a "day" is considered
              to start and end.'
        description: Temporal reference object describing resolution, aggregation,
          and day-boundary convention. Bound to TemporalReference (see envar_temporal).
          Readable rename of the profile's `temporality` anatomy slot.
        title: Temporal Reference
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            temporal_resolution: daily
            temporal_aggregation_method: maximum
            day_boundary_convention: local_midnight
            calendar: gregorian
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://cfconventions.org/
        aliases:
        - temporality
        exact_mappings:
        - msprofile:temporality
        owner: EnvironmentalExposureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: exposure_description
        range: TemporalReference
        required: true
        inlined: true
      exposure_model:
        name: exposure_model
        implements:
        - msprofile:methodology
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: The same quantity can be estimated by station interpolation, satellite
              retrieval, or model reanalysis, each with different inputs and biases;
              without the model description, values from different products get pooled
              as if equivalent and their systematic differences stay invisible.
          explanation:
            tag: explanation
            value: Most exposure values are not direct readings from an instrument
              at someone's house — they are estimates computed from weather stations,
              satellites, or models. This block says which estimation method produced
              the numbers and what went into it.
        description: 'The exposure-model object describing how values were produced.
          Bound to ExposureModel (see envar_model). Readable rename of the profile''s
          `methodology` anatomy slot, narrowed to the model itself: other methodology-adjacent
          concerns (source dataset, tool run, provenance chain, derived heat metric)
          are surfaced as separate envar-extension slots.'
        title: Exposure Model
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            exposure_model_type: spatial_interpolation
            exposure_model_inputs:
            - GHCN-Daily station observations
            exposure_model_paper_doi: 10.3334/ORNLDAAC/2129
            bias_correction_applied: none
        from_schema: https://w3id.org/linkml/microschemas/envar
        aliases:
        - methodology
        exact_mappings:
        - msprofile:methodology
        owner: EnvironmentalExposureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: exposure_description
        range: ExposureModel
        required: true
        inlined: true
      uncertainty:
        name: uncertainty
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Exposure values are model estimates with error; without recorded
              per-value or aggregate uncertainty and missing-data handling, downstream
              analyses treat estimates as exact, and exposure-measurement error propagates
              invisibly into health-effect estimates.
          explanation:
            tag: explanation
            value: No estimate is perfect. This block says how far off the numbers
              might be and what was done about gaps in the data, so users know how
              much confidence to place in each value.
        description: Uncertainty object — see envar_uncertainty.
        title: Uncertainty
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            per_value_uncertainty_type: standard_error
            per_value_uncertainty_units_ucum: Cel
            missing_data_handling_method: spatiotemporal_interpolation
            data_completeness_pct: 100
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: EnvironmentalExposureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: exposure_description
        range: Uncertainty
        inlined: true
      derived_heat_metric:
        name: derived_heat_metric
        annotations:
          tier:
            tag: tier
            value: conditionally_core
          justification:
            tag: justification
            value: Heat metrics like WBGT or Heat Index can be computed by several
              non-equivalent equations from different inputs, and heat-wave flags
              depend on the threshold definition; the heat-epidemiology literature
              flags these choices as the main sources of cross-study disagreement,
              so omitting the block for a heat metric makes the record uncomparable.
          explanation:
            tag: explanation
            value: Some heat measures are not read from a thermometer but calculated
              from several ingredients (temperature, humidity, wind, sunshine) using
              a chosen formula. This block records which formula and ingredients were
              used — it is only needed when the variable is one of these computed
              heat metrics.
        description: Heat-metric methodology, present when the variable is a derived
          heat metric — see envar_heat_metric. Omitted for non-heat variables.
        title: Derived Heat Metric
        examples:
        - description: illustrative outdoor-WBGT methodology block — not part of the
            tmax scenario, where this slot is omitted
          object:
            heat_metric_family: wbgt_outdoor
            equation_variant: liljegren_2008
            indoor_outdoor: outdoor
            solar_radiation_basis: surface_downwelling_shortwave_flux
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: EnvironmentalExposureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: variable_specific_extensions
        range: DerivedHeatMetric
        inlined: true
      data_layout:
        name: data_layout
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: The sidecar describes values that live in a companion CSV/parquet
              file; without the column bindings a consumer cannot tell which column
              holds the values, subjects, or dates, so the metadata is unanchored
              and the data unusable — hence the slot is required.
          explanation:
            tag: explanation
            value: 'The actual numbers live in a separate data table that travels
              with this record. This block is the map between the two: it names which
              column holds the values, which holds the person identifier, which holds
              the date, and so on.'
        description: 'Data-layout object binding this sidecar to the columns of the
          companion data file — see envar_layout. Required: without it a consumer
          cannot locate the values the sidecar describes.'
        title: Data Layout
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            table_orientation: wide
            value_column: tmax
            subject_column: subject_id
            time_column: date
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: EnvironmentalExposureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: dataset_and_provenance
        range: DataLayout
        required: true
        inlined: true
      source_dataset:
        name: source_dataset
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: Without the upstream product's identity, version, DOI, and license,
              the record cannot be cited, its documented biases cannot be looked up,
              and reuse terms are unknown — and two records built from different product
              versions cannot be told apart.
          explanation:
            tag: explanation
            value: Exposure values are derived from a published data product (for
              example Daymet, a daily weather dataset). This block names that product
              precisely — including its version, citation, and license — so anyone
              can find it and check its documentation.
        description: Source dataset object — see envar_source.
        title: Source Dataset
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            source_dataset_name: Daymet V4 Daily Surface Weather Data
            source_dataset_short_code: daymet_v4
            source_dataset_doi: 10.3334/ORNLDAAC/2129
            source_license_spdx: public-domain-us-gov
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://spdx.org/licenses/
        - https://www.doi.org/
        owner: EnvironmentalExposureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: dataset_and_provenance
        range: SourceDataset
        required: true
        inlined: true
      tool_run:
        name: tool_run
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: 'Without the exact tool name, version, container image, parameters,
              and timestamp, the record cannot be re-run: "we used the daymet tool"
              is not reproducible, but a pinned container invocation is.'
          explanation:
            tag: explanation
            value: 'This block is the receipt for the software step that produced
              the values: which program ran, which exact version, with what settings,
              and when. With it, someone else can re-run the same step and get the
              same numbers.'
        description: The current ToolRun — see envar_toolrun.
        title: Tool Run
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            tool_name: daymet
            tool_version: 1.0.0
            container_image_repository: ghcr.io/degauss-org/daymet
            run_timestamp_utc: '2026-05-23T14:18:42Z'
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: EnvironmentalExposureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: dataset_and_provenance
        range: ToolRun
        required: true
        inlined: true
      provenance_chain:
        name: provenance_chain
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: The final tool run is rarely the whole story — downloads, geocoding,
              and intermediate transforms precede it; without the ordered chain back
              to the raw source, end-to-end reproduction and error tracing are impossible
              even when the last step is pinned.
          explanation:
            tag: explanation
            value: Data usually passes through several tools before the final value
              appears — download, geocode, extract. This block lists those earlier
              steps in order, like a chain of custody reaching back to the original
              raw source.
        description: 'Ordered W3C-PROV-style chain of upstream tool runs — see envar_toolrun.
          Recommended (not required): a record is reproducible in principle without
          the full chain, but real reproduction needs it.'
        title: Provenance Chain
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            provenance_chain_terminus_type: raw_source_download
            provenance_chain_steps:
            - tool_name: geocoder
              tool_version: 3.3.0
              run_timestamp_utc: '2026-05-23T14:02:11Z'
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://www.w3.org/TR/prov-o/
        owner: EnvironmentalExposureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: dataset_and_provenance
        range: ProvenanceChain
        inlined: true
      linkage_method:
        name: linkage_method
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: Attaching a place-based value to a person is a lossy, choice-laden
              step (geocoding, point vs buffer extraction, date alignment) — the "linkage
              descriptor" gap the GECC/EIRENE forum names as central. Without it,
              two studies using the same data product can differ solely through undocumented
              joins.
          explanation:
            tag: explanation
            value: Environmental data describes places, but health research is about
              people. This block records how the value for a place was attached to
              a particular person — for example, by looking up the map cell containing
              their home address — since that step involves real choices that affect
              the result.
        description: Linkage-method object — see envar_linkage.
        title: Linkage Method
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            linkage_strategy: point_extraction_at_residence
            address_period_alignment: address_history_from_emr
            clinical_date_assignment_convention: local_midnight
            lag_alignment_applied: none
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: EnvironmentalExposureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: health_data_integration
        range: LinkageMethod
        required: true
        inlined: true
      health_layer_linkage:
        name: health_layer_linkage
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Naming the downstream health-data layer (OMOP, BDC, …) and the
              join field makes the exposure record findable from the clinical side;
              without it the sidecar and the health records it serves drift apart,
              and the link must be reconstructed by hand.
          explanation:
            tag: explanation
            value: Health studies keep patient data in large standard databases. This
              block notes which of those systems the exposure values were wired into
              and through which field, so someone browsing the health data can find
              their way back to this record.
        description: 'Downstream health-data-layer linkage hooks (OMOP, BDC, …) —
          see envar_health_layer. Optional: its members are Recommended/Optional,
          and the Core PHI assertion lives at the record root (`phi_status`).'
        title: Health-Layer Linkage
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            health_layer_target: omop_external_exposure
            health_layer_link_field: exposure_source_value
            cohort_size_anchored: 3
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://ohdsi.github.io/CommonDataModel/
        - https://biodatacatalyst.nhlbi.nih.gov/
        owner: EnvironmentalExposureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: health_data_integration
        range: HealthLayerLinkage
        inlined: true
      deposit_metadata:
        name: deposit_metadata
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: When the sidecar travels with a published deposit, the DOI, repository,
              and license are what make the object findable, citable, and legally
              reusable — omitting them strands a public artifact without citation
              or reuse terms. Optional because most records are never deposited.
          explanation:
            tag: explanation
            value: 'If this record and its data are published in a public archive
              (such as Zenodo), this block holds the publication details: the permanent
              DOI link, where it lives, and the license saying how others may use
              it.'
        description: FAIR-deposit metadata, present when the sidecar is intended to
          travel with a published deposit — see envar_health_layer.
        title: FAIR Deposit Metadata
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            deposit_doi: 10.5281/zenodo.9999999
            deposit_repository: zenodo
            deposit_license_spdx: CC-BY-4.0
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://www.go-fair.org/fair-principles/
        owner: EnvironmentalExposureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: health_data_integration
        range: DepositMetadata
        inlined: true
      schema_version:
        name: schema_version
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: 'Downstream consumers must branch on schema evolution: a parser
              built for one version will silently misread or wrongly reject sidecars
              written against another. Without this slot there is no way to tell which
              iteration of the schema a document targets.'
          explanation:
            tag: explanation
            value: Schemas change over time, like editions of a paper form. This is
              the edition number stamped on the document, so anyone reading it knows
              exactly which version of the form was filled in and can interpret the
              fields accordingly.
        description: The version of the EnVar micro-schema this document conforms
          to. Required on every sidecar so downstream consumers can branch on schema
          evolution.
        title: Schema Version
        examples:
        - value: '0.1'
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://semver.org/
        owner: EnvironmentalExposureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: record_bookkeeping
        range: string
        required: true
      provenance_id:
        name: provenance_id
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: This identifier is what the downstream health-data layer's source-value
              field carries (for OMOP, `external_exposure.exposure_source_value`);
              it is the only hook that links an exposure value in the health layer
              back to its full spatial, temporal, and model provenance. Omit it and
              the value becomes untraceable — its metadata can never be recovered.
          explanation:
            tag: explanation
            value: A unique serial number for this metadata document, like the tracking
              number on a parcel. Wherever the data value ends up, that number lets
              you look up exactly where it came from and how it was made.
        description: Stable identifier for this sidecar / record (ULID recommended).
          This is the value the downstream health-data layer's source-value field
          carries to link a row back to its provenance (for OMOP, that field is `external_exposure.exposure_source_value`).
        title: Record Identifier
        examples:
        - value: 01HFA7K8R3M6XP-daymet-deposit
          description: ULID-based sidecar identifier for the Daymet Tmax deposit
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://github.com/ulid/spec
        - https://ohdsi.github.io/CommonDataModel/
        owner: EnvironmentalExposureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: record_bookkeeping
        range: string
        required: true
      phi_status:
        name: phi_status
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: Sidecars are designed to be PHI-free, and this slot is the explicit
              machine-readable assertion of that. Without it, every sharing, deposit,
              or export step must treat the document as potentially containing patient
              data and re-review it manually before it can leave a protected environment.
          explanation:
            tag: explanation
            value: PHI (protected health information) means private medical details
              about an identifiable person. This flag is a written promise on the
              document saying "no private patient information inside", so it can be
              passed around and published safely.
        description: Whether the sidecar carries any Protected Health Information.
          A record-level safety assertion; by design, sidecars are PHI-free.
        title: PHI Status
        examples:
        - value: no_phi
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://www.hhs.gov/hipaa/for-professionals/privacy/index.html
        owner: EnvironmentalExposureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: record_bookkeeping
        range: PhiStatusEnum
        required: true
    tree_root: true
  MicroschemaDefinition:
    name: MicroschemaDefinition
    annotations:
      must_not_have_id_slot:
        tag: must_not_have_id_slot
        value: true
      must_be_inlined:
        tag: must_be_inlined
        value: true
    description: A metaclass for classes that conform to the Microschema profile.
      Classes that instantiate this are designed for inline composition.
    comments:
    - Classes instantiating this SHOULD NOT have identifier slots
    - Classes instantiating this SHOULD be used with inlined=true
    - Classes instantiating this MAY compose other microschemas via attributes
    from_schema: https://w3id.org/linkml/microschemas/envar
    abstract: true
    slots:
    - profile_version
    - domain_of_use
    - subject
    - observation_type
    - location
    - temporality
    - methodology
    - observation_result
    attributes:
      profile_version:
        name: profile_version
        description: Version of microschema profile this conforms to
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: MicroschemaDefinition
        domain_of:
        - MicroschemaDefinition
        range: string
      domain_of_use:
        name: domain_of_use
        description: Domains where this microschema is applicable
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: MicroschemaDefinition
        domain_of:
        - MicroschemaDefinition
        range: string
        multivalued: true
      subject:
        name: subject
        description: Entity being measured, observed, or interviewed - person, animal,
          specimen, or environmental material
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: MicroschemaDefinition
        domain_of:
        - EnvironmentalExposureRecord
        - MicroschemaDefinition
        range: string
        required: true
      observation_type:
        name: observation_type
        description: Question being asked, measurement being taken, quality being
          observed
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: MicroschemaDefinition
        domain_of:
        - MicroschemaDefinition
        range: string
        required: true
      location:
        name: location
        description: Spatial metadata specifying where the observation was made -
          geolocation, place name, site id, environment, or biome
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: MicroschemaDefinition
        domain_of:
        - MicroschemaDefinition
        range: string
        required: true
      temporality:
        name: temporality
        description: Temporal metadata specifying when an observation was made. This
          can be relative or absolute - datetime, age of person, season, or geologic
          era
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: MicroschemaDefinition
        domain_of:
        - MicroschemaDefinition
        range: string
        required: true
      methodology:
        name: methodology
        description: Information about how an observation was made - method, instrument,
          reagent kit, statistical modifier
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: MicroschemaDefinition
        domain_of:
        - MicroschemaDefinition
        range: string
        required: true
      observation_result:
        name: observation_result
        description: The outcome of the observation type - answer, value, result,
          determination
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: MicroschemaDefinition
        domain_of:
        - MicroschemaDefinition
        range: ValueMicroschemaDefinition
        required: true
  ValueMicroschemaDefinition:
    name: ValueMicroschemaDefinition
    annotations:
      must_not_have_id_slot:
        tag: must_not_have_id_slot
        value: true
      must_be_inlined:
        tag: must_be_inlined
        value: true
    description: 'A microschema representing a typed value with optional unit/system.
      Examples: Quantity, Timepoint, CodedValue, Range. This is the range for observation
      result'
    comments:
    - Classes instantiating this SHOULD NOT have identifier slots
    - Classes instantiating this SHOULD be used with inlined=true
    - Classes instantiating this MAY compose other microschemas via attributes
    from_schema: https://w3id.org/linkml/microschemas/envar
    abstract: true
  Quantity:
    name: Quantity
    instantiates:
    - ValueMicroschemaDefinition
    description: A numerical value with unit
    from_schema: https://w3id.org/linkml/microschemas/envar
    slots:
    - quantity_value
    - quantity_unit
    - comparator
    attributes:
      quantity_value:
        name: quantity_value
        description: The numeric value
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: Quantity
        domain_of:
        - Quantity
        range: decimal
        required: true
      quantity_unit:
        name: quantity_unit
        description: Unit (UCUM, UO, QUDT, etc.)
        from_schema: https://w3id.org/linkml/microschemas/envar
        slot_uri: schema:unitCode
        owner: Quantity
        domain_of:
        - Quantity
        range: uriorcurie
        required: true
      comparator:
        name: comparator
        description: Comparison operator (less than, greater than, etc.) or exact
          if null
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: Quantity
        domain_of:
        - Quantity
        range: ComparatorEnum
  Timepoint:
    name: Timepoint
    instantiates:
    - ValueMicroschemaDefinition
    description: A point in time, potentially relative
    from_schema: https://w3id.org/linkml/microschemas/envar
    slots:
    - datetime
    - relative_to_event
    - offset
    - subject_age
    attributes:
      datetime:
        name: datetime
        description: Absolute timestamp
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: Timepoint
        domain_of:
        - Timepoint
        range: datetime
      relative_to_event:
        name: relative_to_event
        description: Event this is relative to
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: Timepoint
        domain_of:
        - Timepoint
        range: uriorcurie
      offset:
        name: offset
        description: Offset from event (e.g., "+3 days")
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: Timepoint
        domain_of:
        - Timepoint
        range: Quantity
        inlined: true
      subject_age:
        name: subject_age
        description: Age of the subject at this timepoint (e.g., age when the event
          occurred)
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: Timepoint
        domain_of:
        - Timepoint
        range: Quantity
        inlined: true
  TimeInterval:
    name: TimeInterval
    instantiates:
    - ValueMicroschemaDefinition
    description: A period between two timepoints
    from_schema: https://w3id.org/linkml/microschemas/envar
    slots:
    - interval_start
    - interval_end
    - duration
    attributes:
      interval_start:
        name: interval_start
        description: Start of the interval
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: TimeInterval
        domain_of:
        - TimeInterval
        range: Timepoint
        inlined: true
      interval_end:
        name: interval_end
        description: End of the interval
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: TimeInterval
        domain_of:
        - TimeInterval
        range: Timepoint
        inlined: true
      duration:
        name: duration
        description: Duration as alternative to start/end
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: TimeInterval
        domain_of:
        - TimeInterval
        range: Quantity
        inlined: true
  CodedValue:
    name: CodedValue
    instantiates:
    - ValueMicroschemaDefinition
    description: A value from a controlled vocabulary
    from_schema: https://w3id.org/linkml/microschemas/envar
    slots:
    - code
    - code_label
    - code_system
    attributes:
      code:
        name: code
        description: The code value as a CURIE
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: CodedValue
        domain_of:
        - CodedValue
        range: uriorcurie
        required: true
      code_label:
        name: code_label
        description: Human-readable label for the code
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: CodedValue
        domain_of:
        - CodedValue
        range: string
      code_system:
        name: code_system
        description: The code system URI
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: CodedValue
        domain_of:
        - CodedValue
        range: uriorcurie
  DailyMaxTemperatureRecord:
    name: DailyMaxTemperatureRecord
    description: 'Canonical record for daily maximum 2 m air temperature (Tmax). Pins
      `standard_name = CF:air_temperature`, `cf_cell_methods = "time: maximum"`, `units_ucum
      = Cel`, `value_data_type = continuous_numeric`.'
    title: Daily Maximum Temperature Record
    from_schema: https://w3id.org/linkml/microschemas/envar
    see_also:
    - https://cfconventions.org/standard-names.html
    - https://ucum.org/
    is_a: EnvironmentalExposureRecord
    attributes:
      subject:
        name: subject
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: An exposure value is meaningless without knowing whose exposure
              it is. The opaque handle is what lets the sidecar be joined back to
              the right cohort or patient in the health-data layer while staying PHI-free.
          explanation:
            tag: explanation
            value: Who (or what group) the values belong to — a study cohort or an
              individual patient, named by an anonymous code rather than anything
              identifying.
          open_question:
            tag: open_question
            value: '`subject` is the only field in this group that is not a per-value
              predicate: every other field explains an individual value, but a single
              scalar subject is dataset-scoped and cannot distribute over the sidecar''s
              rows (per-row subject identity lives in `subject_column`). Under review
              — should it be dropped, or demoted to a dataset-level cohort handle?
              Feedback welcome.'
        description: The patient or cohort the exposure value is attached to. Carried
          as an opaque identifier; PHI must not appear here.
        title: Subject (Patient or Cohort)
        examples:
        - value: cohort:phoenix_aki_2022
          description: an opaque cohort handle — no PHI
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DailyMaxTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        - MicroschemaDefinition
        slot_group: exposure_description
        range: string
        required: true
      variable_identity:
        name: variable_identity
        implements:
        - msprofile:observation_type
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: Without a standard variable identity, "tmax" in one file and "TMAX"
              in another cannot be recognised as the same physical quantity, and unit
              mix-ups (Celsius vs Fahrenheit vs Kelvin) go undetected — pooling and
              cross-study comparison silently break.
          explanation:
            tag: explanation
            value: This block pins down exactly what was measured. Instead of relying
              on a nickname like "tmax", it uses shared vocabularies to say "daily
              maximum air temperature, in degrees Celsius", so any tool or researcher
              reads it the same way.
        description: The variable identity object — what physical quantity is being
          captured. Bound to VariableIdentity (see envar_variable). Readable rename
          of the profile's `observation_type` anatomy slot.
        title: Variable Identity
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            variable_name: tmax
            standard_name: CF:air_temperature
            cf_cell_methods: 'time: maximum'
            units_ucum: Cel
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://cfconventions.org/
        - https://ucum.org/
        aliases:
        - observation_type
        exact_mappings:
        - msprofile:observation_type
        owner: DailyMaxTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: exposure_description
        range: VariableIdentity
        required: true
        inlined: true
      spatial_reference:
        name: spatial_reference
        implements:
        - msprofile:location
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: 'A value without its grid, coordinate system, and extraction method
              cannot be located or compared: a 1 km neighbourhood average and a ~31
              km regional average look identical as numbers but describe very different
              exposures, and the extraction cannot be re-run without the method.'
          explanation:
            tag: explanation
            value: This block says where the number applies and how it was pulled
              out of a map. Environmental data usually comes as a grid of cells covering
              a region; this records how big those cells are and how the value for
              a specific place was picked from them.
        description: Spatial reference object describing the native grid and extraction.
          Bound to SpatialReference (see envar_spatial). Readable rename of the profile's
          `location` anatomy slot.
        title: Spatial Reference
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            native_spatial_resolution_m: 1000
            crs: EPSG:4326
            extraction_method: inverse_distance_weighted_4_nearest_cells
            target_geography_type: point_residence
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://epsg.io/
        aliases:
        - location
        exact_mappings:
        - msprofile:location
        owner: DailyMaxTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: exposure_description
        range: SpatialReference
        required: true
        inlined: true
      temporal_reference:
        name: temporal_reference
        implements:
        - msprofile:temporality
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: 'A "daily maximum" is ambiguous without the day-boundary convention:
              Daymet days end at local midnight while PRISM days end at 12:00 GMT,
              so the same calendar date can cover different physical hours — the most-omitted
              detail in the heat literature and a known source of cross-product disagreement.'
          explanation:
            tag: explanation
            value: 'This block explains the time ruler behind each value: how long
              a period each number summarises (a day, a month), how it was summarised
              (maximum, mean), and — surprisingly important — when a "day" is considered
              to start and end.'
        description: Temporal reference object describing resolution, aggregation,
          and day-boundary convention. Bound to TemporalReference (see envar_temporal).
          Readable rename of the profile's `temporality` anatomy slot.
        title: Temporal Reference
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            temporal_resolution: daily
            temporal_aggregation_method: maximum
            day_boundary_convention: local_midnight
            calendar: gregorian
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://cfconventions.org/
        aliases:
        - temporality
        exact_mappings:
        - msprofile:temporality
        owner: DailyMaxTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: exposure_description
        range: TemporalReference
        required: true
        inlined: true
      exposure_model:
        name: exposure_model
        implements:
        - msprofile:methodology
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: The same quantity can be estimated by station interpolation, satellite
              retrieval, or model reanalysis, each with different inputs and biases;
              without the model description, values from different products get pooled
              as if equivalent and their systematic differences stay invisible.
          explanation:
            tag: explanation
            value: Most exposure values are not direct readings from an instrument
              at someone's house — they are estimates computed from weather stations,
              satellites, or models. This block says which estimation method produced
              the numbers and what went into it.
        description: 'The exposure-model object describing how values were produced.
          Bound to ExposureModel (see envar_model). Readable rename of the profile''s
          `methodology` anatomy slot, narrowed to the model itself: other methodology-adjacent
          concerns (source dataset, tool run, provenance chain, derived heat metric)
          are surfaced as separate envar-extension slots.'
        title: Exposure Model
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            exposure_model_type: spatial_interpolation
            exposure_model_inputs:
            - GHCN-Daily station observations
            exposure_model_paper_doi: 10.3334/ORNLDAAC/2129
            bias_correction_applied: none
        from_schema: https://w3id.org/linkml/microschemas/envar
        aliases:
        - methodology
        exact_mappings:
        - msprofile:methodology
        owner: DailyMaxTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: exposure_description
        range: ExposureModel
        required: true
        inlined: true
      uncertainty:
        name: uncertainty
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Exposure values are model estimates with error; without recorded
              per-value or aggregate uncertainty and missing-data handling, downstream
              analyses treat estimates as exact, and exposure-measurement error propagates
              invisibly into health-effect estimates.
          explanation:
            tag: explanation
            value: No estimate is perfect. This block says how far off the numbers
              might be and what was done about gaps in the data, so users know how
              much confidence to place in each value.
        description: Uncertainty object — see envar_uncertainty.
        title: Uncertainty
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            per_value_uncertainty_type: standard_error
            per_value_uncertainty_units_ucum: Cel
            missing_data_handling_method: spatiotemporal_interpolation
            data_completeness_pct: 100
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DailyMaxTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: exposure_description
        range: Uncertainty
        inlined: true
      derived_heat_metric:
        name: derived_heat_metric
        annotations:
          tier:
            tag: tier
            value: conditionally_core
          justification:
            tag: justification
            value: Heat metrics like WBGT or Heat Index can be computed by several
              non-equivalent equations from different inputs, and heat-wave flags
              depend on the threshold definition; the heat-epidemiology literature
              flags these choices as the main sources of cross-study disagreement,
              so omitting the block for a heat metric makes the record uncomparable.
          explanation:
            tag: explanation
            value: Some heat measures are not read from a thermometer but calculated
              from several ingredients (temperature, humidity, wind, sunshine) using
              a chosen formula. This block records which formula and ingredients were
              used — it is only needed when the variable is one of these computed
              heat metrics.
        description: Heat-metric methodology, present when the variable is a derived
          heat metric — see envar_heat_metric. Omitted for non-heat variables.
        title: Derived Heat Metric
        examples:
        - description: illustrative outdoor-WBGT methodology block — not part of the
            tmax scenario, where this slot is omitted
          object:
            heat_metric_family: wbgt_outdoor
            equation_variant: liljegren_2008
            indoor_outdoor: outdoor
            solar_radiation_basis: surface_downwelling_shortwave_flux
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DailyMaxTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: variable_specific_extensions
        range: DerivedHeatMetric
        inlined: true
      data_layout:
        name: data_layout
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: The sidecar describes values that live in a companion CSV/parquet
              file; without the column bindings a consumer cannot tell which column
              holds the values, subjects, or dates, so the metadata is unanchored
              and the data unusable — hence the slot is required.
          explanation:
            tag: explanation
            value: 'The actual numbers live in a separate data table that travels
              with this record. This block is the map between the two: it names which
              column holds the values, which holds the person identifier, which holds
              the date, and so on.'
        description: 'Data-layout object binding this sidecar to the columns of the
          companion data file — see envar_layout. Required: without it a consumer
          cannot locate the values the sidecar describes.'
        title: Data Layout
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            table_orientation: wide
            value_column: tmax
            subject_column: subject_id
            time_column: date
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DailyMaxTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: dataset_and_provenance
        range: DataLayout
        required: true
        inlined: true
      source_dataset:
        name: source_dataset
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: Without the upstream product's identity, version, DOI, and license,
              the record cannot be cited, its documented biases cannot be looked up,
              and reuse terms are unknown — and two records built from different product
              versions cannot be told apart.
          explanation:
            tag: explanation
            value: Exposure values are derived from a published data product (for
              example Daymet, a daily weather dataset). This block names that product
              precisely — including its version, citation, and license — so anyone
              can find it and check its documentation.
        description: Source dataset object — see envar_source.
        title: Source Dataset
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            source_dataset_name: Daymet V4 Daily Surface Weather Data
            source_dataset_short_code: daymet_v4
            source_dataset_doi: 10.3334/ORNLDAAC/2129
            source_license_spdx: public-domain-us-gov
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://spdx.org/licenses/
        - https://www.doi.org/
        owner: DailyMaxTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: dataset_and_provenance
        range: SourceDataset
        required: true
        inlined: true
      tool_run:
        name: tool_run
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: 'Without the exact tool name, version, container image, parameters,
              and timestamp, the record cannot be re-run: "we used the daymet tool"
              is not reproducible, but a pinned container invocation is.'
          explanation:
            tag: explanation
            value: 'This block is the receipt for the software step that produced
              the values: which program ran, which exact version, with what settings,
              and when. With it, someone else can re-run the same step and get the
              same numbers.'
        description: The current ToolRun — see envar_toolrun.
        title: Tool Run
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            tool_name: daymet
            tool_version: 1.0.0
            container_image_repository: ghcr.io/degauss-org/daymet
            run_timestamp_utc: '2026-05-23T14:18:42Z'
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DailyMaxTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: dataset_and_provenance
        range: ToolRun
        required: true
        inlined: true
      provenance_chain:
        name: provenance_chain
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: The final tool run is rarely the whole story — downloads, geocoding,
              and intermediate transforms precede it; without the ordered chain back
              to the raw source, end-to-end reproduction and error tracing are impossible
              even when the last step is pinned.
          explanation:
            tag: explanation
            value: Data usually passes through several tools before the final value
              appears — download, geocode, extract. This block lists those earlier
              steps in order, like a chain of custody reaching back to the original
              raw source.
        description: 'Ordered W3C-PROV-style chain of upstream tool runs — see envar_toolrun.
          Recommended (not required): a record is reproducible in principle without
          the full chain, but real reproduction needs it.'
        title: Provenance Chain
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            provenance_chain_terminus_type: raw_source_download
            provenance_chain_steps:
            - tool_name: geocoder
              tool_version: 3.3.0
              run_timestamp_utc: '2026-05-23T14:02:11Z'
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://www.w3.org/TR/prov-o/
        owner: DailyMaxTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: dataset_and_provenance
        range: ProvenanceChain
        inlined: true
      linkage_method:
        name: linkage_method
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: Attaching a place-based value to a person is a lossy, choice-laden
              step (geocoding, point vs buffer extraction, date alignment) — the "linkage
              descriptor" gap the GECC/EIRENE forum names as central. Without it,
              two studies using the same data product can differ solely through undocumented
              joins.
          explanation:
            tag: explanation
            value: Environmental data describes places, but health research is about
              people. This block records how the value for a place was attached to
              a particular person — for example, by looking up the map cell containing
              their home address — since that step involves real choices that affect
              the result.
        description: Linkage-method object — see envar_linkage.
        title: Linkage Method
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            linkage_strategy: point_extraction_at_residence
            address_period_alignment: address_history_from_emr
            clinical_date_assignment_convention: local_midnight
            lag_alignment_applied: none
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DailyMaxTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: health_data_integration
        range: LinkageMethod
        required: true
        inlined: true
      health_layer_linkage:
        name: health_layer_linkage
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Naming the downstream health-data layer (OMOP, BDC, …) and the
              join field makes the exposure record findable from the clinical side;
              without it the sidecar and the health records it serves drift apart,
              and the link must be reconstructed by hand.
          explanation:
            tag: explanation
            value: Health studies keep patient data in large standard databases. This
              block notes which of those systems the exposure values were wired into
              and through which field, so someone browsing the health data can find
              their way back to this record.
        description: 'Downstream health-data-layer linkage hooks (OMOP, BDC, …) —
          see envar_health_layer. Optional: its members are Recommended/Optional,
          and the Core PHI assertion lives at the record root (`phi_status`).'
        title: Health-Layer Linkage
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            health_layer_target: omop_external_exposure
            health_layer_link_field: exposure_source_value
            cohort_size_anchored: 3
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://ohdsi.github.io/CommonDataModel/
        - https://biodatacatalyst.nhlbi.nih.gov/
        owner: DailyMaxTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: health_data_integration
        range: HealthLayerLinkage
        inlined: true
      deposit_metadata:
        name: deposit_metadata
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: When the sidecar travels with a published deposit, the DOI, repository,
              and license are what make the object findable, citable, and legally
              reusable — omitting them strands a public artifact without citation
              or reuse terms. Optional because most records are never deposited.
          explanation:
            tag: explanation
            value: 'If this record and its data are published in a public archive
              (such as Zenodo), this block holds the publication details: the permanent
              DOI link, where it lives, and the license saying how others may use
              it.'
        description: FAIR-deposit metadata, present when the sidecar is intended to
          travel with a published deposit — see envar_health_layer.
        title: FAIR Deposit Metadata
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            deposit_doi: 10.5281/zenodo.9999999
            deposit_repository: zenodo
            deposit_license_spdx: CC-BY-4.0
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://www.go-fair.org/fair-principles/
        owner: DailyMaxTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: health_data_integration
        range: DepositMetadata
        inlined: true
      schema_version:
        name: schema_version
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: 'Downstream consumers must branch on schema evolution: a parser
              built for one version will silently misread or wrongly reject sidecars
              written against another. Without this slot there is no way to tell which
              iteration of the schema a document targets.'
          explanation:
            tag: explanation
            value: Schemas change over time, like editions of a paper form. This is
              the edition number stamped on the document, so anyone reading it knows
              exactly which version of the form was filled in and can interpret the
              fields accordingly.
        description: The version of the EnVar micro-schema this document conforms
          to. Required on every sidecar so downstream consumers can branch on schema
          evolution.
        title: Schema Version
        examples:
        - value: '0.1'
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://semver.org/
        owner: DailyMaxTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: record_bookkeeping
        range: string
        required: true
      provenance_id:
        name: provenance_id
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: This identifier is what the downstream health-data layer's source-value
              field carries (for OMOP, `external_exposure.exposure_source_value`);
              it is the only hook that links an exposure value in the health layer
              back to its full spatial, temporal, and model provenance. Omit it and
              the value becomes untraceable — its metadata can never be recovered.
          explanation:
            tag: explanation
            value: A unique serial number for this metadata document, like the tracking
              number on a parcel. Wherever the data value ends up, that number lets
              you look up exactly where it came from and how it was made.
        description: Stable identifier for this sidecar / record (ULID recommended).
          This is the value the downstream health-data layer's source-value field
          carries to link a row back to its provenance (for OMOP, that field is `external_exposure.exposure_source_value`).
        title: Record Identifier
        examples:
        - value: 01HFA7K8R3M6XP-daymet-deposit
          description: ULID-based sidecar identifier for the Daymet Tmax deposit
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://github.com/ulid/spec
        - https://ohdsi.github.io/CommonDataModel/
        owner: DailyMaxTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: record_bookkeeping
        range: string
        required: true
      phi_status:
        name: phi_status
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: Sidecars are designed to be PHI-free, and this slot is the explicit
              machine-readable assertion of that. Without it, every sharing, deposit,
              or export step must treat the document as potentially containing patient
              data and re-review it manually before it can leave a protected environment.
          explanation:
            tag: explanation
            value: PHI (protected health information) means private medical details
              about an identifiable person. This flag is a written promise on the
              document saying "no private patient information inside", so it can be
              passed around and published safely.
        description: Whether the sidecar carries any Protected Health Information.
          A record-level safety assertion; by design, sidecars are PHI-free.
        title: PHI Status
        examples:
        - value: no_phi
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://www.hhs.gov/hipaa/for-professionals/privacy/index.html
        owner: DailyMaxTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: record_bookkeeping
        range: PhiStatusEnum
        required: true
    rules:
    - preconditions:
        slot_conditions:
          variable_identity:
            name: variable_identity
            value_presence: PRESENT
      postconditions:
        slot_conditions:
          variable_identity:
            name: variable_identity
            any_of:
            - range: VariableIdentity
      description: 'The variable identity for a DailyMaxTemperatureRecord must use
        the CF triple (air_temperature, time: maximum, Cel) and a continuous_numeric
        value_data_type. Enforce by pinning the inner slots when authoring an instance.
        (Placeholder rule; nested-object pinning is not yet expressed — see schema
        README "Design decisions".)'
  DailyMinTemperatureRecord:
    name: DailyMinTemperatureRecord
    description: 'Canonical record for daily minimum 2 m air temperature (Tmin). Pins
      `standard_name = CF:air_temperature`, `cf_cell_methods = "time: minimum"`, `units_ucum
      = Cel`, `value_data_type = continuous_numeric`.'
    title: Daily Minimum Temperature Record
    from_schema: https://w3id.org/linkml/microschemas/envar
    see_also:
    - https://cfconventions.org/standard-names.html
    - https://ucum.org/
    is_a: EnvironmentalExposureRecord
    attributes:
      subject:
        name: subject
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: An exposure value is meaningless without knowing whose exposure
              it is. The opaque handle is what lets the sidecar be joined back to
              the right cohort or patient in the health-data layer while staying PHI-free.
          explanation:
            tag: explanation
            value: Who (or what group) the values belong to — a study cohort or an
              individual patient, named by an anonymous code rather than anything
              identifying.
          open_question:
            tag: open_question
            value: '`subject` is the only field in this group that is not a per-value
              predicate: every other field explains an individual value, but a single
              scalar subject is dataset-scoped and cannot distribute over the sidecar''s
              rows (per-row subject identity lives in `subject_column`). Under review
              — should it be dropped, or demoted to a dataset-level cohort handle?
              Feedback welcome.'
        description: The patient or cohort the exposure value is attached to. Carried
          as an opaque identifier; PHI must not appear here.
        title: Subject (Patient or Cohort)
        examples:
        - value: cohort:phoenix_aki_2022
          description: an opaque cohort handle — no PHI
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DailyMinTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        - MicroschemaDefinition
        slot_group: exposure_description
        range: string
        required: true
      variable_identity:
        name: variable_identity
        implements:
        - msprofile:observation_type
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: Without a standard variable identity, "tmax" in one file and "TMAX"
              in another cannot be recognised as the same physical quantity, and unit
              mix-ups (Celsius vs Fahrenheit vs Kelvin) go undetected — pooling and
              cross-study comparison silently break.
          explanation:
            tag: explanation
            value: This block pins down exactly what was measured. Instead of relying
              on a nickname like "tmax", it uses shared vocabularies to say "daily
              maximum air temperature, in degrees Celsius", so any tool or researcher
              reads it the same way.
        description: The variable identity object — what physical quantity is being
          captured. Bound to VariableIdentity (see envar_variable). Readable rename
          of the profile's `observation_type` anatomy slot.
        title: Variable Identity
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            variable_name: tmax
            standard_name: CF:air_temperature
            cf_cell_methods: 'time: maximum'
            units_ucum: Cel
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://cfconventions.org/
        - https://ucum.org/
        aliases:
        - observation_type
        exact_mappings:
        - msprofile:observation_type
        owner: DailyMinTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: exposure_description
        range: VariableIdentity
        required: true
        inlined: true
      spatial_reference:
        name: spatial_reference
        implements:
        - msprofile:location
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: 'A value without its grid, coordinate system, and extraction method
              cannot be located or compared: a 1 km neighbourhood average and a ~31
              km regional average look identical as numbers but describe very different
              exposures, and the extraction cannot be re-run without the method.'
          explanation:
            tag: explanation
            value: This block says where the number applies and how it was pulled
              out of a map. Environmental data usually comes as a grid of cells covering
              a region; this records how big those cells are and how the value for
              a specific place was picked from them.
        description: Spatial reference object describing the native grid and extraction.
          Bound to SpatialReference (see envar_spatial). Readable rename of the profile's
          `location` anatomy slot.
        title: Spatial Reference
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            native_spatial_resolution_m: 1000
            crs: EPSG:4326
            extraction_method: inverse_distance_weighted_4_nearest_cells
            target_geography_type: point_residence
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://epsg.io/
        aliases:
        - location
        exact_mappings:
        - msprofile:location
        owner: DailyMinTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: exposure_description
        range: SpatialReference
        required: true
        inlined: true
      temporal_reference:
        name: temporal_reference
        implements:
        - msprofile:temporality
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: 'A "daily maximum" is ambiguous without the day-boundary convention:
              Daymet days end at local midnight while PRISM days end at 12:00 GMT,
              so the same calendar date can cover different physical hours — the most-omitted
              detail in the heat literature and a known source of cross-product disagreement.'
          explanation:
            tag: explanation
            value: 'This block explains the time ruler behind each value: how long
              a period each number summarises (a day, a month), how it was summarised
              (maximum, mean), and — surprisingly important — when a "day" is considered
              to start and end.'
        description: Temporal reference object describing resolution, aggregation,
          and day-boundary convention. Bound to TemporalReference (see envar_temporal).
          Readable rename of the profile's `temporality` anatomy slot.
        title: Temporal Reference
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            temporal_resolution: daily
            temporal_aggregation_method: maximum
            day_boundary_convention: local_midnight
            calendar: gregorian
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://cfconventions.org/
        aliases:
        - temporality
        exact_mappings:
        - msprofile:temporality
        owner: DailyMinTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: exposure_description
        range: TemporalReference
        required: true
        inlined: true
      exposure_model:
        name: exposure_model
        implements:
        - msprofile:methodology
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: The same quantity can be estimated by station interpolation, satellite
              retrieval, or model reanalysis, each with different inputs and biases;
              without the model description, values from different products get pooled
              as if equivalent and their systematic differences stay invisible.
          explanation:
            tag: explanation
            value: Most exposure values are not direct readings from an instrument
              at someone's house — they are estimates computed from weather stations,
              satellites, or models. This block says which estimation method produced
              the numbers and what went into it.
        description: 'The exposure-model object describing how values were produced.
          Bound to ExposureModel (see envar_model). Readable rename of the profile''s
          `methodology` anatomy slot, narrowed to the model itself: other methodology-adjacent
          concerns (source dataset, tool run, provenance chain, derived heat metric)
          are surfaced as separate envar-extension slots.'
        title: Exposure Model
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            exposure_model_type: spatial_interpolation
            exposure_model_inputs:
            - GHCN-Daily station observations
            exposure_model_paper_doi: 10.3334/ORNLDAAC/2129
            bias_correction_applied: none
        from_schema: https://w3id.org/linkml/microschemas/envar
        aliases:
        - methodology
        exact_mappings:
        - msprofile:methodology
        owner: DailyMinTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: exposure_description
        range: ExposureModel
        required: true
        inlined: true
      uncertainty:
        name: uncertainty
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Exposure values are model estimates with error; without recorded
              per-value or aggregate uncertainty and missing-data handling, downstream
              analyses treat estimates as exact, and exposure-measurement error propagates
              invisibly into health-effect estimates.
          explanation:
            tag: explanation
            value: No estimate is perfect. This block says how far off the numbers
              might be and what was done about gaps in the data, so users know how
              much confidence to place in each value.
        description: Uncertainty object — see envar_uncertainty.
        title: Uncertainty
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            per_value_uncertainty_type: standard_error
            per_value_uncertainty_units_ucum: Cel
            missing_data_handling_method: spatiotemporal_interpolation
            data_completeness_pct: 100
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DailyMinTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: exposure_description
        range: Uncertainty
        inlined: true
      derived_heat_metric:
        name: derived_heat_metric
        annotations:
          tier:
            tag: tier
            value: conditionally_core
          justification:
            tag: justification
            value: Heat metrics like WBGT or Heat Index can be computed by several
              non-equivalent equations from different inputs, and heat-wave flags
              depend on the threshold definition; the heat-epidemiology literature
              flags these choices as the main sources of cross-study disagreement,
              so omitting the block for a heat metric makes the record uncomparable.
          explanation:
            tag: explanation
            value: Some heat measures are not read from a thermometer but calculated
              from several ingredients (temperature, humidity, wind, sunshine) using
              a chosen formula. This block records which formula and ingredients were
              used — it is only needed when the variable is one of these computed
              heat metrics.
        description: Heat-metric methodology, present when the variable is a derived
          heat metric — see envar_heat_metric. Omitted for non-heat variables.
        title: Derived Heat Metric
        examples:
        - description: illustrative outdoor-WBGT methodology block — not part of the
            tmax scenario, where this slot is omitted
          object:
            heat_metric_family: wbgt_outdoor
            equation_variant: liljegren_2008
            indoor_outdoor: outdoor
            solar_radiation_basis: surface_downwelling_shortwave_flux
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DailyMinTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: variable_specific_extensions
        range: DerivedHeatMetric
        inlined: true
      data_layout:
        name: data_layout
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: The sidecar describes values that live in a companion CSV/parquet
              file; without the column bindings a consumer cannot tell which column
              holds the values, subjects, or dates, so the metadata is unanchored
              and the data unusable — hence the slot is required.
          explanation:
            tag: explanation
            value: 'The actual numbers live in a separate data table that travels
              with this record. This block is the map between the two: it names which
              column holds the values, which holds the person identifier, which holds
              the date, and so on.'
        description: 'Data-layout object binding this sidecar to the columns of the
          companion data file — see envar_layout. Required: without it a consumer
          cannot locate the values the sidecar describes.'
        title: Data Layout
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            table_orientation: wide
            value_column: tmax
            subject_column: subject_id
            time_column: date
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DailyMinTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: dataset_and_provenance
        range: DataLayout
        required: true
        inlined: true
      source_dataset:
        name: source_dataset
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: Without the upstream product's identity, version, DOI, and license,
              the record cannot be cited, its documented biases cannot be looked up,
              and reuse terms are unknown — and two records built from different product
              versions cannot be told apart.
          explanation:
            tag: explanation
            value: Exposure values are derived from a published data product (for
              example Daymet, a daily weather dataset). This block names that product
              precisely — including its version, citation, and license — so anyone
              can find it and check its documentation.
        description: Source dataset object — see envar_source.
        title: Source Dataset
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            source_dataset_name: Daymet V4 Daily Surface Weather Data
            source_dataset_short_code: daymet_v4
            source_dataset_doi: 10.3334/ORNLDAAC/2129
            source_license_spdx: public-domain-us-gov
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://spdx.org/licenses/
        - https://www.doi.org/
        owner: DailyMinTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: dataset_and_provenance
        range: SourceDataset
        required: true
        inlined: true
      tool_run:
        name: tool_run
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: 'Without the exact tool name, version, container image, parameters,
              and timestamp, the record cannot be re-run: "we used the daymet tool"
              is not reproducible, but a pinned container invocation is.'
          explanation:
            tag: explanation
            value: 'This block is the receipt for the software step that produced
              the values: which program ran, which exact version, with what settings,
              and when. With it, someone else can re-run the same step and get the
              same numbers.'
        description: The current ToolRun — see envar_toolrun.
        title: Tool Run
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            tool_name: daymet
            tool_version: 1.0.0
            container_image_repository: ghcr.io/degauss-org/daymet
            run_timestamp_utc: '2026-05-23T14:18:42Z'
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DailyMinTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: dataset_and_provenance
        range: ToolRun
        required: true
        inlined: true
      provenance_chain:
        name: provenance_chain
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: The final tool run is rarely the whole story — downloads, geocoding,
              and intermediate transforms precede it; without the ordered chain back
              to the raw source, end-to-end reproduction and error tracing are impossible
              even when the last step is pinned.
          explanation:
            tag: explanation
            value: Data usually passes through several tools before the final value
              appears — download, geocode, extract. This block lists those earlier
              steps in order, like a chain of custody reaching back to the original
              raw source.
        description: 'Ordered W3C-PROV-style chain of upstream tool runs — see envar_toolrun.
          Recommended (not required): a record is reproducible in principle without
          the full chain, but real reproduction needs it.'
        title: Provenance Chain
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            provenance_chain_terminus_type: raw_source_download
            provenance_chain_steps:
            - tool_name: geocoder
              tool_version: 3.3.0
              run_timestamp_utc: '2026-05-23T14:02:11Z'
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://www.w3.org/TR/prov-o/
        owner: DailyMinTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: dataset_and_provenance
        range: ProvenanceChain
        inlined: true
      linkage_method:
        name: linkage_method
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: Attaching a place-based value to a person is a lossy, choice-laden
              step (geocoding, point vs buffer extraction, date alignment) — the "linkage
              descriptor" gap the GECC/EIRENE forum names as central. Without it,
              two studies using the same data product can differ solely through undocumented
              joins.
          explanation:
            tag: explanation
            value: Environmental data describes places, but health research is about
              people. This block records how the value for a place was attached to
              a particular person — for example, by looking up the map cell containing
              their home address — since that step involves real choices that affect
              the result.
        description: Linkage-method object — see envar_linkage.
        title: Linkage Method
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            linkage_strategy: point_extraction_at_residence
            address_period_alignment: address_history_from_emr
            clinical_date_assignment_convention: local_midnight
            lag_alignment_applied: none
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DailyMinTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: health_data_integration
        range: LinkageMethod
        required: true
        inlined: true
      health_layer_linkage:
        name: health_layer_linkage
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Naming the downstream health-data layer (OMOP, BDC, …) and the
              join field makes the exposure record findable from the clinical side;
              without it the sidecar and the health records it serves drift apart,
              and the link must be reconstructed by hand.
          explanation:
            tag: explanation
            value: Health studies keep patient data in large standard databases. This
              block notes which of those systems the exposure values were wired into
              and through which field, so someone browsing the health data can find
              their way back to this record.
        description: 'Downstream health-data-layer linkage hooks (OMOP, BDC, …) —
          see envar_health_layer. Optional: its members are Recommended/Optional,
          and the Core PHI assertion lives at the record root (`phi_status`).'
        title: Health-Layer Linkage
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            health_layer_target: omop_external_exposure
            health_layer_link_field: exposure_source_value
            cohort_size_anchored: 3
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://ohdsi.github.io/CommonDataModel/
        - https://biodatacatalyst.nhlbi.nih.gov/
        owner: DailyMinTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: health_data_integration
        range: HealthLayerLinkage
        inlined: true
      deposit_metadata:
        name: deposit_metadata
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: When the sidecar travels with a published deposit, the DOI, repository,
              and license are what make the object findable, citable, and legally
              reusable — omitting them strands a public artifact without citation
              or reuse terms. Optional because most records are never deposited.
          explanation:
            tag: explanation
            value: 'If this record and its data are published in a public archive
              (such as Zenodo), this block holds the publication details: the permanent
              DOI link, where it lives, and the license saying how others may use
              it.'
        description: FAIR-deposit metadata, present when the sidecar is intended to
          travel with a published deposit — see envar_health_layer.
        title: FAIR Deposit Metadata
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            deposit_doi: 10.5281/zenodo.9999999
            deposit_repository: zenodo
            deposit_license_spdx: CC-BY-4.0
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://www.go-fair.org/fair-principles/
        owner: DailyMinTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: health_data_integration
        range: DepositMetadata
        inlined: true
      schema_version:
        name: schema_version
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: 'Downstream consumers must branch on schema evolution: a parser
              built for one version will silently misread or wrongly reject sidecars
              written against another. Without this slot there is no way to tell which
              iteration of the schema a document targets.'
          explanation:
            tag: explanation
            value: Schemas change over time, like editions of a paper form. This is
              the edition number stamped on the document, so anyone reading it knows
              exactly which version of the form was filled in and can interpret the
              fields accordingly.
        description: The version of the EnVar micro-schema this document conforms
          to. Required on every sidecar so downstream consumers can branch on schema
          evolution.
        title: Schema Version
        examples:
        - value: '0.1'
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://semver.org/
        owner: DailyMinTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: record_bookkeeping
        range: string
        required: true
      provenance_id:
        name: provenance_id
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: This identifier is what the downstream health-data layer's source-value
              field carries (for OMOP, `external_exposure.exposure_source_value`);
              it is the only hook that links an exposure value in the health layer
              back to its full spatial, temporal, and model provenance. Omit it and
              the value becomes untraceable — its metadata can never be recovered.
          explanation:
            tag: explanation
            value: A unique serial number for this metadata document, like the tracking
              number on a parcel. Wherever the data value ends up, that number lets
              you look up exactly where it came from and how it was made.
        description: Stable identifier for this sidecar / record (ULID recommended).
          This is the value the downstream health-data layer's source-value field
          carries to link a row back to its provenance (for OMOP, that field is `external_exposure.exposure_source_value`).
        title: Record Identifier
        examples:
        - value: 01HFA7K8R3M6XP-daymet-deposit
          description: ULID-based sidecar identifier for the Daymet Tmax deposit
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://github.com/ulid/spec
        - https://ohdsi.github.io/CommonDataModel/
        owner: DailyMinTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: record_bookkeeping
        range: string
        required: true
      phi_status:
        name: phi_status
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: Sidecars are designed to be PHI-free, and this slot is the explicit
              machine-readable assertion of that. Without it, every sharing, deposit,
              or export step must treat the document as potentially containing patient
              data and re-review it manually before it can leave a protected environment.
          explanation:
            tag: explanation
            value: PHI (protected health information) means private medical details
              about an identifiable person. This flag is a written promise on the
              document saying "no private patient information inside", so it can be
              passed around and published safely.
        description: Whether the sidecar carries any Protected Health Information.
          A record-level safety assertion; by design, sidecars are PHI-free.
        title: PHI Status
        examples:
        - value: no_phi
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://www.hhs.gov/hipaa/for-professionals/privacy/index.html
        owner: DailyMinTemperatureRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: record_bookkeeping
        range: PhiStatusEnum
        required: true
  WetBulbGlobeTemperatureOutdoorRecord:
    name: WetBulbGlobeTemperatureOutdoorRecord
    description: Canonical record for outdoor WBGT under the Liljegren 2008 formulation.
      Pins `heat_metric_family = wbgt_outdoor`, `equation_variant = liljegren_2008`,
      `indoor_outdoor = outdoor`, `units_ucum = Cel`, `value_data_type = continuous_numeric`.
    title: Outdoor WBGT Record
    from_schema: https://w3id.org/linkml/microschemas/envar
    see_also:
    - https://en.wikipedia.org/wiki/Wet-bulb_globe_temperature
    - https://doi.org/10.1038/s41597-022-01405-3
    is_a: EnvironmentalExposureRecord
    slot_usage:
      derived_heat_metric:
        name: derived_heat_metric
        required: true
    attributes:
      subject:
        name: subject
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: An exposure value is meaningless without knowing whose exposure
              it is. The opaque handle is what lets the sidecar be joined back to
              the right cohort or patient in the health-data layer while staying PHI-free.
          explanation:
            tag: explanation
            value: Who (or what group) the values belong to — a study cohort or an
              individual patient, named by an anonymous code rather than anything
              identifying.
          open_question:
            tag: open_question
            value: '`subject` is the only field in this group that is not a per-value
              predicate: every other field explains an individual value, but a single
              scalar subject is dataset-scoped and cannot distribute over the sidecar''s
              rows (per-row subject identity lives in `subject_column`). Under review
              — should it be dropped, or demoted to a dataset-level cohort handle?
              Feedback welcome.'
        description: The patient or cohort the exposure value is attached to. Carried
          as an opaque identifier; PHI must not appear here.
        title: Subject (Patient or Cohort)
        examples:
        - value: cohort:phoenix_aki_2022
          description: an opaque cohort handle — no PHI
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: WetBulbGlobeTemperatureOutdoorRecord
        domain_of:
        - EnvironmentalExposureRecord
        - MicroschemaDefinition
        slot_group: exposure_description
        range: string
        required: true
      variable_identity:
        name: variable_identity
        implements:
        - msprofile:observation_type
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: Without a standard variable identity, "tmax" in one file and "TMAX"
              in another cannot be recognised as the same physical quantity, and unit
              mix-ups (Celsius vs Fahrenheit vs Kelvin) go undetected — pooling and
              cross-study comparison silently break.
          explanation:
            tag: explanation
            value: This block pins down exactly what was measured. Instead of relying
              on a nickname like "tmax", it uses shared vocabularies to say "daily
              maximum air temperature, in degrees Celsius", so any tool or researcher
              reads it the same way.
        description: The variable identity object — what physical quantity is being
          captured. Bound to VariableIdentity (see envar_variable). Readable rename
          of the profile's `observation_type` anatomy slot.
        title: Variable Identity
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            variable_name: tmax
            standard_name: CF:air_temperature
            cf_cell_methods: 'time: maximum'
            units_ucum: Cel
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://cfconventions.org/
        - https://ucum.org/
        aliases:
        - observation_type
        exact_mappings:
        - msprofile:observation_type
        owner: WetBulbGlobeTemperatureOutdoorRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: exposure_description
        range: VariableIdentity
        required: true
        inlined: true
      spatial_reference:
        name: spatial_reference
        implements:
        - msprofile:location
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: 'A value without its grid, coordinate system, and extraction method
              cannot be located or compared: a 1 km neighbourhood average and a ~31
              km regional average look identical as numbers but describe very different
              exposures, and the extraction cannot be re-run without the method.'
          explanation:
            tag: explanation
            value: This block says where the number applies and how it was pulled
              out of a map. Environmental data usually comes as a grid of cells covering
              a region; this records how big those cells are and how the value for
              a specific place was picked from them.
        description: Spatial reference object describing the native grid and extraction.
          Bound to SpatialReference (see envar_spatial). Readable rename of the profile's
          `location` anatomy slot.
        title: Spatial Reference
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            native_spatial_resolution_m: 1000
            crs: EPSG:4326
            extraction_method: inverse_distance_weighted_4_nearest_cells
            target_geography_type: point_residence
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://epsg.io/
        aliases:
        - location
        exact_mappings:
        - msprofile:location
        owner: WetBulbGlobeTemperatureOutdoorRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: exposure_description
        range: SpatialReference
        required: true
        inlined: true
      temporal_reference:
        name: temporal_reference
        implements:
        - msprofile:temporality
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: 'A "daily maximum" is ambiguous without the day-boundary convention:
              Daymet days end at local midnight while PRISM days end at 12:00 GMT,
              so the same calendar date can cover different physical hours — the most-omitted
              detail in the heat literature and a known source of cross-product disagreement.'
          explanation:
            tag: explanation
            value: 'This block explains the time ruler behind each value: how long
              a period each number summarises (a day, a month), how it was summarised
              (maximum, mean), and — surprisingly important — when a "day" is considered
              to start and end.'
        description: Temporal reference object describing resolution, aggregation,
          and day-boundary convention. Bound to TemporalReference (see envar_temporal).
          Readable rename of the profile's `temporality` anatomy slot.
        title: Temporal Reference
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            temporal_resolution: daily
            temporal_aggregation_method: maximum
            day_boundary_convention: local_midnight
            calendar: gregorian
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://cfconventions.org/
        aliases:
        - temporality
        exact_mappings:
        - msprofile:temporality
        owner: WetBulbGlobeTemperatureOutdoorRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: exposure_description
        range: TemporalReference
        required: true
        inlined: true
      exposure_model:
        name: exposure_model
        implements:
        - msprofile:methodology
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: The same quantity can be estimated by station interpolation, satellite
              retrieval, or model reanalysis, each with different inputs and biases;
              without the model description, values from different products get pooled
              as if equivalent and their systematic differences stay invisible.
          explanation:
            tag: explanation
            value: Most exposure values are not direct readings from an instrument
              at someone's house — they are estimates computed from weather stations,
              satellites, or models. This block says which estimation method produced
              the numbers and what went into it.
        description: 'The exposure-model object describing how values were produced.
          Bound to ExposureModel (see envar_model). Readable rename of the profile''s
          `methodology` anatomy slot, narrowed to the model itself: other methodology-adjacent
          concerns (source dataset, tool run, provenance chain, derived heat metric)
          are surfaced as separate envar-extension slots.'
        title: Exposure Model
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            exposure_model_type: spatial_interpolation
            exposure_model_inputs:
            - GHCN-Daily station observations
            exposure_model_paper_doi: 10.3334/ORNLDAAC/2129
            bias_correction_applied: none
        from_schema: https://w3id.org/linkml/microschemas/envar
        aliases:
        - methodology
        exact_mappings:
        - msprofile:methodology
        owner: WetBulbGlobeTemperatureOutdoorRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: exposure_description
        range: ExposureModel
        required: true
        inlined: true
      uncertainty:
        name: uncertainty
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Exposure values are model estimates with error; without recorded
              per-value or aggregate uncertainty and missing-data handling, downstream
              analyses treat estimates as exact, and exposure-measurement error propagates
              invisibly into health-effect estimates.
          explanation:
            tag: explanation
            value: No estimate is perfect. This block says how far off the numbers
              might be and what was done about gaps in the data, so users know how
              much confidence to place in each value.
        description: Uncertainty object — see envar_uncertainty.
        title: Uncertainty
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            per_value_uncertainty_type: standard_error
            per_value_uncertainty_units_ucum: Cel
            missing_data_handling_method: spatiotemporal_interpolation
            data_completeness_pct: 100
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: WetBulbGlobeTemperatureOutdoorRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: exposure_description
        range: Uncertainty
        inlined: true
      derived_heat_metric:
        name: derived_heat_metric
        annotations:
          tier:
            tag: tier
            value: conditionally_core
          justification:
            tag: justification
            value: Heat metrics like WBGT or Heat Index can be computed by several
              non-equivalent equations from different inputs, and heat-wave flags
              depend on the threshold definition; the heat-epidemiology literature
              flags these choices as the main sources of cross-study disagreement,
              so omitting the block for a heat metric makes the record uncomparable.
          explanation:
            tag: explanation
            value: Some heat measures are not read from a thermometer but calculated
              from several ingredients (temperature, humidity, wind, sunshine) using
              a chosen formula. This block records which formula and ingredients were
              used — it is only needed when the variable is one of these computed
              heat metrics.
        description: Heat-metric methodology, present when the variable is a derived
          heat metric — see envar_heat_metric. Omitted for non-heat variables.
        title: Derived Heat Metric
        examples:
        - description: illustrative outdoor-WBGT methodology block — not part of the
            tmax scenario, where this slot is omitted
          object:
            heat_metric_family: wbgt_outdoor
            equation_variant: liljegren_2008
            indoor_outdoor: outdoor
            solar_radiation_basis: surface_downwelling_shortwave_flux
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: WetBulbGlobeTemperatureOutdoorRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: variable_specific_extensions
        range: DerivedHeatMetric
        required: true
        inlined: true
      data_layout:
        name: data_layout
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: The sidecar describes values that live in a companion CSV/parquet
              file; without the column bindings a consumer cannot tell which column
              holds the values, subjects, or dates, so the metadata is unanchored
              and the data unusable — hence the slot is required.
          explanation:
            tag: explanation
            value: 'The actual numbers live in a separate data table that travels
              with this record. This block is the map between the two: it names which
              column holds the values, which holds the person identifier, which holds
              the date, and so on.'
        description: 'Data-layout object binding this sidecar to the columns of the
          companion data file — see envar_layout. Required: without it a consumer
          cannot locate the values the sidecar describes.'
        title: Data Layout
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            table_orientation: wide
            value_column: tmax
            subject_column: subject_id
            time_column: date
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: WetBulbGlobeTemperatureOutdoorRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: dataset_and_provenance
        range: DataLayout
        required: true
        inlined: true
      source_dataset:
        name: source_dataset
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: Without the upstream product's identity, version, DOI, and license,
              the record cannot be cited, its documented biases cannot be looked up,
              and reuse terms are unknown — and two records built from different product
              versions cannot be told apart.
          explanation:
            tag: explanation
            value: Exposure values are derived from a published data product (for
              example Daymet, a daily weather dataset). This block names that product
              precisely — including its version, citation, and license — so anyone
              can find it and check its documentation.
        description: Source dataset object — see envar_source.
        title: Source Dataset
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            source_dataset_name: Daymet V4 Daily Surface Weather Data
            source_dataset_short_code: daymet_v4
            source_dataset_doi: 10.3334/ORNLDAAC/2129
            source_license_spdx: public-domain-us-gov
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://spdx.org/licenses/
        - https://www.doi.org/
        owner: WetBulbGlobeTemperatureOutdoorRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: dataset_and_provenance
        range: SourceDataset
        required: true
        inlined: true
      tool_run:
        name: tool_run
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: 'Without the exact tool name, version, container image, parameters,
              and timestamp, the record cannot be re-run: "we used the daymet tool"
              is not reproducible, but a pinned container invocation is.'
          explanation:
            tag: explanation
            value: 'This block is the receipt for the software step that produced
              the values: which program ran, which exact version, with what settings,
              and when. With it, someone else can re-run the same step and get the
              same numbers.'
        description: The current ToolRun — see envar_toolrun.
        title: Tool Run
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            tool_name: daymet
            tool_version: 1.0.0
            container_image_repository: ghcr.io/degauss-org/daymet
            run_timestamp_utc: '2026-05-23T14:18:42Z'
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: WetBulbGlobeTemperatureOutdoorRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: dataset_and_provenance
        range: ToolRun
        required: true
        inlined: true
      provenance_chain:
        name: provenance_chain
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: The final tool run is rarely the whole story — downloads, geocoding,
              and intermediate transforms precede it; without the ordered chain back
              to the raw source, end-to-end reproduction and error tracing are impossible
              even when the last step is pinned.
          explanation:
            tag: explanation
            value: Data usually passes through several tools before the final value
              appears — download, geocode, extract. This block lists those earlier
              steps in order, like a chain of custody reaching back to the original
              raw source.
        description: 'Ordered W3C-PROV-style chain of upstream tool runs — see envar_toolrun.
          Recommended (not required): a record is reproducible in principle without
          the full chain, but real reproduction needs it.'
        title: Provenance Chain
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            provenance_chain_terminus_type: raw_source_download
            provenance_chain_steps:
            - tool_name: geocoder
              tool_version: 3.3.0
              run_timestamp_utc: '2026-05-23T14:02:11Z'
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://www.w3.org/TR/prov-o/
        owner: WetBulbGlobeTemperatureOutdoorRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: dataset_and_provenance
        range: ProvenanceChain
        inlined: true
      linkage_method:
        name: linkage_method
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: Attaching a place-based value to a person is a lossy, choice-laden
              step (geocoding, point vs buffer extraction, date alignment) — the "linkage
              descriptor" gap the GECC/EIRENE forum names as central. Without it,
              two studies using the same data product can differ solely through undocumented
              joins.
          explanation:
            tag: explanation
            value: Environmental data describes places, but health research is about
              people. This block records how the value for a place was attached to
              a particular person — for example, by looking up the map cell containing
              their home address — since that step involves real choices that affect
              the result.
        description: Linkage-method object — see envar_linkage.
        title: Linkage Method
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            linkage_strategy: point_extraction_at_residence
            address_period_alignment: address_history_from_emr
            clinical_date_assignment_convention: local_midnight
            lag_alignment_applied: none
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: WetBulbGlobeTemperatureOutdoorRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: health_data_integration
        range: LinkageMethod
        required: true
        inlined: true
      health_layer_linkage:
        name: health_layer_linkage
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Naming the downstream health-data layer (OMOP, BDC, …) and the
              join field makes the exposure record findable from the clinical side;
              without it the sidecar and the health records it serves drift apart,
              and the link must be reconstructed by hand.
          explanation:
            tag: explanation
            value: Health studies keep patient data in large standard databases. This
              block notes which of those systems the exposure values were wired into
              and through which field, so someone browsing the health data can find
              their way back to this record.
        description: 'Downstream health-data-layer linkage hooks (OMOP, BDC, …) —
          see envar_health_layer. Optional: its members are Recommended/Optional,
          and the Core PHI assertion lives at the record root (`phi_status`).'
        title: Health-Layer Linkage
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            health_layer_target: omop_external_exposure
            health_layer_link_field: exposure_source_value
            cohort_size_anchored: 3
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://ohdsi.github.io/CommonDataModel/
        - https://biodatacatalyst.nhlbi.nih.gov/
        owner: WetBulbGlobeTemperatureOutdoorRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: health_data_integration
        range: HealthLayerLinkage
        inlined: true
      deposit_metadata:
        name: deposit_metadata
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: When the sidecar travels with a published deposit, the DOI, repository,
              and license are what make the object findable, citable, and legally
              reusable — omitting them strands a public artifact without citation
              or reuse terms. Optional because most records are never deposited.
          explanation:
            tag: explanation
            value: 'If this record and its data are published in a public archive
              (such as Zenodo), this block holds the publication details: the permanent
              DOI link, where it lives, and the license saying how others may use
              it.'
        description: FAIR-deposit metadata, present when the sidecar is intended to
          travel with a published deposit — see envar_health_layer.
        title: FAIR Deposit Metadata
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            deposit_doi: 10.5281/zenodo.9999999
            deposit_repository: zenodo
            deposit_license_spdx: CC-BY-4.0
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://www.go-fair.org/fair-principles/
        owner: WetBulbGlobeTemperatureOutdoorRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: health_data_integration
        range: DepositMetadata
        inlined: true
      schema_version:
        name: schema_version
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: 'Downstream consumers must branch on schema evolution: a parser
              built for one version will silently misread or wrongly reject sidecars
              written against another. Without this slot there is no way to tell which
              iteration of the schema a document targets.'
          explanation:
            tag: explanation
            value: Schemas change over time, like editions of a paper form. This is
              the edition number stamped on the document, so anyone reading it knows
              exactly which version of the form was filled in and can interpret the
              fields accordingly.
        description: The version of the EnVar micro-schema this document conforms
          to. Required on every sidecar so downstream consumers can branch on schema
          evolution.
        title: Schema Version
        examples:
        - value: '0.1'
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://semver.org/
        owner: WetBulbGlobeTemperatureOutdoorRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: record_bookkeeping
        range: string
        required: true
      provenance_id:
        name: provenance_id
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: This identifier is what the downstream health-data layer's source-value
              field carries (for OMOP, `external_exposure.exposure_source_value`);
              it is the only hook that links an exposure value in the health layer
              back to its full spatial, temporal, and model provenance. Omit it and
              the value becomes untraceable — its metadata can never be recovered.
          explanation:
            tag: explanation
            value: A unique serial number for this metadata document, like the tracking
              number on a parcel. Wherever the data value ends up, that number lets
              you look up exactly where it came from and how it was made.
        description: Stable identifier for this sidecar / record (ULID recommended).
          This is the value the downstream health-data layer's source-value field
          carries to link a row back to its provenance (for OMOP, that field is `external_exposure.exposure_source_value`).
        title: Record Identifier
        examples:
        - value: 01HFA7K8R3M6XP-daymet-deposit
          description: ULID-based sidecar identifier for the Daymet Tmax deposit
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://github.com/ulid/spec
        - https://ohdsi.github.io/CommonDataModel/
        owner: WetBulbGlobeTemperatureOutdoorRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: record_bookkeeping
        range: string
        required: true
      phi_status:
        name: phi_status
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: Sidecars are designed to be PHI-free, and this slot is the explicit
              machine-readable assertion of that. Without it, every sharing, deposit,
              or export step must treat the document as potentially containing patient
              data and re-review it manually before it can leave a protected environment.
          explanation:
            tag: explanation
            value: PHI (protected health information) means private medical details
              about an identifiable person. This flag is a written promise on the
              document saying "no private patient information inside", so it can be
              passed around and published safely.
        description: Whether the sidecar carries any Protected Health Information.
          A record-level safety assertion; by design, sidecars are PHI-free.
        title: PHI Status
        examples:
        - value: no_phi
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://www.hhs.gov/hipaa/for-professionals/privacy/index.html
        owner: WetBulbGlobeTemperatureOutdoorRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: record_bookkeeping
        range: PhiStatusEnum
        required: true
    rules:
    - preconditions:
        slot_conditions:
          derived_heat_metric:
            name: derived_heat_metric
            value_presence: PRESENT
      postconditions:
        slot_conditions:
          derived_heat_metric:
            name: derived_heat_metric
            any_of:
            - range: DerivedHeatMetric
      description: The DerivedHeatMetric inner object must pin heat_metric_family
        = wbgt_outdoor, equation_variant = liljegren_2008, and indoor_outdoor = outdoor.
  ExtremeHeatDayFlagRecord:
    name: ExtremeHeatDayFlagRecord
    description: Canonical record for a daily binary extreme-heat-day flag, defined
      against a local 95th-percentile Tmax baseline. Pins `heat_metric_family = heat_wave_flag`,
      `value_data_type = binary_flag`, and requires the percentile-reference-period
      slots in DerivedHeatMetric to be populated.
    title: Extreme-Heat-Day Flag Record
    from_schema: https://w3id.org/linkml/microschemas/envar
    is_a: EnvironmentalExposureRecord
    slot_usage:
      derived_heat_metric:
        name: derived_heat_metric
        required: true
    attributes:
      subject:
        name: subject
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: An exposure value is meaningless without knowing whose exposure
              it is. The opaque handle is what lets the sidecar be joined back to
              the right cohort or patient in the health-data layer while staying PHI-free.
          explanation:
            tag: explanation
            value: Who (or what group) the values belong to — a study cohort or an
              individual patient, named by an anonymous code rather than anything
              identifying.
          open_question:
            tag: open_question
            value: '`subject` is the only field in this group that is not a per-value
              predicate: every other field explains an individual value, but a single
              scalar subject is dataset-scoped and cannot distribute over the sidecar''s
              rows (per-row subject identity lives in `subject_column`). Under review
              — should it be dropped, or demoted to a dataset-level cohort handle?
              Feedback welcome.'
        description: The patient or cohort the exposure value is attached to. Carried
          as an opaque identifier; PHI must not appear here.
        title: Subject (Patient or Cohort)
        examples:
        - value: cohort:phoenix_aki_2022
          description: an opaque cohort handle — no PHI
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: ExtremeHeatDayFlagRecord
        domain_of:
        - EnvironmentalExposureRecord
        - MicroschemaDefinition
        slot_group: exposure_description
        range: string
        required: true
      variable_identity:
        name: variable_identity
        implements:
        - msprofile:observation_type
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: Without a standard variable identity, "tmax" in one file and "TMAX"
              in another cannot be recognised as the same physical quantity, and unit
              mix-ups (Celsius vs Fahrenheit vs Kelvin) go undetected — pooling and
              cross-study comparison silently break.
          explanation:
            tag: explanation
            value: This block pins down exactly what was measured. Instead of relying
              on a nickname like "tmax", it uses shared vocabularies to say "daily
              maximum air temperature, in degrees Celsius", so any tool or researcher
              reads it the same way.
        description: The variable identity object — what physical quantity is being
          captured. Bound to VariableIdentity (see envar_variable). Readable rename
          of the profile's `observation_type` anatomy slot.
        title: Variable Identity
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            variable_name: tmax
            standard_name: CF:air_temperature
            cf_cell_methods: 'time: maximum'
            units_ucum: Cel
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://cfconventions.org/
        - https://ucum.org/
        aliases:
        - observation_type
        exact_mappings:
        - msprofile:observation_type
        owner: ExtremeHeatDayFlagRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: exposure_description
        range: VariableIdentity
        required: true
        inlined: true
      spatial_reference:
        name: spatial_reference
        implements:
        - msprofile:location
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: 'A value without its grid, coordinate system, and extraction method
              cannot be located or compared: a 1 km neighbourhood average and a ~31
              km regional average look identical as numbers but describe very different
              exposures, and the extraction cannot be re-run without the method.'
          explanation:
            tag: explanation
            value: This block says where the number applies and how it was pulled
              out of a map. Environmental data usually comes as a grid of cells covering
              a region; this records how big those cells are and how the value for
              a specific place was picked from them.
        description: Spatial reference object describing the native grid and extraction.
          Bound to SpatialReference (see envar_spatial). Readable rename of the profile's
          `location` anatomy slot.
        title: Spatial Reference
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            native_spatial_resolution_m: 1000
            crs: EPSG:4326
            extraction_method: inverse_distance_weighted_4_nearest_cells
            target_geography_type: point_residence
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://epsg.io/
        aliases:
        - location
        exact_mappings:
        - msprofile:location
        owner: ExtremeHeatDayFlagRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: exposure_description
        range: SpatialReference
        required: true
        inlined: true
      temporal_reference:
        name: temporal_reference
        implements:
        - msprofile:temporality
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: 'A "daily maximum" is ambiguous without the day-boundary convention:
              Daymet days end at local midnight while PRISM days end at 12:00 GMT,
              so the same calendar date can cover different physical hours — the most-omitted
              detail in the heat literature and a known source of cross-product disagreement.'
          explanation:
            tag: explanation
            value: 'This block explains the time ruler behind each value: how long
              a period each number summarises (a day, a month), how it was summarised
              (maximum, mean), and — surprisingly important — when a "day" is considered
              to start and end.'
        description: Temporal reference object describing resolution, aggregation,
          and day-boundary convention. Bound to TemporalReference (see envar_temporal).
          Readable rename of the profile's `temporality` anatomy slot.
        title: Temporal Reference
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            temporal_resolution: daily
            temporal_aggregation_method: maximum
            day_boundary_convention: local_midnight
            calendar: gregorian
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://cfconventions.org/
        aliases:
        - temporality
        exact_mappings:
        - msprofile:temporality
        owner: ExtremeHeatDayFlagRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: exposure_description
        range: TemporalReference
        required: true
        inlined: true
      exposure_model:
        name: exposure_model
        implements:
        - msprofile:methodology
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: The same quantity can be estimated by station interpolation, satellite
              retrieval, or model reanalysis, each with different inputs and biases;
              without the model description, values from different products get pooled
              as if equivalent and their systematic differences stay invisible.
          explanation:
            tag: explanation
            value: Most exposure values are not direct readings from an instrument
              at someone's house — they are estimates computed from weather stations,
              satellites, or models. This block says which estimation method produced
              the numbers and what went into it.
        description: 'The exposure-model object describing how values were produced.
          Bound to ExposureModel (see envar_model). Readable rename of the profile''s
          `methodology` anatomy slot, narrowed to the model itself: other methodology-adjacent
          concerns (source dataset, tool run, provenance chain, derived heat metric)
          are surfaced as separate envar-extension slots.'
        title: Exposure Model
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            exposure_model_type: spatial_interpolation
            exposure_model_inputs:
            - GHCN-Daily station observations
            exposure_model_paper_doi: 10.3334/ORNLDAAC/2129
            bias_correction_applied: none
        from_schema: https://w3id.org/linkml/microschemas/envar
        aliases:
        - methodology
        exact_mappings:
        - msprofile:methodology
        owner: ExtremeHeatDayFlagRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: exposure_description
        range: ExposureModel
        required: true
        inlined: true
      uncertainty:
        name: uncertainty
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Exposure values are model estimates with error; without recorded
              per-value or aggregate uncertainty and missing-data handling, downstream
              analyses treat estimates as exact, and exposure-measurement error propagates
              invisibly into health-effect estimates.
          explanation:
            tag: explanation
            value: No estimate is perfect. This block says how far off the numbers
              might be and what was done about gaps in the data, so users know how
              much confidence to place in each value.
        description: Uncertainty object — see envar_uncertainty.
        title: Uncertainty
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            per_value_uncertainty_type: standard_error
            per_value_uncertainty_units_ucum: Cel
            missing_data_handling_method: spatiotemporal_interpolation
            data_completeness_pct: 100
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: ExtremeHeatDayFlagRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: exposure_description
        range: Uncertainty
        inlined: true
      derived_heat_metric:
        name: derived_heat_metric
        annotations:
          tier:
            tag: tier
            value: conditionally_core
          justification:
            tag: justification
            value: Heat metrics like WBGT or Heat Index can be computed by several
              non-equivalent equations from different inputs, and heat-wave flags
              depend on the threshold definition; the heat-epidemiology literature
              flags these choices as the main sources of cross-study disagreement,
              so omitting the block for a heat metric makes the record uncomparable.
          explanation:
            tag: explanation
            value: Some heat measures are not read from a thermometer but calculated
              from several ingredients (temperature, humidity, wind, sunshine) using
              a chosen formula. This block records which formula and ingredients were
              used — it is only needed when the variable is one of these computed
              heat metrics.
        description: Heat-metric methodology, present when the variable is a derived
          heat metric — see envar_heat_metric. Omitted for non-heat variables.
        title: Derived Heat Metric
        examples:
        - description: illustrative outdoor-WBGT methodology block — not part of the
            tmax scenario, where this slot is omitted
          object:
            heat_metric_family: wbgt_outdoor
            equation_variant: liljegren_2008
            indoor_outdoor: outdoor
            solar_radiation_basis: surface_downwelling_shortwave_flux
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: ExtremeHeatDayFlagRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: variable_specific_extensions
        range: DerivedHeatMetric
        required: true
        inlined: true
      data_layout:
        name: data_layout
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: The sidecar describes values that live in a companion CSV/parquet
              file; without the column bindings a consumer cannot tell which column
              holds the values, subjects, or dates, so the metadata is unanchored
              and the data unusable — hence the slot is required.
          explanation:
            tag: explanation
            value: 'The actual numbers live in a separate data table that travels
              with this record. This block is the map between the two: it names which
              column holds the values, which holds the person identifier, which holds
              the date, and so on.'
        description: 'Data-layout object binding this sidecar to the columns of the
          companion data file — see envar_layout. Required: without it a consumer
          cannot locate the values the sidecar describes.'
        title: Data Layout
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            table_orientation: wide
            value_column: tmax
            subject_column: subject_id
            time_column: date
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: ExtremeHeatDayFlagRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: dataset_and_provenance
        range: DataLayout
        required: true
        inlined: true
      source_dataset:
        name: source_dataset
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: Without the upstream product's identity, version, DOI, and license,
              the record cannot be cited, its documented biases cannot be looked up,
              and reuse terms are unknown — and two records built from different product
              versions cannot be told apart.
          explanation:
            tag: explanation
            value: Exposure values are derived from a published data product (for
              example Daymet, a daily weather dataset). This block names that product
              precisely — including its version, citation, and license — so anyone
              can find it and check its documentation.
        description: Source dataset object — see envar_source.
        title: Source Dataset
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            source_dataset_name: Daymet V4 Daily Surface Weather Data
            source_dataset_short_code: daymet_v4
            source_dataset_doi: 10.3334/ORNLDAAC/2129
            source_license_spdx: public-domain-us-gov
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://spdx.org/licenses/
        - https://www.doi.org/
        owner: ExtremeHeatDayFlagRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: dataset_and_provenance
        range: SourceDataset
        required: true
        inlined: true
      tool_run:
        name: tool_run
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: 'Without the exact tool name, version, container image, parameters,
              and timestamp, the record cannot be re-run: "we used the daymet tool"
              is not reproducible, but a pinned container invocation is.'
          explanation:
            tag: explanation
            value: 'This block is the receipt for the software step that produced
              the values: which program ran, which exact version, with what settings,
              and when. With it, someone else can re-run the same step and get the
              same numbers.'
        description: The current ToolRun — see envar_toolrun.
        title: Tool Run
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            tool_name: daymet
            tool_version: 1.0.0
            container_image_repository: ghcr.io/degauss-org/daymet
            run_timestamp_utc: '2026-05-23T14:18:42Z'
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: ExtremeHeatDayFlagRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: dataset_and_provenance
        range: ToolRun
        required: true
        inlined: true
      provenance_chain:
        name: provenance_chain
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: The final tool run is rarely the whole story — downloads, geocoding,
              and intermediate transforms precede it; without the ordered chain back
              to the raw source, end-to-end reproduction and error tracing are impossible
              even when the last step is pinned.
          explanation:
            tag: explanation
            value: Data usually passes through several tools before the final value
              appears — download, geocode, extract. This block lists those earlier
              steps in order, like a chain of custody reaching back to the original
              raw source.
        description: 'Ordered W3C-PROV-style chain of upstream tool runs — see envar_toolrun.
          Recommended (not required): a record is reproducible in principle without
          the full chain, but real reproduction needs it.'
        title: Provenance Chain
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            provenance_chain_terminus_type: raw_source_download
            provenance_chain_steps:
            - tool_name: geocoder
              tool_version: 3.3.0
              run_timestamp_utc: '2026-05-23T14:02:11Z'
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://www.w3.org/TR/prov-o/
        owner: ExtremeHeatDayFlagRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: dataset_and_provenance
        range: ProvenanceChain
        inlined: true
      linkage_method:
        name: linkage_method
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: Attaching a place-based value to a person is a lossy, choice-laden
              step (geocoding, point vs buffer extraction, date alignment) — the "linkage
              descriptor" gap the GECC/EIRENE forum names as central. Without it,
              two studies using the same data product can differ solely through undocumented
              joins.
          explanation:
            tag: explanation
            value: Environmental data describes places, but health research is about
              people. This block records how the value for a place was attached to
              a particular person — for example, by looking up the map cell containing
              their home address — since that step involves real choices that affect
              the result.
        description: Linkage-method object — see envar_linkage.
        title: Linkage Method
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            linkage_strategy: point_extraction_at_residence
            address_period_alignment: address_history_from_emr
            clinical_date_assignment_convention: local_midnight
            lag_alignment_applied: none
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: ExtremeHeatDayFlagRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: health_data_integration
        range: LinkageMethod
        required: true
        inlined: true
      health_layer_linkage:
        name: health_layer_linkage
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Naming the downstream health-data layer (OMOP, BDC, …) and the
              join field makes the exposure record findable from the clinical side;
              without it the sidecar and the health records it serves drift apart,
              and the link must be reconstructed by hand.
          explanation:
            tag: explanation
            value: Health studies keep patient data in large standard databases. This
              block notes which of those systems the exposure values were wired into
              and through which field, so someone browsing the health data can find
              their way back to this record.
        description: 'Downstream health-data-layer linkage hooks (OMOP, BDC, …) —
          see envar_health_layer. Optional: its members are Recommended/Optional,
          and the Core PHI assertion lives at the record root (`phi_status`).'
        title: Health-Layer Linkage
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            health_layer_target: omop_external_exposure
            health_layer_link_field: exposure_source_value
            cohort_size_anchored: 3
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://ohdsi.github.io/CommonDataModel/
        - https://biodatacatalyst.nhlbi.nih.gov/
        owner: ExtremeHeatDayFlagRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: health_data_integration
        range: HealthLayerLinkage
        inlined: true
      deposit_metadata:
        name: deposit_metadata
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: When the sidecar travels with a published deposit, the DOI, repository,
              and license are what make the object findable, citable, and legally
              reusable — omitting them strands a public artifact without citation
              or reuse terms. Optional because most records are never deposited.
          explanation:
            tag: explanation
            value: 'If this record and its data are published in a public archive
              (such as Zenodo), this block holds the publication details: the permanent
              DOI link, where it lives, and the license saying how others may use
              it.'
        description: FAIR-deposit metadata, present when the sidecar is intended to
          travel with a published deposit — see envar_health_layer.
        title: FAIR Deposit Metadata
        examples:
        - description: abridged — see tests/data/valid/EnvironmentalExposureRecord-tmax_ideal.yaml
            for a full instance
          object:
            deposit_doi: 10.5281/zenodo.9999999
            deposit_repository: zenodo
            deposit_license_spdx: CC-BY-4.0
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://www.go-fair.org/fair-principles/
        owner: ExtremeHeatDayFlagRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: health_data_integration
        range: DepositMetadata
        inlined: true
      schema_version:
        name: schema_version
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: 'Downstream consumers must branch on schema evolution: a parser
              built for one version will silently misread or wrongly reject sidecars
              written against another. Without this slot there is no way to tell which
              iteration of the schema a document targets.'
          explanation:
            tag: explanation
            value: Schemas change over time, like editions of a paper form. This is
              the edition number stamped on the document, so anyone reading it knows
              exactly which version of the form was filled in and can interpret the
              fields accordingly.
        description: The version of the EnVar micro-schema this document conforms
          to. Required on every sidecar so downstream consumers can branch on schema
          evolution.
        title: Schema Version
        examples:
        - value: '0.1'
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://semver.org/
        owner: ExtremeHeatDayFlagRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: record_bookkeeping
        range: string
        required: true
      provenance_id:
        name: provenance_id
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: This identifier is what the downstream health-data layer's source-value
              field carries (for OMOP, `external_exposure.exposure_source_value`);
              it is the only hook that links an exposure value in the health layer
              back to its full spatial, temporal, and model provenance. Omit it and
              the value becomes untraceable — its metadata can never be recovered.
          explanation:
            tag: explanation
            value: A unique serial number for this metadata document, like the tracking
              number on a parcel. Wherever the data value ends up, that number lets
              you look up exactly where it came from and how it was made.
        description: Stable identifier for this sidecar / record (ULID recommended).
          This is the value the downstream health-data layer's source-value field
          carries to link a row back to its provenance (for OMOP, that field is `external_exposure.exposure_source_value`).
        title: Record Identifier
        examples:
        - value: 01HFA7K8R3M6XP-daymet-deposit
          description: ULID-based sidecar identifier for the Daymet Tmax deposit
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://github.com/ulid/spec
        - https://ohdsi.github.io/CommonDataModel/
        owner: ExtremeHeatDayFlagRecord
        domain_of:
        - EnvironmentalExposureRecord
        slot_group: record_bookkeeping
        range: string
        required: true
      phi_status:
        name: phi_status
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: Sidecars are designed to be PHI-free, and this slot is the explicit
              machine-readable assertion of that. Without it, every sharing, deposit,
              or export step must treat the document as potentially containing patient
              data and re-review it manually before it can leave a protected environment.
          explanation:
            tag: explanation
            value: PHI (protected health information) means private medical details
              about an identifiable person. This flag is a written promise on the
              document saying "no private patient information inside", so it can be
              passed around and published safely.
        description: Whether the sidecar carries any Protected Health Information.
          A record-level safety assertion; by design, sidecars are PHI-free.
        title: PHI Status
        examples:
        - value: no_phi
