    range: uriorcurie
classes:
  AnyValue:
    name: AnyValue
    description: An arbitrary passthrough object (open-ended key/value map) whose
      keys are not fixed by this schema — e.g. ACDD global attributes or a run-environment
      map. Lets such payloads be carried as native objects rather than opaque JSON
      strings.
    title: Any Value
    from_schema: https://w3id.org/linkml/microschemas/envar
    see_also:
    - https://wiki.esipfed.org/Attribute_Convention_for_Data_Discovery_1-3
    class_uri: linkml:Any
  VariableIdentity:
    name: VariableIdentity
    annotations:
      domain_of_use:
        tag: domain_of_use
        value: environmental_exposure
    description: The identity and semantics of an environmental exposure variable
      — what physical quantity is being captured, in what units, and how it binds
      to community vocabularies. One per record.
    title: Variable Identity
    from_schema: https://w3id.org/linkml/microschemas/envar
    see_also:
    - https://cfconventions.org/standard-names.html
    - https://ucum.org/
    slots:
    - variable_name
    - variable_label
    - standard_name
    - cf_cell_methods
    - units_ucum
    - units_display
    - target_concept_vocabulary
    - target_concept_id
    - target_concept_id_missing_reason
    - concept_status
    - concept_mappings
    - value_data_type
    - value_range_plausible_min
    - value_range_plausible_max
    slot_usage:
      variable_name:
        name: variable_name
        required: true
      standard_name:
        name: standard_name
        required: true
      units_ucum:
        name: units_ucum
        required: true
      concept_status:
        name: concept_status
        required: true
      value_data_type:
        name: value_data_type
        required: true
    attributes:
      variable_name:
        name: variable_name
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: This is the handle under which the upstream product knows the variable
              (Daymet `tmax` vs gridMET `tmmx`). Without it the record cannot be traced
              back to the source product's variable, and a rerun cannot request the
              same quantity from the tool.
          explanation:
            tag: explanation
            value: Data tools give each measurement a short nickname, like `tmax`
              for maximum temperature. This is that nickname, written down exactly
              as the tool spells it, so you can go back to the source and find the
              same measurement again.
        description: Short machine-readable name for the variable, usually the name
          the upstream tool uses for it (e.g. `tmax`, `tmmx`, `air.2m`). Identity
          only — not necessarily the column header in the companion data file; that
          binding lives in `DataLayout.value_column` (see envar_layout).
        title: Variable Name
        examples:
        - value: tmax
          description: Daymet daily maximum air temperature variable
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: VariableIdentity
        domain_of:
        - VariableIdentity
        range: string
        required: true
      variable_label:
        name: variable_label
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Terse tool codes like `tmmx` are easy to misread (maximum vs mean)
              and force readers to consult external tool documentation. A plain-language
              label lets a human verify at a glance that the record describes the
              intended quantity.
          explanation:
            tag: explanation
            value: A friendly, spelled-out name for the measurement — like "daily
              maximum air temperature at 2 m" instead of the cryptic code `tmax` —
              so anyone reading the record knows what it is without decoding jargon.
        description: Human-readable label, e.g. "daily maximum air temperature at
          2 m".
        title: Variable Label
        examples:
        - value: daily maximum air temperature at 2 m
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: VariableIdentity
        domain_of:
        - VariableIdentity
        range: string
      standard_name:
        name: standard_name
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: 'This is the cross-agency identifier that makes the variable interoperable:
              without it, `tmax` from one product and `tmmx` from another cannot be
              recognised by machines as the same physical quantity, so records cannot
              be pooled or harmonised across studies.'
          explanation:
            tag: explanation
            value: Different tools use different nicknames for the same thing, so
              scientific communities maintain shared official names for physical quantities
              (like "air_temperature"). Tagging the record with the official name
              lets computers tell that two datasets measure the same thing, no matter
              what each dataset called it.
        description: The standard-name identifier for the physical quantity, as a
          CURIE so the schema privileges no single naming authority. Use a CF Convention
          Standard Name where one exists (`CF:air_temperature`, `CF:relative_humidity`);
          for health-relevant quantities CF does not define (e.g. Heat Index, WBGT),
          mint a term in the project registry (`ENVAR:heat_index`) or reuse an ontology
          term (`ECTO:...`). The prefix carries the authority; the slot name does
          not. Mandatory.
        title: Standard Name
        examples:
        - value: CF:air_temperature
          description: CF Standard Name for the Daymet daily Tmax scenario
        - value: CF:mass_concentration_of_pm2p5_ambient_aerosol_particles_in_air
          description: CF Standard Name for the ACAG PM2.5 scenario
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://cfconventions.org/standard-names.html
        - https://obofoundry.org/ontology/ecto.html
        slot_uri: dcterms:subject
        owner: VariableIdentity
        domain_of:
        - VariableIdentity
        range: uriorcurie
        required: true
      cf_cell_methods:
        name: cf_cell_methods
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: A daily maximum and a daily mean of the same quantity carry the
              same standard name and units; only the aggregation statement tells them
              apart. Keeping the verbatim CF string also enables round-tripping against
              CF/NetCDF source products and the CF-consistency triple check over `standard_name`
              + `cf_cell_methods` + `units_ucum`.
          explanation:
            tag: explanation
            value: 'A "daily temperature" value could be the day''s highest reading,
              its average, or its lowest — very different numbers. This short standard
              phrase (like "time: maximum") records which one it is, in the exact
              wording that climate-data software already understands.'
        description: 'CF `cell_methods` string describing how the value summarises
          sub-period values, e.g. `time: maximum` for Tmax, `time: mean` for daily
          mean.'
        title: CF Cell Methods
        comments:
        - 'Deliberately CF-specific — do not generalise. The vocabulary-neutral capture
          of aggregation semantics already exists as the required `TemporalReference.temporal_aggregation_method`
          enum (envar_temporal), which maps 1:1 to the temporal part of `cell_methods`;
          that enum is what machines should reason over. This slot instead preserves
          the *verbatim* CF expression. `cell_methods` is a structured mini-language
          (multi-axis forms like `area: mean time: maximum`, `within`/`over` qualifiers,
          `where` clauses) with no cross-vocabulary equivalent, so a "generalised"
          slot would be either a free string of unspecified syntax (losing machine-readability)
          or a newly minted EnVar aggregation grammar with no tooling support. Keeping
          the literal string also enables round-tripping against CF/NetCDF source
          products and the CF-consistency triple check over `standard_name` + `cf_cell_methods`
          + `units_ucum` (SPEC.md, validation rule 5). Contrast `standard_name`, which
          *was* generalised to a CURIE — that works because it is an identifier, and
          prefixes provide a standard generalisation mechanism; no such mechanism
          exists for expressions.'
        examples:
        - value: 'time: maximum'
          description: daily maximum (Tmax)
        - value: 'time: mean'
          description: mean over the aggregation period (e.g. annual-mean PM2.5)
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://cfconventions.org/cf-conventions/cf-conventions.html#cell-methods
        owner: VariableIdentity
        domain_of:
        - VariableIdentity
        range: string
      units_ucum:
        name: units_ucum
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: A number without units is uninterpretable — a value of 35 could
              be °C or °F, a factor-of-1.8 error in an exposure analysis. UCUM is
              the machine-readable form that health-data layers (e.g. OMOP's unit_concept_id)
              align to, so omitting it also blocks automated unit conversion and downstream
              integration.
          explanation:
            tag: explanation
            value: UCUM is a compact, machine-readable spelling of the unit — `Cel`
              for degrees Celsius, `ug/m3` for micrograms per cubic metre — so software
              can convert °C to °F or check units automatically without guessing what
              a human-written unit string means.
        description: The unit expressed in UCUM syntax, e.g. `Cel` for degrees Celsius,
          `K` for Kelvin, `ug/m3` for PM2.5 mass concentration.
        title: Units (UCUM)
        examples:
        - value: Cel
          description: degrees Celsius (Daymet Tmax)
        - value: ug/m3
          description: micrograms per cubic metre (PM2.5 mass concentration)
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://ucum.org/
        owner: VariableIdentity
        domain_of:
        - VariableIdentity
        range: string
        required: true
      units_display:
        name: units_display
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Keeps human-facing output (tables, plots, reports) readable without
              every consumer having to translate UCUM codes; omitting it risks each
              tool rendering the unit differently or mislabelling axes.
          explanation:
            tag: explanation
            value: The pretty version of the unit for people to read, like "°C". The
              machine version (`Cel`) is stored separately; this one exists purely
              for showing on screen or in print.
        description: Human-readable unit string for display purposes, e.g. `°C`.
        title: Display Units
        examples:
        - value: °C
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: VariableIdentity
        domain_of:
        - VariableIdentity
        range: string
      target_concept_vocabulary:
        name: target_concept_vocabulary
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: '`target_concept_id` and `concept_status` are meaningless without
              knowing which vocabulary they refer to; naming it explicitly keeps the
              record portable across health-data layers (OMOP, BDC, ...) instead of
              silently assuming one.'
          explanation:
            tag: explanation
            value: Health databases each keep their own catalogue of codes for the
              things they record. This slot says which catalogue the record's health-data
              code (and its status) comes from — for example the OMOP catalogue used
              by many hospital research databases.
        description: The downstream health-data vocabulary that `target_concept_id`
          and `concept_status` refer to, e.g. `omop` (OHDSI Standardised Vocabulary),
          `bdc` (BioData Catalyst). Names the vocabulary so the schema privileges
          no single health-data layer.
        title: Target Concept Vocabulary
        examples:
        - value: omop
          description: OHDSI Standardised Vocabulary (OMOP CDM)
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://athena.ohdsi.org/
        - https://biodatacatalyst.nhlbi.nih.gov/
        owner: VariableIdentity
        domain_of:
        - VariableIdentity
        range: string
      target_concept_id:
        name: target_concept_id
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: This is the hook that lets the environmental value land in a health
              database as a recognised concept. Recording it — or its documented absence
              — shows whether the vocabulary binding was attempted and against what,
              instead of leaving the linkage silent and unreproducible.
          explanation:
            tag: explanation
            value: Health databases store everything under numeric codes from a shared
              catalogue. This is that code for the environmental measurement, when
              one exists, so the exposure value can sit alongside clinical data under
              an identifier the database already knows.
        description: Concept identifier for the variable in the vocabulary named by
          `target_concept_vocabulary` (e.g. an OHDSI concept_id). Nullable with reason
          for environmental variables that lack coverage today.
        title: Target Concept Identifier
        examples:
        - value: '2005200123'
          description: illustrative OHDSI concept_id; in the canonical Tmax and PM2.5
            scenarios this slot is null with a missing reason
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://athena.ohdsi.org/
        owner: VariableIdentity
        domain_of:
        - VariableIdentity
        range: string
      target_concept_id_missing_reason:
        name: target_concept_id_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: 'Without a stated reason, a null `target_concept_id` is ambiguous:
              downstream users cannot tell a genuine vocabulary gap from a pipeline
              that simply failed to look the concept up, and so cannot decide whether
              to fix the data or request a new concept.'
          explanation:
            tag: explanation
            value: When a code is missing, it matters why. This slot records the reason
              — for example that no such code has been invented yet — so an empty
              field is not mistaken for a processing mistake.
        description: Reason `target_concept_id` is null. Distinguishes "no concept
          yet exists in the target vocabulary" from "the pipeline did not resolve
          it".
        title: Reason Concept ID Is Missing
        examples:
        - value: not_provided_by_source
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: VariableIdentity
        domain_of:
        - VariableIdentity
        range: MissingReasonEnum
      concept_status:
        name: concept_status
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: A downstream system must know whether to expect a concept id. The
              explicit existing/proposed/gap status makes vocabulary gaps visible
              and countable rather than silently null — which is what drives vocabulary-extension
              requests for environmental variables.
          explanation:
            tag: explanation
            value: A simple status flag saying whether the health-data catalogue already
              has a code for this measurement, has one in the works, or has nothing
              yet. It turns a silent gap into an explicit, reportable fact.
        description: Status of this variable's coverage in the target health-data
          vocabulary (`existing` / `proposed` / `gap`). Makes the vocabulary gap explicit
          rather than silent. Required.
        title: Concept Status
        examples:
        - value: gap
          description: no OMOP concept exists yet for daily Tmax
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: VariableIdentity
        domain_of:
        - VariableIdentity
        range: ConceptStatusEnum
        required: true
      concept_mappings:
        name: concept_mappings
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Cross-references to ontologies (ECTO, ENVO) and clinical codes
              (LOINC, SNOMED) let the variable be found and aligned across projects
              and communities; without them, cross-study harmonisation has to be redone
              by hand. Enrichment only — not needed to reproduce the value.
          explanation:
            tag: explanation
            value: Different scientific communities keep different dictionaries of
              concepts. This is a list of "also known as" links pointing to the matching
              entries in those dictionaries, so people searching any of them can still
              find this measurement.
        description: 'Cross-references binding this variable to other vocabularies
          and ontologies, each as a CURIE. One generic list rather than a slot per
          standard, so adding a vocabulary is a new prefix, not a schema change. Examples:
          `ECTO:0000012` (Environmental Conditions, Treatments and Exposures Ontology
          — cross-Monarch / cross-CHORDS alignment), `ENVO:01000339` (Environment
          Ontology — material or process exposed to), `LOINC:...` / `SNOMED:...` (where
          the variable has clinical coverage). Note: the *primary* downstream health-data
          binding, with its `existing` / `proposed` / `gap` status, stays in the structured
          `target_concept_*` slots — this list is for additional, status-free cross-references.'
        title: Concept Cross-References
        examples:
        - value: ECTO:0000012
          description: exposure to temperature (ECTO) — one element of the cross-reference
            list for the Daymet daily Tmax scenario
        - value: ENVO:03000049
          description: temperature of air (ENVO) — a second element of the same cross-reference
            list
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://obofoundry.org/ontology/ecto.html
        - https://obofoundry.org/ontology/envo.html
        - https://loinc.org/
        owner: VariableIdentity
        domain_of:
        - VariableIdentity
        range: uriorcurie
        multivalued: true
      value_data_type:
        name: value_data_type
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: Tells consumers how to parse and analyse the values — continuous
              numbers, categories, and flags need different statistics and storage.
              Omitting it forces guessing from the data, which fails on ambiguous
              cases like 0/1 columns (count, flag, or category?).
          explanation:
            tag: explanation
            value: 'Says what kind of value to expect: a decimal number that can take
              any value (like a temperature), a yes/no flag, or a category. Software
              needs this to know how to read and summarise the data correctly.'
        description: The data type of the stored exposure value.
        title: Value Data Type
        examples:
        - value: continuous_numeric
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: VariableIdentity
        domain_of:
        - VariableIdentity
        range: DataTypeEnum
        required: true
      value_range_plausible_min:
        name: value_range_plausible_min
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: 'Gives automated quality checks a sanity band: without it, unit
              mix-ups and corrupted values (e.g. a Tmax of 350 from unconverted Kelvin)
              pass silently into downstream analyses.'
          explanation:
            tag: explanation
            value: The lowest value that would still make physical sense — for example
              -50 °C for outdoor air temperature. Anything below it is probably an
              error; this is a warning signal, not a hard rule.
        description: Physical / domain lower bound for plausible values (e.g. -50
          °C for ambient Tmax). Not a hard validation bound; sanity-check signal.
        title: Plausible Minimum Value
        examples:
        - value: '-50'
          description: plausible lower bound for ambient Tmax in °C
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: VariableIdentity
        domain_of:
        - VariableIdentity
        range: float
      value_range_plausible_max:
        name: value_range_plausible_max
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: 'Together with the plausible minimum, this gives automated quality
              checks a sanity band: without it, unit mix-ups and corrupted values
              slip silently past validation into exposure analyses.'
          explanation:
            tag: explanation
            value: The highest value that would still make physical sense — for example
              60 °C for outdoor air temperature. Anything above it likely signals
              a unit mix-up or a data error worth investigating.
        description: Physical / domain upper bound for plausible values (e.g. 60 °C
          for ambient Tmax).
        title: Plausible Maximum Value
        examples:
        - value: '60'
          description: plausible upper bound for ambient Tmax in °C
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: VariableIdentity
        domain_of:
        - VariableIdentity
        range: float
  DataLayout:
    name: DataLayout
    annotations:
      domain_of_use:
        tag: domain_of_use
        value: environmental_exposure
    description: 'How the companion data file (CSV / parquet) is laid out and how
      this record''s values are located inside it. Separates the file-layout concern
      from variable identity: `VariableIdentity.variable_name` says what the variable
      is; `DataLayout` says which column (and, for long format, which rows) carry
      its values. One per record.'
    title: Data Layout
    from_schema: https://w3id.org/linkml/microschemas/envar
    slots:
    - table_orientation
    - value_column
    - variable_column
    - variable_key
    - subject_column
    - time_column
    - value_uncertainty_column
    - value_uncertainty_column_missing_reason
    - quality_flag_column
    - quality_flag_column_missing_reason
    slot_usage:
      table_orientation:
        name: table_orientation
        required: true
      value_column:
        name: value_column
        required: true
    attributes:
      table_orientation:
        name: table_orientation
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: 'Every other column binding in this class is read relative to the
              orientation: in a wide file `value_column` names a variable-specific
              column, in a long file it names a shared column whose rows must be filtered.
              Without this flag a consumer cannot interpret the bindings and so cannot
              reliably locate this record''s values in the companion file.'
          explanation:
            tag: explanation
            value: Wide means one column per measurement type (a `tmax` column, a
              `vp` column, and so on); long means one row per measurement, with a
              shared `value` column and a label column saying which measurement each
              row is. Long is also known as "tidy" format.
        description: Whether the companion file is wide (one column per variable)
          or long (one `value` column, variables discriminated by row). Required.
        title: Table Orientation
        examples:
        - value: wide
          description: one column per variable, e.g. a `tmax` column in a Daymet extract
        - value: long
          description: tidy format with a shared `value` column, e.g. tract-level
            PM2.5
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://doi.org/10.18637/jss.v059.i10
        owner: DataLayout
        domain_of:
        - DataLayout
        range: TableOrientationEnum
        required: true
      value_column:
        name: value_column
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: The record deliberately carries no inline observation result —
              the values live only in the companion CSV/parquet file. Without this
              column binding, a validator or downstream pipeline has no way to find
              the values the sidecar describes, so the sidecar is unverifiable and
              the data unusable.
          explanation:
            tag: explanation
            value: This is simply the name of the spreadsheet column where the actual
              numbers live — for example a column headed `tmax` holding daily maximum
              temperatures, or a generic column headed `value` in a long table.
        description: Name of the column carrying this record's exposure values, e.g.
          `tmax` in a wide file or `value` in a long file. Required.
        title: Value Column
        examples:
        - value: tmax
          description: wide file — the variable's own column carries the values
        - value: value
          description: long file — the shared value column
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DataLayout
        domain_of:
        - DataLayout
        range: string
        required: true
      variable_column:
        name: variable_column
        annotations:
          tier:
            tag: tier
            value: conditionally_core
          justification:
            tag: justification
            value: In a long file many variables share one value column and are told
              apart only by a discriminator column. Without naming that column, a
              consumer cannot separate this record's variable from every other variable
              in the file, so the value binding is ambiguous for all long-format data.
          explanation:
            tag: explanation
            value: In a long table there is a column — often literally called `variable`
              — that says what each row measures (`tmax`, `vp`, ...). This slot names
              that column. Wide files do not have one, which is why this only applies
              to long orientation.
        description: 'For long orientation: name of the column that discriminates
          variables (e.g. `variable`). Not applicable to wide files.'
        title: Variable Column
        examples:
        - value: variable
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://doi.org/10.18637/jss.v059.i10
        owner: DataLayout
        domain_of:
        - DataLayout
        range: string
      variable_key:
        name: variable_key
        annotations:
          tier:
            tag: tier
            value: conditionally_core
          justification:
            tag: justification
            value: Knowing which column discriminates variables is not enough — a
              consumer also needs the label value that selects this record's rows.
              Without the key, every row of a long file is a candidate and this record's
              values cannot be filtered out of the shared value column.
          explanation:
            tag: explanation
            value: 'This is the label to filter on: keep only the rows where the variable
              column says, for example, `tmax`, and you have exactly this record''s
              measurements. It usually matches the variable''s short name, but does
              not have to.'
        description: 'For long orientation: the value in `variable_column` that selects
          this record''s rows (e.g. `tmax`). Often, but not necessarily, equal to
          `VariableIdentity.variable_name`.'
        title: Variable Key
        examples:
        - value: pm25_annual
          description: selects the PM2.5 rows in a long tract-level file
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://doi.org/10.18637/jss.v059.i10
        owner: DataLayout
        domain_of:
        - DataLayout
        range: string
      subject_column:
        name: subject_column
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: The whole point of an exposure sidecar is to be joined back to
              a health-data layer. Without knowing which column carries the subject
              or cohort identifier, the values cannot be attached to the people or
              places the record-level `subject` refers to, and the linkage step becomes
              guesswork.
          explanation:
            tag: explanation
            value: This names the ID column that says who (or where) each row belongs
              to — a patient identifier like `subject_id`, or a place identifier like
              a census-tract code.
        description: Name of the column carrying the opaque subject / cohort identifier
          the record-level `subject` refers to (e.g. `subject_id`).
        title: Subject Column
        examples:
        - value: subject_id
          description: patient-level extract
        - value: tract_id
          description: census-tract-level extract
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DataLayout
        domain_of:
        - DataLayout
        range: string
      time_column:
        name: time_column
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Without knowing which column carries the date or timestamp, each
              value cannot be placed in time, so exposure values cannot be aligned
              with clinical events — which day's exposure goes with which health record
              — and any lag or window analysis is impossible.
          explanation:
            tag: explanation
            value: This names the column that gives each measurement its "when" —
              a `date` column for daily data, or a `year` column for annual summaries.
        description: Name of the column carrying the observation date / timestamp
          (e.g. `date`).
        title: Time Column
        examples:
        - value: date
          description: daily data
        - value: year
          description: annual aggregate
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DataLayout
        domain_of:
        - DataLayout
        range: string
      value_uncertainty_column:
        name: value_uncertainty_column
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Products like Daymet ship per-value standard errors that most pipelines
              silently drop. Without this binding, downstream analyses cannot find
              or propagate the measurement error attached to each value, and dropped
              uncertainty is indistinguishable from uncertainty that never existed.
          explanation:
            tag: explanation
            value: Some datasets include a "plus or minus" column next to each value
              — an estimate of how far off each number might be. This slot names that
              column so the uncertainty travels with the data instead of being lost.
        description: Name of the column carrying per-value uncertainty (e.g. `pm_se`,
          `tmax_stderr`). Its semantics (uncertainty type, units) live in the Uncertainty
          microschema. Null with reason for products whose per-value uncertainty exists
          upstream but is not surfaced.
        title: Per-Value Uncertainty Column
        examples:
        - value: tmax_stderr
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DataLayout
        domain_of:
        - DataLayout
        range: string
      value_uncertainty_column_missing_reason:
        name: value_uncertainty_column_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: 'A bare null cannot be audited: it could mean the source has no
              per-value uncertainty, the pipeline dropped it, or the producer forgot
              to record it. Stating the reason makes the absence deliberate and lets
              reviewers tell "unavailable" from "lost", which matters for reproducing
              the extraction.'
          explanation:
            tag: explanation
            value: When there is no uncertainty column, this slot says why — for example
              "the upstream product does not provide one" versus "it exists upstream
              but was not extracted".
        description: Reason `value_uncertainty_column` is null.
        title: Reason Uncertainty Column Is Missing
        examples:
        - value: not_provided_by_source
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DataLayout
        domain_of:
        - DataLayout
        range: MissingReasonEnum
      quality_flag_column:
        name: quality_flag_column
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Without knowing where the per-value QA flags live, consumers cannot
              filter or down-weight values the producer already marked as suspect,
              so known-bad measurements flow silently into analyses.
          explanation:
            tag: explanation
            value: A quality flag column is like a traffic light next to each number
              — good, suspect, or bad — recorded by the data producer. This slot names
              that column; what the flag codes mean is described in the Uncertainty
              microschema.
        description: Name of any per-value QA flag column. CF `ancillary_variables`
          analogue; the flag vocabulary lives in the Uncertainty microschema.
        title: Quality Flag Column
        examples:
        - value: tmax_qc
          description: per-value QA flag column accompanying a `tmax` value column
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://cfconventions.org/
        owner: DataLayout
        domain_of:
        - DataLayout
        range: string
      quality_flag_column_missing_reason:
        name: quality_flag_column_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: 'Without a stated reason, a missing QA-flag column is ambiguous:
              the source may publish no flags, or the pipeline may have dropped them.
              The reason turns a silent gap into a documented decision that a reviewer
              can check against the upstream product.'
          explanation:
            tag: explanation
            value: When there is no quality-flag column, this slot says why it is
              absent — for example because the source dataset simply does not publish
              quality flags.
        description: Reason `quality_flag_column` is null.
        title: Reason Quality Flag Column Is Missing
        examples:
        - value: not_provided_by_source
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: DataLayout
        domain_of:
        - DataLayout
        range: MissingReasonEnum
  SpatialReference:
    name: SpatialReference
    annotations:
      domain_of_use:
        tag: domain_of_use
        value: environmental_exposure
    description: 'Spatial provenance of an environmental exposure value: the native
      grid / footprint of the source product, the CRS, the geographic extent, the
      extraction rule used to attach a value to a patient location, and the target
      geography type. One per record.'
    title: Spatial Reference
    from_schema: https://w3id.org/linkml/microschemas/envar
    see_also:
    - https://epsg.io/
    - https://en.wikipedia.org/wiki/Coordinate_reference_system
    slots:
    - native_spatial_resolution_m
    - native_spatial_resolution_descriptor
    - crs
    - spatial_extent_bbox
    - spatial_extent_descriptor
    - extraction_method
    - extraction_buffer_m
    - extraction_buffer_m_missing_reason
    - population_weighting_source
    - population_weighting_source_missing_reason
    - target_geography_type
    slot_usage:
      crs:
        name: crs
        required: true
      extraction_method:
        name: extraction_method
        required: true
      target_geography_type:
        name: target_geography_type
        required: true
    attributes:
      native_spatial_resolution_m:
        name: native_spatial_resolution_m
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: 'Exposure misclassification scales directly with cell size: a value
              from a 32 km NARR cell averages over an entire metro area while a 1
              km Daymet cell resolves a neighbourhood. Without the resolution, downstream
              users cannot judge how precise a per-patient exposure really is or whether
              two studies'' values are comparable.'
          explanation:
            tag: explanation
            value: Gridded environmental data divides the world into square tiles,
              like pixels in a photo, and reports one value per tile. This field says
              how wide each tile is in metres — small tiles give a sharp picture of
              local conditions, big tiles give a blurry average over a large area.
        description: Native spatial resolution of the source product in metres. Daymet
          = 1000, GridMET ≈ 4000, NARR ≈ 32000.
        title: Native Spatial Resolution (m)
        examples:
        - value: '1000'
          description: Daymet V4 1 km grid
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://daymet.ornl.gov/
        - https://www.climatologylab.org/gridmet.html
        - https://psl.noaa.gov/data/gridded/data.narr.html
        owner: SpatialReference
        domain_of:
        - SpatialReference
        range: float
      native_spatial_resolution_descriptor:
        name: native_spatial_resolution_descriptor
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: The numeric resolution alone cannot distinguish a regular grid
              from hex cells, polygons, or point stations, and these layouts imply
              different extraction and error behaviour. Omitting the label leaves
              the geometry of the source data ambiguous even when the cell size is
              known.
          explanation:
            tag: explanation
            value: A short plain-English phrase saying what the map data actually
              looks like — evenly spaced square tiles, honeycomb-shaped cells, irregular
              neighbourhood outlines, or individual measuring stations dotted around.
        description: Human-readable label for the native resolution, e.g. "1 km regular
          grid", "H3 hex zoom 8", "census tract polygon", "point station".
        title: Native Resolution Descriptor
        examples:
        - value: 1 km regular grid
          description: Daymet V4 native grid
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: SpatialReference
        domain_of:
        - SpatialReference
        range: string
      crs:
        name: crs
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: 'Without the CRS the grid cannot be placed on the Earth correctly:
              the same coordinate pair points to different physical locations under
              different reference systems, so a mismatched or missing CRS silently
              shifts every location and attaches exposure values to the wrong places.'
          explanation:
            tag: explanation
            value: A coordinate reference system is the agreed way of turning numbers
              into places on the Earth — the same pair of coordinates means different
              spots under different systems. Naming the system (usually as a short
              EPSG code) tells software exactly which convention the numbers follow.
        description: Coordinate reference system as an EPSG identifier or PROJ string.
          Mandatory. E.g. `EPSG:4326` for Daymet, `EPSG:5072` for NARR Lambert Conformal
          Conic.
        title: Coordinate Reference System (CRS)
        examples:
        - value: EPSG:4326
          description: WGS 84, used by the Daymet and ACAG PM2.5 scenarios
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://epsg.io/
        - https://proj.org/
        owner: SpatialReference
        domain_of:
        - SpatialReference
        range: string
        required: true
      spatial_extent_bbox:
        name: spatial_extent_bbox
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: The product footprint distinguishes "no value here" (the location
              lies outside the product's coverage) from "missing value" (the product
              covers it but the value is absent). Without it, out-of-extent patients
              look like data gaps and can be silently misinterpreted.
          explanation:
            tag: explanation
            value: A bounding box is a rectangle drawn on the map that just barely
              contains all the data — four numbers giving its western, southern, eastern,
              and northern edges. Anything outside that rectangle was never covered
              by the dataset in the first place.
        description: Bounding box of the source *product* (not the extracted subset),
          as `[min_lon, min_lat, max_lon, max_lat]`.
        title: Product Bounding Box
        examples:
        - value: '[-131.104, 14.075, -52.95, 53.038]'
          description: Daymet V4 product bounding box (CONUS + Hawaii + Puerto Rico);
            one float per list element, ordered min_lon, min_lat, max_lon, max_lat
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://datatracker.ietf.org/doc/html/rfc7946#section-5
        owner: SpatialReference
        domain_of:
        - SpatialReference
        range: float
        multivalued: true
      spatial_extent_descriptor:
        name: spatial_extent_descriptor
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: The numeric bounding box is precise but opaque; a human-readable
              extent lets reviewers and data users sanity-check coverage at a glance
              (e.g. spotting that Alaska is not included) without decoding coordinates.
          explanation:
            tag: explanation
            value: A plain-English description of where in the world the dataset has
              data — for example "the continental United States plus Hawaii and Puerto
              Rico" — so you can tell at a glance whether your study area is covered.
        description: Human-readable description of the product extent, e.g. "CONUS
          + Hawaii + Puerto Rico", "global land surface 60°S-80°N".
        title: Product Extent Description
        examples:
        - value: CONUS + Hawaii + Puerto Rico
          description: Daymet V4 product extent
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: SpatialReference
        domain_of:
        - SpatialReference
        range: string
      extraction_method:
        name: extraction_method
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: 'This is the single biggest lever in turning a grid into a per-person
              value: different extraction methods yield different exposure values
              at the very same point. If the method is unknown, exposure values are
              not reproducible and cannot be compared across studies or tool runs.'
          explanation:
            tag: explanation
            value: A patient's home almost never sits exactly at the centre of a data
              tile, so a rule is needed to pick or blend nearby tile values into one
              number for that spot — take the closest tile, average the four nearest
              ones, and so on. This field records which rule was used.
        description: How a gridded value was extracted at the patient's coordinates.
          Default for DeGAUSS daymet / narr is `inverse_distance_weighted_4_nearest_cells`.
        title: Extraction Method
        examples:
        - value: inverse_distance_weighted_4_nearest_cells
          description: DeGAUSS default for point extraction (Daymet Tmax scenario)
        - value: area_weighted_polygon_mean
          description: polygon aggregation (ACAG PM2.5 tract scenario)
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://degauss.org/
        owner: SpatialReference
        domain_of:
        - SpatialReference
        range: ExtractionMethodEnum
        required: true
      extraction_buffer_m:
        name: extraction_buffer_m
        annotations:
          tier:
            tag: tier
            value: conditionally_core
          justification:
            tag: justification
            value: For buffer-based strategies the radius is a hyperparameter that
              changes the assigned exposure — greenspace within 500 m and within 2500
              m of a home are different quantities. Omitting it makes buffer-derived
              values unreproducible and incomparable across analyses.
          explanation:
            tag: explanation
            value: Some exposures are summarised over a circle drawn around the patient's
              home rather than at the exact address — for example, how much green
              space lies within walking distance. This field gives the radius of that
              circle in metres; a bigger circle averages over more surroundings.
        description: Radius of any spatial buffer applied (e.g. greenspace at 500
          / 1500 / 2500 m). Null when no buffer is applied.
        title: Extraction Buffer Radius (m)
        examples:
        - value: '500'
          description: 500 m greenspace buffer; null in the Daymet Tmax scenario (no
            buffer)
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: SpatialReference
        domain_of:
        - SpatialReference
        range: float
      extraction_buffer_m_missing_reason:
        name: extraction_buffer_m_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: 'An empty buffer field is ambiguous: it could mean no buffer was
              used or that the radius was simply not recorded. Stating the reason
              makes the absence deliberate and checkable, so validators and reviewers
              do not flag a legitimate point extraction as incomplete metadata.'
          explanation:
            tag: explanation
            value: When the circle-radius field above is left empty, this field says
              why — most often because no circle was drawn at all and the value was
              taken straight at the address. It turns a silent blank into an explicit,
              trustworthy statement.
        description: Reason `extraction_buffer_m` is null.
        title: Reason Buffer Radius Is Missing
        examples:
        - value: not_applicable
          description: no buffer is used for point extraction (Daymet Tmax scenario)
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: SpatialReference
        domain_of:
        - SpatialReference
        range: MissingReasonEnum
      population_weighting_source:
        name: population_weighting_source
        annotations:
          tier:
            tag: tier
            value: conditionally_core
          justification:
            tag: justification
            value: Population-weighted values depend on which population dataset and
              census vintage supplied the weights; the same grid weighted by 2010
              versus 2020 populations gives different exposures. Without the source,
              a weighted value cannot be reproduced or compared with other weighted
              products.
          explanation:
            tag: explanation
            value: Some datasets average their tiles by giving more weight to places
              where more people live, so the number reflects what a typical resident
              experiences rather than a plain average over land. This field names
              the population map (and its year) that was used for that weighting.
        description: Census vintage used for population weighting (e.g. the Spangler
          et al. WBGT product is population-weighted from gridMET). Null when no weighting
          is applied.
        title: Population Weighting Source
        examples:
        - value: GPW v4 (2020)
          description: Gridded Population of the World v4, used in the ACAG PM2.5
            scenario
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://www.census.gov/programs-surveys/geography/guidance/geo-areas.html
        - https://www.climatologylab.org/gridmet.html
        owner: SpatialReference
        domain_of:
        - SpatialReference
        range: string
      population_weighting_source_missing_reason:
        name: population_weighting_source_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: A blank weighting source is ambiguous between "no weighting was
              applied" and "the source was not recorded". Recording the reason keeps
              unweighted products from looking like incompletely documented weighted
              ones and lets automated checks pass legitimately null records.
          explanation:
            tag: explanation
            value: When the population-weighting field above is empty, this field
              explains why — usually because the dataset is a plain average with no
              population weighting at all. It makes the emptiness intentional rather
              than an oversight.
        description: Reason `population_weighting_source` is null.
        title: Reason Population Weighting Is Missing
        examples:
        - value: not_applicable
          description: no population weighting applied (Daymet Tmax scenario)
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: SpatialReference
        domain_of:
        - SpatialReference
        range: MissingReasonEnum
      target_geography_type:
        name: target_geography_type
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: An exposure pinned to an exact residence and one averaged over
              a whole county are fundamentally different quantities with different
              privacy and misclassification profiles. Without the target geography,
              users cannot tell how localised the value is or link it correctly to
              health records held at a given geographic level.
          explanation:
            tag: explanation
            value: 'This says what kind of place the value belongs to: one specific
              home address, a neighbourhood-sized census area, a ZIP-code area, a
              whole county, and so on. The bigger the unit, the more the number is
              a shared average rather than a personal measurement.'
        description: Geographic unit the exposure value is attached to.
        title: Target Geography Type
        examples:
        - value: point_residence
          description: patient's exact residence coordinates (Daymet Tmax scenario)
        - value: census_tract
          description: tract-level aggregate (ACAG PM2.5 scenario)
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://www.census.gov/programs-surveys/geography/guidance/geo-areas.html
        owner: SpatialReference
        domain_of:
        - SpatialReference
        range: TargetGeographyTypeEnum
        required: true
  TemporalReference:
    name: TemporalReference
    annotations:
      domain_of_use:
        tag: domain_of_use
        value: environmental_exposure
    description: 'Temporal provenance of an environmental exposure value: native temporal
      grain, aggregation rule, day-boundary convention, coverage of the source product,
      the extraction window the run actually pulled, and calendar. One per record.'
    title: Temporal Reference
    from_schema: https://w3id.org/linkml/microschemas/envar
    see_also:
    - https://cfconventions.org/
    - https://en.wikipedia.org/wiki/ISO_8601
    slots:
    - temporal_resolution
    - temporal_aggregation_method
    - temporal_aggregation_window_seconds
    - day_boundary_convention
    - temporal_coverage_start
    - temporal_coverage_end
    - extraction_window_start
    - extraction_window_end
    - calendar
    slot_usage:
      temporal_resolution:
        name: temporal_resolution
        required: true
      temporal_aggregation_method:
        name: temporal_aggregation_method
        required: true
      day_boundary_convention:
        name: day_boundary_convention
        required: true
    attributes:
      temporal_resolution:
        name: temporal_resolution
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: A daily value and an annual value of the same variable are different
              exposures with different health associations; without the native grain
              an analyst cannot tell whether a series supports an acute (day-level)
              analysis or only a chronic one, and silent resampling between products
              goes undetected.
          explanation:
            tag: explanation
            value: How often does this dataset produce a number — one per hour, one
              per day, one per year? A daily temperature and a yearly average temperature
              are very different things, so you need to know which kind of value you
              are looking at before comparing anything.
        description: Native temporal grain of the values.
        title: Temporal Resolution
        examples:
        - value: daily
          description: Daymet Tmax — one value per day.
        - value: annual
          description: ACAG satellite PM2.5 — one value per year.
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://cfconventions.org/cf-conventions/cf-conventions.html#time-coordinate
        owner: TemporalReference
        domain_of:
        - TemporalReference
        range: TemporalResolutionEnum
        required: true
      temporal_aggregation_method:
        name: temporal_aggregation_method
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: '"Daily maximum" and "daily mean" temperature are different exposures
              with different health associations, and this is the field that separates
              them. Omitting it lets two studies silently compare a maximum against
              a mean and reach opposite conclusions about the same heat event.'
          explanation:
            tag: explanation
            value: Within each time window there are many raw measurements; this says
              which single number was kept — the highest, the average, the total.
              The hottest moment of a day and the average across the whole day can
              differ by many degrees, so it matters which one the value represents.
        description: How the value summarises sub-period values. Maps 1:1 to CF cell_methods.
        title: Temporal Aggregation Method
        examples:
        - value: maximum
          description: 'Daily Tmax — `time: maximum` in CF.'
        - value: mean
          description: 'Annual-mean PM2.5 — `time: mean` in CF.'
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://cfconventions.org/cf-conventions/cf-conventions.html#cell-methods
        owner: TemporalReference
        domain_of:
        - TemporalReference
        range: TemporalAggregationMethodEnum
        required: true
      temporal_aggregation_window_seconds:
        name: temporal_aggregation_window_seconds
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: 'A machine-checkable twin of `temporal_resolution`: an explicit
              numeric window (86400 for daily) lets validators verify the declared
              grain arithmetically instead of interpreting an enum label, catching
              a mislabelled resolution before it corrupts a temporal join.'
          explanation:
            tag: explanation
            value: The same "how long is one time step" answer, but written as a plain
              number of seconds — a day is 86,400 seconds. Computers can check and
              compare numbers much more reliably than words like "daily", so the redundancy
              is deliberate.
        description: Redundant with `temporal_resolution` but explicit for machine
          use; e.g. 86400 for daily, 3600 for hourly.
        title: Aggregation Window (seconds)
        examples:
        - value: '86400'
          description: Daily window (Daymet Tmax).
        - value: '31536000'
          description: Annual window (satellite PM2.5).
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: TemporalReference
        domain_of:
        - TemporalReference
        range: integer
      day_boundary_convention:
        name: day_boundary_convention
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: 'The single most-omitted slot in the environmental-health literature
              and a known source of cross-study disagreement: Daymet''s local-midnight
              day and PRISM''s 24h-ending-1200-GMT day slice the same thermometer
              readings differently, so the "daily Tmax" for the same calendar date
              can differ between products and lagged analyses can shift by a whole
              day. It is also the exposure-side half of the day-boundary cross-check
              against the clinical-side `clinical_date_assignment_convention`.'
          explanation:
            tag: explanation
            value: When does "Tuesday" start and end for this dataset — midnight local
              time, midnight in London, or noon-to-noon? Different products genuinely
              disagree, which changes which hot afternoon lands on which day.
        description: Where the 24-hour day window starts. **Mandatory.** Daymet =
          `local_midnight`; PRISM = `24h_ending_1200_GMT`; NARR / ERA5 sub-daily =
          `utc_midnight`. The single most-omitted slot in the literature and a known
          source of cross-study disagreement.
        title: Day-Boundary Convention
        examples:
        - value: local_midnight
          description: Daymet convention — day starts at local midnight.
        - value: not_applicable
          description: Annual PM2.5 aggregate — no day boundary is meaningful.
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://daymet.ornl.gov/
        - https://prism.oregonstate.edu/
        - https://psl.noaa.gov/data/gridded/data.narr.html
        owner: TemporalReference
        domain_of:
        - TemporalReference
        range: DayBoundaryConventionEnum
        required: true
      temporal_coverage_start:
        name: temporal_coverage_start
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: 'Distinguishes out-of-coverage from missing: without the product''s
              coverage start, a gap before 1980 in a Daymet-derived series looks like
              missing data rather than a request outside the product''s lifetime,
              and imputation or exclusion decisions go wrong.'
          explanation:
            tag: explanation
            value: The earliest date the source dataset has any data for at all. If
              you ask for a date before this, the answer is not "missing" — the dataset
              simply never covered that time.
        description: Start of the source product's full temporal coverage.
        title: Temporal Coverage Start
        examples:
        - value: '1980-01-01'
          description: Daymet V4 coverage starts in 1980.
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: TemporalReference
        domain_of:
        - TemporalReference
        range: date
      temporal_coverage_end:
        name: temporal_coverage_end
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Distinguishes out-of-coverage from missing at the recent end, and
              — because live products keep growing — pins down which vintage of the
              product this run saw, so a later re-run against a longer series can
              be recognised as a different extract.
          explanation:
            tag: explanation
            value: The latest date the source dataset covers; some products are still
              being extended. Asking for a date after this returns nothing — not because
              data is missing, but because it does not exist yet.
        description: End of the source product's coverage. May be an "ongoing" sentinel
          for live products.
        title: Temporal Coverage End
        examples:
        - value: '2024-12-31'
          description: End of Daymet V4 coverage at extraction time.
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: TemporalReference
        domain_of:
        - TemporalReference
        range: date
      extraction_window_start:
        name: extraction_window_start
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Records the dates this run actually pulled, as opposed to what
              the product offers; without it a reproducer cannot re-request the same
              slice, and a lag analysis cannot verify that the pre-event days (e.g.
              the day before the index date) were actually in the extract.
          explanation:
            tag: explanation
            value: Of everything the dataset covers, this is the first date this particular
              job actually downloaded — like noting which pages of a big book you
              photocopied.
        description: Actual start date the run extracted.
        title: Extraction Window Start
        examples:
        - value: '2022-07-18'
          description: Day before the Phoenix index date, for lag analysis.
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: TemporalReference
        domain_of:
        - TemporalReference
        range: date
      extraction_window_end:
        name: extraction_window_end
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: The closing bracket of the slice this run actually pulled; without
              it a reproducer cannot re-request the same window, and a lag analysis
              cannot verify that the post-event days it needs were actually extracted
              rather than silently truncated.
          explanation:
            tag: explanation
            value: Of everything the dataset covers, this is the last date this particular
              job actually downloaded — the end of the photocopied page range.
        description: Actual end date the run extracted.
        title: Extraction Window End
        examples:
        - value: '2022-07-20'
          description: Day after the Phoenix index date, for lag analysis.
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: TemporalReference
        domain_of:
        - TemporalReference
        range: date
      calendar:
        name: calendar
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Some climate-model output uses non-standard calendars (365-day
              noleap, 360-day); joining such a series to real-world Gregorian clinical
              dates without converting shifts daily values progressively through the
              year — a silent, cumulative misalignment.
          explanation:
            tag: explanation
            value: Most data uses the ordinary calendar, but some climate models simplify
              — for example pretending every year has exactly 365 days (no leap days)
              or twelve 30-day months. If you line those dates up against a real calendar
              without converting, they slowly drift out of sync.
        description: CF calendar. `gregorian` is the default; only matters when a
          source uses a non-standard calendar (some climate model output does).
        title: Calendar (CF)
        examples:
        - value: gregorian
          description: The default; used by Daymet and ACAG PM2.5 alike.
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://cfconventions.org/cf-conventions/cf-conventions.html#calendar
        owner: TemporalReference
        domain_of:
        - TemporalReference
        range: CalendarEnum
  SourceDataset:
    name: SourceDataset
    annotations:
      domain_of_use:
        tag: domain_of_use
        value: environmental_exposure
    description: The upstream gridded / station product the exposure values originate
      from. Carries identity, DOI, version, coverage, producer, citation, license,
      native format, and homogenisation status. One per record.
    title: Source Dataset
    from_schema: https://w3id.org/linkml/microschemas/envar
    see_also:
    - https://www.doi.org/
    - https://spdx.org/licenses/
    - https://wiki.esipfed.org/Attribute_Convention_for_Data_Discovery_1-3
    slots:
    - source_dataset_name
    - source_dataset_short_code
    - source_dataset_doi
    - source_dataset_doi_missing_reason
    - source_dataset_version
    - source_dataset_temporal_coverage
    - source_dataset_spatial_extent
    - source_producer_institution
    - source_citation_apa
    - source_citation_bibtex
    - source_citation_bibtex_missing_reason
    - source_license_spdx
    - source_access_url
    - source_native_format
    - source_homogenisation_status
    - source_homogenisation_status_missing_reason
    - source_acdd_attributes
    - source_acdd_attributes_missing_reason
    slot_usage:
      source_dataset_name:
        name: source_dataset_name
        required: true
      source_dataset_version:
        name: source_dataset_version
        required: true
    attributes:
      source_dataset_name:
        name: source_dataset_name
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: Without the product name, "daily maximum temperature" could come
              from any of a dozen products whose values disagree; the name is the
              first anchor for identifying which upstream data actually produced the
              exposure values.
          explanation:
            tag: explanation
            value: Weather and air-quality data come from named products made by different
              organisations, much like maps come from different map-makers. This is
              simply the full official name of the product the values were taken from.
        description: Full name of the source product, e.g. "Daymet V4 Daily Surface
          Weather Data", "GridMET", "NARR", "ERA5-HEAT".
        title: Source Dataset Name
        examples:
        - value: Daymet V4 Daily Surface Weather Data
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://daymet.ornl.gov/
        - https://www.ecmwf.int/en/forecasts/dataset/ecmwf-reanalysis-v5
        owner: SourceDataset
        domain_of:
        - SourceDataset
        range: string
        required: true
      source_dataset_short_code:
        name: source_dataset_short_code
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: A stable machine-readable key lets tools group and compare records
              from the same product without fuzzy-matching free-text names, which
              vary in spelling and capitalisation across studies.
          explanation:
            tag: explanation
            value: A short nickname for the dataset, like a username, that computers
              can match exactly — "Daymet V4 Daily Surface Weather Data" becomes just
              `daymet_v4`.
        description: Short code keying into the EnVar source registry, e.g. `daymet_v4`,
          `gridmet`, `narr`, `era5_heat`.
        title: Source Dataset Short Code
        examples:
        - value: daymet_v4
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: SourceDataset
        domain_of:
        - SourceDataset
        range: string
      source_dataset_doi:
        name: source_dataset_doi
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: The DOI is the durable handle for the source; access URLs rot,
              but a DOI keeps resolving to the dataset, so future readers can always
              retrieve exactly what was used and producers get citable credit.
          explanation:
            tag: explanation
            value: A DOI is a permanent ID for a dataset or paper that keeps working
              even when websites move. Looking it up at doi.org always leads to the
              current home of the data.
        description: DOI of the source dataset. Mandatory if a DOI exists. Daymet
          V4 = `10.3334/ORNLDAAC/2129`; ERA5 = `10.24381/cds.adbb2d47`.
        title: Source Dataset DOI
        examples:
        - value: 10.3334/ORNLDAAC/2129
          description: Daymet V4 R1 DOI
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://www.doi.org/
        - https://datacite.org/
        slot_uri: dcterms:identifier
        owner: SourceDataset
        domain_of:
        - SourceDataset
        range: string
      source_dataset_doi_missing_reason:
        name: source_dataset_doi_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Distinguishes "this product genuinely has no DOI" from "nobody
              filled the field in"; a blank is a bug, while a null-with-reason is
              information a completeness checker can act on.
          explanation:
            tag: explanation
            value: If the DOI box is empty, this field says why — for example, the
              producer never issued one. That way an empty field is a deliberate statement,
              not an oversight.
        description: Reason `source_dataset_doi` is null.
        title: Reason Source Dataset DOI Is Missing
        examples:
        - value: not_provided_by_source
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: SourceDataset
        domain_of:
        - SourceDataset
        range: MissingReasonEnum
      source_dataset_version:
        name: source_dataset_version
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: Version differences materially change values (e.g. ACAG V5 vs V6
              PM2.5), so two studies "using Daymet" may in fact use different data;
              a value without a version is not reproducible.
          explanation:
            tag: explanation
            value: Datasets get updated and re-released like software, and the numbers
              can change between releases. The version says exactly which release
              the values came from.
        description: Source product version. E.g. "V4 R1" for Daymet; "V5.GL.03" vs
          "V6.GL.02" for ACAG PM products. Version differences materially change values.
        title: Source Dataset Version
        examples:
        - value: V4 R1
          description: Daymet V4 Release 1
        - value: V5.GL.04
          description: ACAG global PM2.5 product version
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: SourceDataset
        domain_of:
        - SourceDataset
        range: string
        required: true
      source_dataset_temporal_coverage:
        name: source_dataset_temporal_coverage
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Knowing the product's full time span distinguishes "date outside
              the product's coverage" from "value genuinely missing", preventing coverage
              gaps from being misread as data errors.
          explanation:
            tag: explanation
            value: Simply the first and last dates the dataset covers. If you ask
              for a day outside that window, there was never any data to find — which
              is different from data that should exist but is missing.
        description: Source product temporal coverage as an ISO 8601 interval string
          `<start>/<end>`.
        title: Source Dataset Temporal Coverage
        examples:
        - value: 1980-01-01/2024-12-31
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://en.wikipedia.org/wiki/ISO_8601
        owner: SourceDataset
        domain_of:
        - SourceDataset
        range: string
      source_dataset_spatial_extent:
        name: source_dataset_spatial_extent
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: The product footprint distinguishes "location outside the product's
              extent" from "missing value"; without it, a subject in Alaska queried
              against a CONUS-only product looks like a data error rather than an
              out-of-coverage case.
          explanation:
            tag: explanation
            value: A plain-language note of which regions the dataset covers, for
              example the continental United States plus Hawaii and Puerto Rico. Places
              outside this area simply have no data.
        description: Human-readable spatial extent of the product, e.g. "CONUS, Hawaii,
          Puerto Rico".
        title: Source Dataset Spatial Extent
        examples:
        - value: CONUS, Hawaii, Puerto Rico
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: SourceDataset
        domain_of:
        - SourceDataset
        range: string
      source_producer_institution:
        name: source_producer_institution
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Identifies who is accountable for the product, supports correct
              attribution, and helps disambiguate similarly named products maintained
              by different institutions.
          explanation:
            tag: explanation
            value: The organisation that makes and publishes the dataset — for example
              a NASA data centre or a university group. Knowing who made the data
              tells you where to go with questions.
        description: Producer institution, e.g. "NASA ORNL DAAC", "University of Idaho",
          "NOAA NCEP", "ECMWF Copernicus".
        title: Producer Institution
        examples:
        - value: NASA ORNL DAAC
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: SourceDataset
        domain_of:
        - SourceDataset
        range: string
      source_citation_apa:
        name: source_citation_apa
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: The producer's requested citation is what enables attribution and
              retrieval; omitting it makes it harder for readers to credit the producers
              and to locate the exact product in the literature.
          explanation:
            tag: explanation
            value: The ready-to-paste reference for the dataset, formatted the way
              academic papers list their sources, so anyone reusing the data knows
              exactly how to cite it.
        description: Full APA-style citation for the source dataset.
        title: Source Citation (APA)
        examples:
        - value: 'Thornton, M.M., et al. (2022). Daymet: Daily Surface Weather Data
            on a 1-km Grid for North America, Version 4 R1. ORNL DAAC.'
          description: truncated form; the real citation lists all authors
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: SourceDataset
        domain_of:
        - SourceDataset
        range: string
      source_citation_bibtex:
        name: source_citation_bibtex
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: A machine-parseable citation lets reference managers and pipelines
              ingest the attribution automatically, avoiding transcription errors
              when the citation is copied by hand.
          explanation:
            tag: explanation
            value: BibTeX is a structured text format that reference-manager software
              understands. It carries the same citation as the human-readable text,
              but in a form computers can read directly.
        description: BibTeX entry for the source dataset, machine-parseable.
        title: Source Citation (BibTeX)
        examples:
        - value: '@misc{daymet_v4_r1, title={Daymet: Daily Surface Weather Data on
            a 1-km Grid for North America, Version 4 R1}, author={Thornton, M.M. and
            others}, year={2022}, publisher={ORNL DAAC}, doi={10.3334/ORNLDAAC/2129}}'
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: SourceDataset
        domain_of:
        - SourceDataset
        range: string
      source_citation_bibtex_missing_reason:
        name: source_citation_bibtex_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Records whether the BibTeX entry is absent because the producer
              never supplied one or because it was not extracted, so an empty field
              is auditable rather than ambiguous.
          explanation:
            tag: explanation
            value: If the machine-readable citation is empty, this field says why,
              so the gap is a deliberate statement rather than an oversight.
        description: Reason `source_citation_bibtex` is null.
        title: Reason BibTeX Citation Is Missing
        examples:
        - value: not_provided_by_source
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: SourceDataset
        domain_of:
        - SourceDataset
        range: MissingReasonEnum
      source_license_spdx:
        name: source_license_spdx
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Without the license, downstream deposit and redistribution legality
              is unknowable — you cannot tell whether derived exposure values may
              be shared, deposited in a repository, or must stay private.
          explanation:
            tag: explanation
            value: SPDX codes are standard short names for licenses, like CC-BY-4.0,
              so software can check reuse rules automatically. The license says what
              you are allowed to do with the data.
        description: SPDX identifier of the source license, e.g. `CC0-1.0`, `CC-BY-4.0`.
          Use `public-domain-us-gov` for US federal data with no formal SPDX equivalent.
        title: Source License (SPDX)
        examples:
        - value: public-domain-us-gov
          description: US federal data (e.g. Daymet V4)
        - value: CC-BY-4.0
          description: e.g. ACAG PM2.5 V5.GL
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://spdx.org/licenses/
        owner: SourceDataset
        domain_of:
        - SourceDataset
        range: string
      source_access_url:
        name: source_access_url
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: A stable landing page is how future users actually reach the data;
              a raw download link rots when files are reorganised, leaving the record
              pointing nowhere.
          explanation:
            tag: explanation
            value: The dataset's home page on the web — the front door where you can
              read about the data and find the download options — rather than a direct
              file link that stops working when files move.
        description: Landing-page URL for the dataset (not a download link, which
          rots).
        title: Source Access URL
        examples:
        - value: https://daymet.ornl.gov/
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: SourceDataset
        domain_of:
        - SourceDataset
        range: uri
      source_native_format:
        name: source_native_format
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: The shipping format determines which tools can read the source
              and what metadata survives; knowing it lets others rebuild the same
              extraction pipeline and anticipate format-specific quirks.
          explanation:
            tag: explanation
            value: Scientific data comes packaged in different file types (NetCDF,
              GeoTIFF, CSV, and others), a bit like documents come as PDF or Word.
              This records which package the producer ships.
        description: Format the source ships in.
        title: Source Native Format
        examples:
        - value: netcdf4_cf
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: SourceDataset
        domain_of:
        - SourceDataset
        range: SourceNativeFormatEnum
      source_homogenisation_status:
        name: source_homogenisation_status
        annotations:
          tier:
            tag: tier
            value: conditionally_core
          justification:
            tag: justification
            value: 'Using a non-homogenised station product (e.g. GHCN-Daily) for
              trend work without saying so is a known trap: station moves and instrument
              changes masquerade as climate signal. Mandatory for station-based products.'
          explanation:
            tag: explanation
            value: Weather stations get moved, replaced, or re-instrumented over the
              decades, which creates artificial jumps in their records. "Homogenised"
              data has had those jumps statistically corrected; "not homogenised"
              data is raw, as observed.
        description: For station-based products, whether values have been homogenised.
          Mandatory for station-based products; GHCN-D = `not_homogenised`, GHCN-M
          v4 = `homogenised`.
        title: Homogenisation Status
        examples:
        - value: not_homogenised
          description: e.g. GHCN-Daily station observations
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://en.wikipedia.org/wiki/Homogenization_(climate)
        owner: SourceDataset
        domain_of:
        - SourceDataset
        range: HomogenisationStatusEnum
      source_homogenisation_status_missing_reason:
        name: source_homogenisation_status_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: For gridded products homogenisation status is genuinely not applicable;
              recording that reason keeps the conditionally-core check auditable instead
              of leaving an ambiguous blank.
          explanation:
            tag: explanation
            value: If the homogenisation field is empty, this field says why — most
              often because the data is a gridded product rather than raw station
              records, so the question does not apply.
        description: Reason `source_homogenisation_status` is null.
        title: Reason Homogenisation Status Is Missing
        examples:
        - value: not_applicable
          description: e.g. gridded (non-station) products
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: SourceDataset
        domain_of:
        - SourceDataset
        range: MissingReasonEnum
      source_acdd_attributes:
        name: source_acdd_attributes
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Carrying the source's own ACDD header attributes forward preserves
              producer-supplied metadata verbatim, allowing later cross-checks against
              what this record claims without re-downloading the source.
          explanation:
            tag: explanation
            value: Many scientific data files carry a built-in "title page" of descriptive
              labels inside the file itself (following the ACDD convention). This
              field simply copies those labels across so nothing the producer wrote
              is lost.
        description: Passthrough of ACDD (Attribute Convention for Data Discovery)
          global attributes from the source NetCDF header, as a native key/value object.
        title: ACDD Global Attributes
        examples:
        - object:
            title: Daymet Daily Surface Weather Data
            institution: ORNL DAAC
            Conventions: CF-1.6, ACDD-1.3
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://wiki.esipfed.org/Attribute_Convention_for_Data_Discovery_1-3
        owner: SourceDataset
        domain_of:
        - SourceDataset
        range: AnyValue
        inlined: true
      source_acdd_attributes_missing_reason:
        name: source_acdd_attributes_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Distinguishes sources that ship no ACDD headers (e.g. CSV station
              data) from headers that simply were not extracted, keeping the empty
              field auditable.
          explanation:
            tag: explanation
            value: If the copied-over file labels are absent, this field says why
              — often because the source is not distributed as a NetCDF file that
              carries such labels.
        description: Reason `source_acdd_attributes` is null.
        title: Reason ACDD Attributes Are Missing
        examples:
        - value: not_provided_by_source
          description: e.g. source not distributed as NetCDF with ACDD headers
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: SourceDataset
        domain_of:
        - SourceDataset
        range: MissingReasonEnum
  ExposureModel:
    name: ExposureModel
    annotations:
      domain_of_use:
        tag: domain_of_use
        value: environmental_exposure
    description: The model class that produced the values (interpolation, reanalysis,
      ML, statistical blend, equation), its inputs, its methods-paper DOI, its cross-validation
      skill, known biases, and any bias correction. One per record; may be null for
      direct observation.
    title: Exposure Model
    from_schema: https://w3id.org/linkml/microschemas/envar
    see_also:
    - https://en.wikipedia.org/wiki/Reanalysis_(meteorology)
    slots:
    - exposure_model_type
    - exposure_model_inputs
    - exposure_model_paper_doi
    - exposure_model_paper_doi_missing_reason
    - exposure_model_cross_validation_r2
    - exposure_model_cross_validation_r2_missing_reason
    - exposure_model_known_biases
    - exposure_model_ensemble_member_count
    - exposure_model_ensemble_member_count_missing_reason
    - bias_correction_applied
    - bias_correction_applied_missing_reason
    slot_usage:
      exposure_model_type:
        name: exposure_model_type
        required: true
    attributes:
      exposure_model_type:
        name: exposure_model_type
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: A measured value, an interpolated value, and an ML-predicted value
              have different error structures and cannot be pooled naively; this is
              the field that tells them apart. Without it, users cannot judge whether
              values are measurements or predictions.
          explanation:
            tag: explanation
            value: 'Most "exposure" numbers were never measured at your door: a model
              estimates them from weather stations, satellites, or physics equations.
              This field says which kind of machinery produced the number, so you
              know how much to trust it and what could go wrong.'
        description: The class of model that produced the values. Daymet = `spatial_interpolation`;
          NARR / ERA5 = `reanalysis`; GridMET = `statistical_blend`; Brokamp PM =
          `single_machine_learning`; Di et al. PM = `ensemble_machine_learning`.
        title: Exposure Model Type
        examples:
        - value: spatial_interpolation
          description: Daymet V4 daily Tmax (station observations interpolated to
            a 1 km grid)
        - value: satellite_retrieval
          description: ACAG V5.GL satellite-derived annual PM2.5
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://daymet.ornl.gov/
        - https://www.climatologylab.org/gridmet.html
        - https://www.ecmwf.int/en/forecasts/dataset/ecmwf-reanalysis-v5
        owner: ExposureModel
        domain_of:
        - ExposureModel
        range: ExposureModelTypeEnum
        required: true
      exposure_model_inputs:
        name: exposure_model_inputs
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Needed to trace what the value actually derives from. Without the
              input list, a shared bias or gap in an upstream dataset cannot be traced
              through to the exposure values it contaminated.
          explanation:
            tag: explanation
            value: A model is only as good as what you feed it. This lists the raw
              ingredients — station readings, satellite images, other datasets — that
              went into cooking up the final numbers.
        description: 'Inputs to the model. For GridMET: `["PRISM monthly normals",
          "NLDAS-2 sub-daily reanalysis"]`. For derived heat metrics, the input variable
          list (held in `DerivedHeatMetric.equation_inputs` for typed cases).'
        title: Exposure Model Inputs
        examples:
        - value: GHCN-Daily station observations
          description: sole element of the Daymet V4 input list
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://prism.oregonstate.edu/
        owner: ExposureModel
        domain_of:
        - ExposureModel
        range: string
        multivalued: true
      exposure_model_paper_doi:
        name: exposure_model_paper_doi
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: The reproducibility anchor for how the value was made. Without
              it, anyone auditing or reproducing the analysis must guess which of
              several versions of a method the values actually came from.
          explanation:
            tag: explanation
            value: Scientists publish a paper describing exactly how a model works,
              and a DOI is a permanent web address for that paper. Recording it here
              means anyone can look up the full recipe behind the numbers, even years
              later.
        description: DOI of the methods paper describing the model (Thornton et al.
          2022 for Daymet; Abatzoglou 2013 for GridMET).
        title: Methods Paper DOI
        examples:
        - value: 10.1021/acs.est.1c05309
          description: van Donkelaar et al. 2021 methods paper for ACAG PM2.5
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://www.doi.org/
        owner: ExposureModel
        domain_of:
        - ExposureModel
        range: string
      exposure_model_paper_doi_missing_reason:
        name: exposure_model_paper_doi_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Distinguishes "no methods paper exists" from "nobody bothered to
              record it". Without the reason, a blank DOI silently hides whether the
              model is undocumented or the metadata is just incomplete.
          explanation:
            tag: explanation
            value: When a field is empty, it helps to say why. This slot records whether
              the paper genuinely does not exist, was not shared by the producer,
              or simply was not looked up.
        description: Reason `exposure_model_paper_doi` is null.
        title: Reason Methods Paper DOI Is Missing
        examples:
        - value: not_provided_by_source
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: ExposureModel
        domain_of:
        - ExposureModel
        range: MissingReasonEnum
      exposure_model_cross_validation_r2:
        name: exposure_model_cross_validation_r2
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: The single most useful one-number quality signal for a modeled
              product. Omitting it leaves downstream users with no quantitative basis
              for weighing one exposure product against another or for propagating
              model skill into their error budgets.
          explanation:
            tag: explanation
            value: Cross-validation R² is a 0-to-1 score of how well the model predicted
              values it had never seen during training — closer to 1 is better. A
              score of 0.90 means the model captures most of the real variation; a
              low score means treat the numbers with caution.
        description: Model cross-validation R², where reported by the producer.
        title: Cross-Validation R²
        examples:
        - value: '0.90'
          description: reported for ACAG V5.GL satellite-derived PM2.5
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://en.wikipedia.org/wiki/Coefficient_of_determination
        owner: ExposureModel
        domain_of:
        - ExposureModel
        range: float
      exposure_model_cross_validation_r2_missing_reason:
        name: exposure_model_cross_validation_r2_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Separates "the producer never published a skill score" from "we
              forgot to record it". Without this, a missing R² is ambiguous and reviewers
              cannot tell an undocumented model from sloppy metadata.
          explanation:
            tag: explanation
            value: If the quality score is blank, this slot says why — for example,
              some well-known products simply never publish one. It turns an empty
              field into an honest answer.
        description: Reason `exposure_model_cross_validation_r2` is null.
        title: Reason Cross-Validation R² Is Missing
        examples:
        - value: not_provided_by_source
          description: Daymet does not publish a cross-validation R²
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: ExposureModel
        domain_of:
        - ExposureModel
        range: MissingReasonEnum
      exposure_model_known_biases:
        name: exposure_model_known_biases
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: The field reviewers care about most; it bites coastal and sparse-station
              analyses in particular. Omitting it lets a documented systematic error
              (e.g. a coastal cold bias) silently propagate into health-effect estimates
              that reviewers will later reject.
          explanation:
            tag: explanation
            value: Every model has known blind spots — places or conditions where
              it is reliably a bit wrong, like running warm in summer or cold at the
              coast. This slot writes those warnings down so the next person does
              not rediscover them the hard way.
        description: Free-text flags of known issues, e.g. "NLDAS-2 coastal Tmax bias
          up to -1.48 °C", "NARR cold bias at extremes", "Daymet warm bias in summer
          in some western US regions". The field reviewers care about.
        title: Known Model Biases
        examples:
        - value: warm-season warm bias documented in some western US regions
          description: one known bias of Daymet V4 daily Tmax
        - value: interpolation degrades in sparse-station areas
          description: another element of the same Daymet V4 bias list
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://psl.noaa.gov/data/gridded/data.narr.html
        - https://daymet.ornl.gov/
        owner: ExposureModel
        domain_of:
        - ExposureModel
        range: string
        multivalued: true
      exposure_model_ensemble_member_count:
        name: exposure_model_ensemble_member_count
        annotations:
          tier:
            tag: tier
            value: conditionally_core
          justification:
            tag: justification
            value: 'Mandatory for ensemble products: the member count determines how
              the ensemble spread can be interpreted as an uncertainty estimate. Without
              it, per-value spread statistics cannot be reproduced or sanity-checked.'
          explanation:
            tag: explanation
            value: Some products run the same model many times with slightly different
              settings and combine the results — each run is a "member". Knowing how
              many members there were (say, 100) tells you how much the spread between
              runs can be trusted as a measure of uncertainty.
        description: For ensemble products, the number of members. Null with reason
          `not_provided_by_source` for single-realisation products.
        title: Ensemble Member Count
        examples:
        - value: '100'
          description: e.g. an ensemble ML product with 100 members; single-realisation
            products such as Daymet leave this null
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://en.wikipedia.org/wiki/Ensemble_forecasting
        owner: ExposureModel
        domain_of:
        - ExposureModel
        range: integer
      exposure_model_ensemble_member_count_missing_reason:
        name: exposure_model_ensemble_member_count_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Confirms explicitly that a product is single-realisation rather
              than an ensemble whose member count was dropped. Without it, a null
              count is ambiguous and the conditionally-core rule for ensemble products
              cannot be audited.
          explanation:
            tag: explanation
            value: Many products come from just one model run, so "number of members"
              genuinely does not apply. This slot says so explicitly, instead of leaving
              readers to wonder whether information was lost.
        description: Reason `exposure_model_ensemble_member_count` is null.
        title: Reason Ensemble Member Count Is Missing
        examples:
        - value: not_applicable
          description: single-realisation products (Daymet, ACAG) have no ensemble
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: ExposureModel
        domain_of:
        - ExposureModel
        range: MissingReasonEnum
      bias_correction_applied:
        name: bias_correction_applied
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Pooling bias-corrected and raw values silently mixes apples and
              oranges. Without this flag, an analyst cannot tell whether two datasets
              differ because of the environment or because one of them was statistically
              adjusted.
          explanation:
            tag: explanation
            value: Sometimes model output is nudged after the fact to better match
              real observations — that nudging is "bias correction". This slot records
              whether the numbers were adjusted that way and, if so, which technique
              was used.
        description: Whether and how bias correction has been applied. Usually `none`
          for Tmax from reference products.
        title: Bias Correction Applied
        examples:
        - value: none
          description: Daymet V4 daily Tmax is used uncorrected
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: ExposureModel
        domain_of:
        - ExposureModel
        range: BiasCorrectionAppliedEnum
      bias_correction_applied_missing_reason:
        name: bias_correction_applied_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Distinguishes "the producer never documented any correction" from
              an unrecorded answer. Without it, a blank bias-correction field cannot
              be told apart from missing metadata, weakening any audit of how values
              were adjusted.
          explanation:
            tag: explanation
            value: If nobody could say whether the numbers were statistically adjusted,
              this slot records why that answer is missing — for example, the data
              producer never documented it.
        description: Reason `bias_correction_applied` is null.
        title: Reason Bias Correction Is Missing
        examples:
        - value: not_provided_by_source
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: ExposureModel
        domain_of:
        - ExposureModel
        range: MissingReasonEnum
  Uncertainty:
    name: Uncertainty
    annotations:
      domain_of_use:
        tag: domain_of_use
        value: environmental_exposure
    description: 'Uncertainty and quality character of a value series: per-value uncertainty
      type / units, model-aggregate uncertainty summary, quality flag vocabulary,
      missing-data handling, and data completeness. The uncertainty / QA-flag column
      bindings live in DataLayout (see envar_layout). One per record; slots may be
      null with reasons.'
    title: Uncertainty and Quality
    from_schema: https://w3id.org/linkml/microschemas/envar
    see_also:
    - https://en.wikipedia.org/wiki/Uncertainty_quantification
    slots:
    - per_value_uncertainty_type
    - per_value_uncertainty_type_missing_reason
    - per_value_uncertainty_units_ucum
    - per_value_uncertainty_units_ucum_missing_reason
    - model_aggregate_uncertainty
    - model_aggregate_uncertainty_missing_reason
    - quality_flag_vocabulary
    - quality_flag_vocabulary_missing_reason
    - missing_data_handling_method
    - missing_data_handling_method_missing_reason
    - data_completeness_pct
    - data_completeness_pct_missing_reason
    attributes:
      per_value_uncertainty_type:
        name: per_value_uncertainty_type
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: 'A "±" number means nothing until you know what kind of number
              it is: a standard error, a 95 % prediction interval, and an ensemble
              spread are not interchangeable and cannot be pooled or propagated the
              same way. Without the type, downstream code either mishandles the uncertainty
              or drops it, so exposure measurement error goes unaccounted for and
              health-effect estimates are biased, usually toward the null.'
          explanation:
            tag: explanation
            value: Every estimated value comes with a "how sure are we" number, but
              there are several different kinds. This says which kind you are looking
              at — for example a standard error (a ± number saying how far off the
              estimate could plausibly be) versus a prediction interval (a range the
              true value should fall inside, say 95 times out of 100).
        description: Kind of per-value uncertainty captured in the column named by
          `DataLayout.value_uncertainty_column` (see envar_layout).
        title: Per-Value Uncertainty Type
        examples:
        - value: standard_error
          description: Daymet daily Tmax reports a per-value standard error.
        - value: prediction_interval
          description: ACAG satellite PM2.5 reports a per-value prediction interval.
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://en.wikipedia.org/wiki/Standard_error
        - https://en.wikipedia.org/wiki/Prediction_interval
        owner: Uncertainty
        domain_of:
        - Uncertainty
        range: UncertaintyTypeEnum
      per_value_uncertainty_type_missing_reason:
        name: per_value_uncertainty_type_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Records the difference between "we know the source has no per-value
              uncertainty" and "someone forgot to fill this in". Without the reason,
              a blank uncertainty type is ambiguous and a validator cannot tell an
              honest gap from an oversight, so quality-completeness reporting is unreliable.
          explanation:
            tag: explanation
            value: If the uncertainty-type field is left empty, this simply says why
              — for instance the original dataset never published one. It turns a
              confusing blank into an explicit, honest "not available, and here is
              the reason".
        description: Reason `per_value_uncertainty_type` is null.
        title: Reason Uncertainty Type Is Missing
        examples:
        - value: not_provided_by_source
          description: The source product publishes no per-value uncertainty.
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: Uncertainty
        domain_of:
        - Uncertainty
        range: MissingReasonEnum
      per_value_uncertainty_units_ucum:
        name: per_value_uncertainty_units_ucum
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: 'An uncertainty number is meaningless without its units: a per-value
              error of "2" is 2 °C or 2 K depending on this field, and a mismatch
              between value units and uncertainty units silently corrupts any error
              propagation into the health analysis.'
          explanation:
            tag: explanation
            value: This says what the uncertainty is measured in — degrees Celsius,
              micrograms per cubic metre, and so on — written in a standard code (UCUM)
              that computers read the same way every time. Usually it matches the
              units of the value itself.
        description: Units of the per-value uncertainty in UCUM syntax. Usually the
          same as the value units.
        title: Uncertainty Units (UCUM)
        examples:
        - value: Cel
          description: Standard error of a daily Tmax value, in degrees Celsius.
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://ucum.org/
        owner: Uncertainty
        domain_of:
        - Uncertainty
        range: string
      per_value_uncertainty_units_ucum_missing_reason:
        name: per_value_uncertainty_units_ucum_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Distinguishes "there is no uncertainty column, so units genuinely
              do not apply" from an accidental omission. Without the reason a blank
              units field is ambiguous and completeness checks cannot tell a legitimate
              not-applicable from a missing entry.
          explanation:
            tag: explanation
            value: If the uncertainty-units field is blank, this explains why — often
              because there is no uncertainty column at all, so there is nothing to
              put units on. It stops a reader from wondering whether the units were
              simply forgotten.
        description: Reason `per_value_uncertainty_units_ucum` is null.
        title: Reason Uncertainty Units Are Missing
        examples:
        - value: not_applicable
          description: No per-value uncertainty column exists, so units do not apply.
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: Uncertainty
        domain_of:
        - Uncertainty
        range: MissingReasonEnum
      model_aggregate_uncertainty:
        name: model_aggregate_uncertainty
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Per-value uncertainty is often absent, so the whole-model cross-validation
              summary (R², RMSE) is frequently the only quantitative handle on how
              accurate the product is. Without it an analyst cannot judge whether
              the exposure estimates are precise enough for the health question, and
              cannot compare the reliability of two products.
          explanation:
            tag: explanation
            value: A report card for how well the model predicts reality overall,
              checked by holding some data back and seeing how close its guesses came
              — for example an R² near 1 means the model tracks the true values closely.
              It also records where those scores were published.
        description: Summary statistics for the model as a whole — cross-validation
          metrics and where they are reported.
        title: Model Aggregate Uncertainty
        examples:
        - description: Cross-validated R² for ACAG satellite PM2.5 and its reporting
            DOI.
          object:
            cv_r2: 0.9
            reported_in: 10.1021/acs.est.1c05309
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://en.wikipedia.org/wiki/Cross-validation_(statistics)
        owner: Uncertainty
        domain_of:
        - Uncertainty
        range: ModelAggregateUncertainty
        inlined: true
      model_aggregate_uncertainty_missing_reason:
        name: model_aggregate_uncertainty_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Separates "the producer published no cross-validation metrics"
              from a forgotten entry. Without the reason, a missing model-accuracy
              summary looks like a data-entry lapse, and reviewers cannot tell whether
              the information was ever available.
          explanation:
            tag: explanation
            value: When the model-accuracy summary is missing, this says why — usually
              because the people who made the dataset never reported those scores.
              It makes the absence deliberate and explainable rather than a mystery
              blank.
        description: Reason `model_aggregate_uncertainty` is null.
        title: Reason Aggregate Uncertainty Is Missing
        examples:
        - value: not_provided_by_source
          description: The producer reports no whole-model cross-validation metrics.
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: Uncertainty
        domain_of:
        - Uncertainty
        range: MissingReasonEnum
      quality_flag_vocabulary:
        name: quality_flag_vocabulary
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: QA flags (e.g. "estimated", "below detection limit", "instrument
              malfunction") are only interpretable against the code list that defines
              them; without naming the vocabulary, a flagged value cannot be correctly
              filtered or trusted, so suspect measurements may enter the analysis
              unnoticed.
          explanation:
            tag: explanation
            value: Some datasets tag individual values with short quality codes —
              think of the little footnote letters next to numbers in a table. This
              points to the key that explains what each code means, so you know which
              readings to trust or set aside.
        description: Reference to the QA flag vocabulary (e.g. an EPA AQS qualifier-code
          list) used by the column named in `DataLayout.quality_flag_column` (see
          envar_layout).
        title: Quality Flag Vocabulary
        examples:
        - value: EPA AQS qualifier codes
          description: Flag vocabulary for monitor-derived series; gridded products
            often have none.
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: Uncertainty
        domain_of:
        - Uncertainty
        range: string
      quality_flag_vocabulary_missing_reason:
        name: quality_flag_vocabulary_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Distinguishes "this product has no QA flags at all" (common for
              gridded data) from an omission. Without the reason, an empty vocabulary
              field is ambiguous and a completeness check cannot tell an inapplicable
              entry from a missing one.
          explanation:
            tag: explanation
            value: If there is no quality-code key listed, this says why — often because
              the dataset simply does not use quality codes. It turns a blank into
              a clear statement rather than leaving the reader guessing.
        description: Reason `quality_flag_vocabulary` is null.
        title: Reason Quality Flag Vocabulary Is Missing
        examples:
        - value: not_provided_by_source
          description: Daymet publishes no QA-flag column, so no vocabulary exists.
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: Uncertainty
        domain_of:
        - Uncertainty
        range: MissingReasonEnum
      missing_data_handling_method:
        name: missing_data_handling_method
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: 'How gaps were filled is often invisible downstream: an interpolated
              value looks identical to a measured one, so without this field an analyst
              overstates coverage and treats imputed exposures as if they were observed,
              biasing associations in unknown directions. It is the difference between
              apparent and real completeness.'
          explanation:
            tag: explanation
            value: 'Real data has holes — a cloud blocks a satellite, snow covers
              a sensor. This says what the dataset did about those holes: leave them
              empty, guess from nearby days and places, copy the last known value,
              and so on. Filled-in numbers can look just like real measurements, so
              it matters to know which is which.'
        description: How the source handles missing values (e.g. how Daymet handles
          snow-covered pixels).
        title: Missing Data Handling Method
        examples:
        - value: spatiotemporal_interpolation
          description: Daymet fills missing cells by spatiotemporal interpolation.
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://daymet.ornl.gov/
        owner: Uncertainty
        domain_of:
        - Uncertainty
        range: MissingDataHandlingEnum
      missing_data_handling_method_missing_reason:
        name: missing_data_handling_method_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Separates "the producer never documented how gaps were handled"
              from an entry someone forgot. Without the reason, a blank handling method
              is ambiguous and an analyst cannot judge whether the gap-filling behaviour
              is unknown or simply unrecorded here.
          explanation:
            tag: explanation
            value: When the gap-handling method is left empty, this explains why —
              often because the original dataset never said how it dealt with missing
              values. It makes the unknown explicit instead of a silent blank.
        description: Reason `missing_data_handling_method` is null.
        title: Reason Handling Method Is Missing
        examples:
        - value: not_provided_by_source
          description: The producer does not document its missing-data handling.
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: Uncertainty
        domain_of:
        - Uncertainty
        range: MissingReasonEnum
      data_completeness_pct:
        name: data_completeness_pct
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: A quantitative handle on how much of the requested exposure window
              is actually populated. A series that is 60 % complete supports very
              different inferences from one that is 100 % complete; without this number,
              sparse coverage is hidden and averages or exposure windows are computed
              over gaps as if they were full, biasing the health analysis.
          explanation:
            tag: explanation
            value: Out of all the days and places you asked about, this is the percentage
              that actually have a value — 100 means nothing is missing, 60 means
              four in ten slots are blank. It is a quick honesty check on how full
              the dataset really is.
        description: Percent of (location, date) cells in the extracted window that
          have a non-missing value. 0-100.
        title: Data Completeness Percentage
        examples:
        - value: '100'
          description: Every (location, date) cell in the extracted window has a value.
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: Uncertainty
        domain_of:
        - Uncertainty
        range: float
      data_completeness_pct_missing_reason:
        name: data_completeness_pct_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Distinguishes "completeness is genuinely uncomputable" from "it
              could be derived but the pipeline does not yet do so" — a distinction
              that tells a data steward whether the gap is a limitation of the source
              or a fixable pipeline shortfall.
          explanation:
            tag: explanation
            value: If the completeness percentage is missing, this says why — for
              example the number could be worked out from the data but the software
              has not been set up to calculate it yet. It flags the blank as a known
              to-do rather than an impossibility.
        description: Reason `data_completeness_pct` is null.
        title: Reason Data Completeness Is Missing
        examples:
        - value: available_but_not_extracted
          description: Completeness could be computed from the output but the pipeline
            does not yet do so.
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: Uncertainty
        domain_of:
        - Uncertainty
        range: MissingReasonEnum
  ModelAggregateUncertainty:
    name: ModelAggregateUncertainty
    description: Whole-model uncertainty summary — cross-validation metrics and the
      reference where they are reported. Inlined on `model_aggregate_uncertainty`.
    title: Model Aggregate Uncertainty
    from_schema: https://w3id.org/linkml/microschemas/envar
    see_also:
    - https://en.wikipedia.org/wiki/Root_mean_square_deviation
    - https://en.wikipedia.org/wiki/Coefficient_of_determination
    attributes:
      cv_r2:
        name: cv_r2
        annotations:
          justification:
            tag: justification
            value: The single most comparable headline number for model skill. Without
              it a consumer cannot weigh this product against an alternative, or decide
              whether the model is good enough for the health analysis at hand.
          explanation:
            tag: explanation
            value: A 0-to-1 score of how well the model's predictions matched reality
              on data it was not trained on — 1 is perfect, 0 is no better than always
              guessing the average. "Cross-validated" means the test used held-out
              data, so the score is honest.
        description: Cross-validated R² for the model as a whole.
        title: Cross-Validated R²
        examples:
        - value: '0.86'
          description: Di et al. ensemble PM2.5
        from_schema: https://w3id.org/linkml/microschemas/envar/uncertainty
        owner: ModelAggregateUncertainty
        domain_of:
        - ModelAggregateUncertainty
        range: float
      cv_rmse:
        name: cv_rmse
        annotations:
          justification:
            tag: justification
            value: R² alone hides how large the errors actually are. RMSE states the
              typical error in the value's own units, which is what determines whether
              model error is negligible or fatal for a given effect size.
          explanation:
            tag: explanation
            value: Root-mean-square error — the typical size of the model's mistakes,
              in the same units as the value itself (e.g. °C or µg/m³). Smaller is
              better.
        description: Cross-validated RMSE for the model as a whole.
        title: Cross-Validated RMSE
        examples:
        - value: '1.89'
          description: Di et al. ensemble PM2.5, in µg/m³ (same model as the cv_r2
            example)
        from_schema: https://w3id.org/linkml/microschemas/envar/uncertainty
        owner: ModelAggregateUncertainty
        domain_of:
        - ModelAggregateUncertainty
        range: float
      reported_in:
        name: reported_in
        annotations:
          justification:
            tag: justification
            value: Uncertainty numbers copied into a sidecar are only as trustworthy
              as their source. Without the reference the metrics cannot be verified,
              attributed, or updated when the producer revises them.
          explanation:
            tag: explanation
            value: Where these numbers come from — the paper or report (ideally a
              DOI) so a reader can check them at the source.
        description: DOI / citation where the aggregate uncertainty is reported.
        title: Reporting Reference
        examples:
        - value: 10.1016/j.envint.2019.104909
          description: DOI of the methods paper reporting the metrics
        from_schema: https://w3id.org/linkml/microschemas/envar/uncertainty
        owner: ModelAggregateUncertainty
        domain_of:
        - ModelAggregateUncertainty
        range: string
  LinkageMethod:
    name: LinkageMethod
    annotations:
      domain_of_use:
        tag: domain_of_use
        value: environmental_exposure
    description: 'How a gridded environmental value gets attached to a patient: the
      resolution of the patient''s spatiotemporal trajectory down to the resolution
      the exposure data supports. Covers the linkage strategy and buffer parameters,
      the propagated geocoder precision and score, how patient location-over-time
      is modelled (the spatial axis), and the clinical-date-assignment convention,
      partial-day attribution, and lag alignment (the temporal axis). One per record.'
    title: Linkage Method
    from_schema: https://w3id.org/linkml/microschemas/envar
    see_also:
    - https://degauss.org/
    slots:
    - linkage_strategy
    - linkage_buffer_radius_m
    - linkage_buffer_radius_m_missing_reason
    - linkage_buffer_aggregation_method
    - linkage_buffer_aggregation_method_missing_reason
    - linkage_max_distance_to_station_m
    - linkage_max_distance_to_station_m_missing_reason
    - geocoding_precision_propagated
    - geocoding_score_propagated
    - geocoding_score_propagated_missing_reason
    - address_period_alignment
    - clinical_date_assignment_convention
    - clinical_date_assignment_convention_missing_reason
    - partial_day_attribution_rule
    - partial_day_attribution_rule_missing_reason
    - lag_alignment_applied
    - lag_alignment_specifier
    - lag_alignment_applied_missing_reason
    slot_usage:
      linkage_strategy:
        name: linkage_strategy
        required: true
    attributes:
      linkage_strategy:
        name: linkage_strategy
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: 'The strategy determines which grid cells or stations contribute
              to a patient''s value: point extraction, buffer aggregation, and population
              weighting can assign materially different exposures to the same address.
              Without it the person-level value cannot be reproduced or compared across
              studies — this is the "linkage descriptor" gap named by the GECC/EIRENE
              forum.'
          explanation:
            tag: explanation
            value: Environmental data comes as a map of values, but health data belongs
              to people. This slot records the rule used to pick a person's value
              off that map — for example reading the value exactly at their home,
              or averaging the values in a circle around it.
        description: How a gridded value is attached to a patient location.
        title: Linkage Strategy
        examples:
        - value: point_extraction_at_residence
          description: extract the grid-cell value at the geocoded residence (Daymet
            tmax scenario)
        - value: population_weighted_area_to_residence
          description: population-weighted aggregation over the residence tract (ACAG
            PM2.5 scenario)
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: LinkageMethod
        domain_of:
        - LinkageMethod
        range: LinkageStrategyEnum
        required: true
      linkage_buffer_radius_m:
        name: linkage_buffer_radius_m
        annotations:
          tier:
            tag: tier
            value: conditionally_core
          justification:
            tag: justification
            value: 'For buffer strategies the radius defines the exposure footprint:
              a 500 m and a 5 km buffer around the same residence can average over
              very different air or heat conditions, so the assigned value is not
              reproducible without it.'
          explanation:
            tag: explanation
            value: When exposure is averaged over a circle drawn around a person's
              home, this is how wide that circle is, in metres.
        description: Buffer radius in metres for buffer-aggregation strategies.
        title: Buffer Radius (Metres)
        examples:
        - value: '500'
          description: 500 m buffer around the geocoded residence
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: LinkageMethod
        domain_of:
        - LinkageMethod
        range: float
      linkage_buffer_radius_m_missing_reason:
        name: linkage_buffer_radius_m_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Distinguishes "no buffer applies because the strategy is point
              extraction" from "the radius was simply not recorded" — without it a
              null radius is ambiguous and the linkage cannot be audited.
          explanation:
            tag: explanation
            value: When the circle-width field is empty, this says why — for example
              because no circle was used at all.
        description: Reason `linkage_buffer_radius_m` is null.
        title: Reason Buffer Radius Is Missing
        examples:
        - value: not_applicable
          description: strategy is point extraction, so no buffer radius applies
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: LinkageMethod
        domain_of:
        - LinkageMethod
        range: MissingReasonEnum
      linkage_buffer_aggregation_method:
        name: linkage_buffer_aggregation_method
        annotations:
          tier:
            tag: tier
            value: conditionally_core
          justification:
            tag: justification
            value: Within the same buffer, mean, max, and area-weighted mean yield
              different exposure values; omitting the method makes the assigned value
              irreproducible and cross-study comparisons unsafe.
          explanation:
            tag: explanation
            value: If several map values fall inside the circle around a home, they
              must be boiled down to one number. This records how — for example by
              taking the average, or the highest value.
        description: Aggregation method applied within the buffer (mean / max / median
          / area-weighted mean).
        title: Buffer Aggregation Method
        examples:
        - value: area_weighted_mean
          description: area-weighted mean over the aggregation area (ACAG PM2.5 scenario)
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: LinkageMethod
        domain_of:
        - LinkageMethod
        range: BufferAggregationEnum
      linkage_buffer_aggregation_method_missing_reason:
        name: linkage_buffer_aggregation_method_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Separates "not applicable — no buffer aggregation was performed"
              from an undocumented gap; without the reason a null method leaves the
              linkage unauditable.
          explanation:
            tag: explanation
            value: When the how-values-were-combined field is empty, this says why.
        description: Reason `linkage_buffer_aggregation_method` is null.
        title: Reason Buffer Aggregation Is Missing
        examples:
        - value: not_applicable
          description: strategy is point extraction, so no buffer aggregation applies
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: LinkageMethod
        domain_of:
        - LinkageMethod
        range: MissingReasonEnum
      linkage_max_distance_to_station_m:
        name: linkage_max_distance_to_station_m
        annotations:
          tier:
            tag: tier
            value: conditionally_core
          justification:
            tag: justification
            value: For nearest-station strategies this cutoff decides whether a distant
              monitor still counts as "nearby"; beyond it the assignment is meaningless
              and should be null. Without the cutoff, values assigned from stations
              tens of kilometres away are indistinguishable from tight matches, silently
              degrading exposure quality.
          explanation:
            tag: explanation
            value: Some methods take the reading from the closest measuring station.
              This is the farthest a station may be from the home before the match
              is considered too unreliable and no value is assigned.
        description: Maximum distance to a station for nearest-station strategies;
          values beyond this distance get null.
        title: Maximum Distance to Station (Metres)
        examples:
        - value: '50000'
          description: stations farther than 50 km from the residence yield null
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: LinkageMethod
        domain_of:
        - LinkageMethod
        range: float
      linkage_max_distance_to_station_m_missing_reason:
        name: linkage_max_distance_to_station_m_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Distinguishes "not applicable — the data is gridded, not station-based"
              from an undocumented cutoff; a bare null hides whether unlimited-distance
              station matches were allowed.
          explanation:
            tag: explanation
            value: When the maximum-station-distance field is empty, this says why.
        description: Reason `linkage_max_distance_to_station_m` is null.
        title: Reason Station Distance Is Missing
        examples:
        - value: not_applicable
          description: strategy is gridded extraction, not nearest-station
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: LinkageMethod
        domain_of:
        - LinkageMethod
        range: MissingReasonEnum
      geocoding_precision_propagated:
        name: geocoding_precision_propagated
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Geocoding precision determines whether "residence" means the actual
              house or a ZIP-code centroid kilometres away — which changes which grid
              cell the patient falls in and therefore their assigned exposure. Propagating
              it lets analysts filter or down-weight coarsely located records.
          explanation:
            tag: explanation
            value: Geocoding means turning a street address into map coordinates,
              and it does not always land on the exact house — sometimes only on the
              street, the ZIP area, or the city. This records how exact the landing
              was.
        description: Quality category propagated from the upstream geocoder (DeGAUSS
          `precision` column).
        title: Propagated Geocoding Precision
        examples:
        - value: range
          description: street-centerline point interpolated within an address-range
            segment
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://degauss.org/
        owner: LinkageMethod
        domain_of:
        - LinkageMethod
        range: GeocodingPrecisionEnum
      geocoding_score_propagated:
        name: geocoding_score_propagated
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: The score quantifies how confident the geocoder was in its address
              match; without it downstream analysts cannot apply quality cutoffs,
              and poorly matched addresses contaminate the exposure assignment invisibly.
          explanation:
            tag: explanation
            value: When software converts an address into map coordinates it also
              rates its own confidence, from 0 to 1. This carries that rating along
              with the exposure record.
        description: Geocoder score (0-1) propagated from the upstream geocoder so
          the exposure record knows the spatial precision of its anchor.
        title: Propagated Geocoding Score
        examples:
        - value: '0.95'
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://degauss.org/
        owner: LinkageMethod
        domain_of:
        - LinkageMethod
        range: float
      geocoding_score_propagated_missing_reason:
        name: geocoding_score_propagated_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Records whether the score was never produced or was produced but
              dropped by the pipeline — the difference between an upstream limitation
              and a fixable ETL gap.
          explanation:
            tag: explanation
            value: When the geocoder-confidence field is empty, this says why.
        description: Reason `geocoding_score_propagated` is null.
        title: Reason Geocoding Score Is Missing
        examples:
        - value: upstream_data_not_propagated
          description: the geocoder emitted a score but the pipeline dropped it
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: LinkageMethod
        domain_of:
        - LinkageMethod
        range: MissingReasonEnum
      address_period_alignment:
        name: address_period_alignment
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Assuming a single static address smears home-location exposure
              across days the patient was actually elsewhere; how location-over-time
              was modelled changes which days get which values and can bias exposure
              estimates.
          explanation:
            tag: explanation
            value: People move house and travel, so "where the patient was" changes
              over time. This records whether the study used one fixed address, a
              full address history, or accounted for known trips away from home.
        description: How the patient's location-over-time (the spatial axis of trajectory
          resolution) was modelled.
        title: Address Period Alignment
        examples:
        - value: address_history_from_emr
          description: an EMR-sourced address history covers the observation period
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: LinkageMethod
        domain_of:
        - LinkageMethod
        range: AddressPeriodAlignmentEnum
      clinical_date_assignment_convention:
        name: clinical_date_assignment_convention
        annotations:
          tier:
            tag: tier
            value: conditionally_core
          justification:
            tag: justification
            value: If the clinical side collapsed timestamps to dates with a different
              day-boundary rule than the exposure side, events near midnight are silently
              joined to the wrong day's exposure; recording both rules is what makes
              that mismatch detectable at all.
          explanation:
            tag: explanation
            value: A hospital visit at 11 pm can count as "today" or "tomorrow" depending
              on which clock and cutoff you use. This records the rule the clinical
              data used to turn a timestamp into a calendar date.
        description: 'The clinical-side mirror of `day_boundary_convention` (envar_temporal):
          which timezone / day-boundary rule collapsed the clinical timestamp to the
          date used in the join. A boundary mismatch between this and the exposure-side
          `day_boundary_convention` silently misattributes boundary-hour events to
          the wrong day, which is what makes the Core `day_boundary_convention` checkable
          at all. Metadata *about the join* — never the clinical timestamp itself;
          carries no PHI.'
        title: Clinical Date Assignment Convention
        examples:
        - value: local_midnight
          description: matches the exposure-side day_boundary_convention (Daymet tmax
            scenario)
        - value: date_only_no_time
          description: clinical record carried only a date, so no boundary rule applies
            (ACAG PM2.5 scenario)
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: LinkageMethod
        domain_of:
        - LinkageMethod
        range: ClinicalDateAssignmentEnum
      clinical_date_assignment_convention_missing_reason:
        name: clinical_date_assignment_convention_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Distinguishes a convention that is undocumented at the source from
              one the pipeline has not yet extracted — which determines whether the
              day-boundary cross-check can ever be completed.
          explanation:
            tag: explanation
            value: When the clinical date-rule field is empty, this says why.
        description: Reason `clinical_date_assignment_convention` is null.
        title: Reason Date Convention Is Missing
        examples:
        - value: available_but_not_extracted
          description: the clinical system documents its convention but the pipeline
            does not yet surface it
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: LinkageMethod
        domain_of:
        - LinkageMethod
        range: MissingReasonEnum
      partial_day_attribution_rule:
        name: partial_day_attribution_rule
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: On a transition day the patient is in two places; whether that
              day is credited to the origin, the destination, both, or excluded changes
              which exposure value the day receives, and an undocumented rule makes
              the linkage irreproducible.
          explanation:
            tag: explanation
            value: If someone leaves on a trip mid-day, which place's environment
              "counts" for that day? This records the choice — the place they left,
              the place they arrived, both, or neither.
        description: How boundary / transition days of the patient's trajectory (trip
          start / end, travel days) are attributed when location changes within a
          day. The temporal partner to the `known_travel_interval` address alignment.
        title: Partial-Day Attribution Rule
        examples:
        - value: not_applicable
          description: no trajectory transitions occur in the observation period
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: LinkageMethod
        domain_of:
        - LinkageMethod
        range: PartialDayAttributionEnum
      partial_day_attribution_rule_missing_reason:
        name: partial_day_attribution_rule_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Separates "not applicable — the patient never changed location"
              from an undocumented handling of travel days; without it a null rule
              cannot be audited.
          explanation:
            tag: explanation
            value: When the travel-day rule field is empty, this says why.
        description: Reason `partial_day_attribution_rule` is null.
        title: Reason Attribution Rule Is Missing
        examples:
        - value: not_provided_by_source
          description: the trajectory source does not document transition-day handling
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: LinkageMethod
        domain_of:
        - LinkageMethod
        range: MissingReasonEnum
      lag_alignment_applied:
        name: lag_alignment_applied
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: If values were already shifted relative to the clinical event and
              this is not recorded, an analyst may apply the lag again — double-lagging
              is a silent analytic error that misdates every exposure.
          explanation:
            tag: explanation
            value: Health effects can trail exposure by days — a heat wave today may
              send someone to hospital next week — so analyses sometimes pair a clinical
              event with earlier exposure values. This records whether such a shift
              was already built into the data.
        description: 'Whether and how values were lag-aligned to a clinical event.
          Relocated from envar_temporal: lag alignment attaches a value to an event
          (a linkage concern), not an intrinsic temporal property. See `lag_alignment_specifier`
          for the concrete lag value(s).'
        title: Lag Alignment Applied
        examples:
        - value: none
          description: values are at native dates; no lag alignment applied
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://cran.r-project.org/package=dlnm
        owner: LinkageMethod
        domain_of:
        - LinkageMethod
        range: LagAlignmentEnum
      lag_alignment_specifier:
        name: lag_alignment_specifier
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Knowing that a lag was applied is useless without the concrete
              value(s); a 3-day lag and a distributed lag over 0-21 days define entirely
              different exposure windows and cannot be reconstructed after the fact.
          explanation:
            tag: explanation
            value: This spells out exactly how many days the exposure values were
              shifted relative to the clinical event — for example 3 days, or a whole
              range like 0 to 21 days.
        description: Free-form specifier paired with `lag_alignment_applied` to capture
          the concrete lag values (e.g. `"3"` for a 3-day lag, or `"0-21"` for a distributed
          lag from 0 to 21 days). Empty when `lag_alignment_applied` = `none`.
        title: Lag Alignment Specifier
        examples:
        - value: 0-3
          description: distributed lag from 0 to 3 days before the clinical event
            (with lag_alignment_applied = distributed_lag)
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: LinkageMethod
        domain_of:
        - LinkageMethod
        range: string
      lag_alignment_applied_missing_reason:
        name: lag_alignment_applied_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Records why the lag-alignment status is unknown; without it analysts
              cannot tell whether the data is safely unlagged or the documentation
              simply has not caught up, leaving the double-lagging risk open.
          explanation:
            tag: explanation
            value: When the lag field is empty, this says why — for example because
              the documentation is still being written.
        description: Reason `lag_alignment_applied` is null.
        title: Reason Lag Alignment Is Missing
        examples:
        - value: under_investigation
          description: lag-alignment documentation for this ETL is still being populated
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: LinkageMethod
        domain_of:
        - LinkageMethod
        range: MissingReasonEnum
  ToolRun:
    name: ToolRun
    annotations:
      domain_of_use:
        tag: domain_of_use
        value: environmental_exposure
    description: 'A single tool invocation that produced an output from one or more
      inputs: tool name and version, container image (where applicable), arguments,
      environment, run timestamp and duration, input / output hashes and row counts,
      and an optional log excerpt.'
    title: Tool Run
    from_schema: https://w3id.org/linkml/microschemas/envar
    see_also:
    - https://www.w3.org/TR/prov-o/
    slots:
    - tool_name
    - tool_version
    - tool_description
    - container_image_repository
    - container_image_repository_missing_reason
    - container_image_digest
    - container_image_digest_missing_reason
    - run_arguments
    - run_timestamp_utc
    - run_duration_seconds
    - run_environment
    - input_file_sha256
    - input_row_count
    - output_file_sha256
    - output_row_count
    - run_log_excerpt
    - run_log_excerpt_missing_reason
    slot_usage:
      tool_name:
        name: tool_name
        required: true
      tool_version:
        name: tool_version
        required: true
    attributes:
      tool_name:
        name: tool_name
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: Without the tool name, a consumer cannot tell which piece of software
              produced the value, so the run cannot be re-executed and the tool's
              known behaviours and biases cannot be looked up. It is the entry point
              for every reproducibility check on the run.
          explanation:
            tag: explanation
            value: This simply records which program was used — like noting the make
              and model of an appliance before describing its settings. Everything
              else about the run only makes sense once you know what tool ran.
        description: Tool name, e.g. `daymet`, `narr`, `pm`, `amadeus`, `geocoder`.
        title: Tool Name
        examples:
        - value: daymet
          description: DeGAUSS Daymet extraction tool
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://degauss.org/
        owner: ToolRun
        domain_of:
        - ToolRun
        range: string
        required: true
      tool_version:
        name: tool_version
        annotations:
          tier:
            tag: tier
            value: core
          justification:
            tag: justification
            value: Two versions of the same tool can produce different outputs from
              identical inputs, so "we ran daymet" without a version is not reproducible.
              It is mandatory because it is the cheapest and most decisive reproducibility
              anchor after the tool name.
          explanation:
            tag: explanation
            value: Software changes over time, and a version number labels one specific
              edition of it — like the edition of a book. Recording it says exactly
              which edition of the tool did the work.
        description: Semver tool version. Mandatory.
        title: Tool Version
        examples:
        - value: 1.0.0
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://semver.org/
        owner: ToolRun
        domain_of:
        - ToolRun
        range: string
        required: true
      tool_description:
        name: tool_description
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: A one-line description lets a reader understand what the tool does
              without leaving the record or resolving the tool name against external
              documentation. Omitting it costs readability, not reproducibility.
          explanation:
            tag: explanation
            value: A short plain-language note on the tool's job, for example "extracts
              daily temperature for a list of addresses". It saves the reader a lookup
              elsewhere.
        description: One-line tool description (from the tool's `dht` env var or equivalent).
        title: Tool Description
        examples:
        - value: DeGAUSS Daymet extraction container
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://degauss.org/
        owner: ToolRun
        domain_of:
        - ToolRun
        range: string
      container_image_repository:
        name: container_image_repository
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: The repository says where the packaged software lives, so anyone
              can pull the same container and re-run the step. Without it the image
              digest has nothing to be resolved against, and re-execution requires
              guessing where the tool came from.
          explanation:
            tag: explanation
            value: Containers are self-contained software bundles, and the repository
              is the public shelf address where a bundle is published — effectively
              the download location of the exact software package used.
        description: Container image repository, e.g. `ghcr.io/degauss-org/daymet`.
          Null for non-containerised tools.
        title: Container Image Repository
        examples:
        - value: ghcr.io/degauss-org/daymet
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://degauss.org/
        owner: ToolRun
        domain_of:
        - ToolRun
        range: string
      container_image_repository_missing_reason:
        name: container_image_repository_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: A blank repository is ambiguous — it could mean "the tool is not
              containerised" or "we forgot to record it". Stating the reason turns
              a silent gap into checkable information; a blank is a bug, a null-with-reason
              is information.
          explanation:
            tag: explanation
            value: When the repository field is deliberately empty, this note says
              why — for example, the tool simply was not run inside a container. An
              explained blank can be trusted; an unexplained one is a question mark.
        description: Reason `container_image_repository` is null.
        title: Reason Image Repository Is Missing
        examples:
        - value: not_applicable
          description: e.g. the tool is not containerised
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: ToolRun
        domain_of:
        - ToolRun
        range: MissingReasonEnum
      container_image_digest:
        name: container_image_digest
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: Image tags are mutable, so "same tag" does not mean same code;
              only the digest pins the exact bytes that ran. It is the strongest reproducibility
              anchor available for a containerised run.
          explanation:
            tag: explanation
            value: A digest is an exact serial number for the software bundle actually
              used — stronger than a version label, which can be reused for different
              contents. If the bundle changes at all, the serial number changes.
        description: SHA256 of the container image actually used (not just the tag).
          Reproducibility-critical.
        title: Container Image Digest
        examples:
        - value: sha256:a8b3c2d1e0f9...
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://github.com/opencontainers/image-spec
        owner: ToolRun
        domain_of:
        - ToolRun
        range: string
      container_image_digest_missing_reason:
        name: container_image_digest_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Without a stated reason, a missing digest is indistinguishable
              from a pipeline bug; with one (e.g. the runner never resolved the tag)
              the gap is auditable and fixable rather than silent.
          explanation:
            tag: explanation
            value: This note explains why the software bundle's exact serial number
              was not recorded — often the runner only kept the human-friendly version
              label and never looked up the precise identifier behind it.
        description: Reason `container_image_digest` is null.
        title: Reason Image Digest Is Missing
        examples:
        - value: available_but_not_extracted
          description: e.g. the runner did not resolve the tag to a digest
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: ToolRun
        domain_of:
        - ToolRun
        range: MissingReasonEnum
      run_arguments:
        name: run_arguments
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: The same tool run with different arguments produces different outputs;
              without the exact argument map, re-running the tool reproduces the tool,
              not the result. Recording it verbatim removes all guesswork about settings.
          explanation:
            tag: explanation
            value: These are the settings the program was started with — like the
              knob positions on a machine. Writing them down means someone else can
              set the knobs identically before pressing start.
        description: The exact argument map passed at invocation, serialised as a
          JSON string.
        title: Run Arguments
        examples:
        - value: '{"variables": "tmax"}'
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: ToolRun
        domain_of:
        - ToolRun
        range: string
      run_timestamp_utc:
        name: run_timestamp_utc
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: The timestamp orders runs within the provenance chain and lets
              auditors match the record against external logs and the state of upstream
              data sources at that moment. Without it, "which run produced this file"
              can become undecidable.
          explanation:
            tag: explanation
            value: Simply when the program started, expressed on a single worldwide
              clock (UTC) so that times recorded on different machines in different
              time zones line up.
        description: When the run started (UTC).
        title: Run Timestamp (UTC)
        examples:
        - value: '2026-05-23T14:18:42Z'
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://www.w3.org/TR/prov-o/
        owner: ToolRun
        domain_of:
        - ToolRun
        range: datetime
      run_duration_seconds:
        name: run_duration_seconds
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Duration is a cheap sanity signal — a step that normally takes
              an hour finishing in two seconds hints at silent failure or truncated
              input. Omitting it loses a diagnostic, not reproducibility.
          explanation:
            tag: explanation
            value: How long the program ran, in seconds. A wildly unusual run time
              is often the first clue that something went wrong even when the tool
              reported success.
        description: How long the run took, in seconds.
        title: Run Duration (Seconds)
        examples:
        - value: '37'
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: ToolRun
        domain_of:
        - ToolRun
        range: float
      run_environment:
        name: run_environment
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Library and runtime versions can change numeric results even when
              the tool version is fixed; recording the environment explains otherwise-mysterious
              differences between re-runs. For non-containerised tools it is the only
              record of the software stack.
          explanation:
            tag: explanation
            value: A snapshot of the computer setup around the tool — operating system,
              language versions, key libraries. Like noting the oven and altitude
              alongside a recipe, because the surroundings can change the outcome.
        description: Host OS, Docker / podman version, R / Python version, key library
          versions, as a native key/value object.
        title: Run Environment
        examples:
        - object:
            os: Ubuntu 22.04
            container_runtime: docker 24.0.7
            r_version: 4.3.1
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: ToolRun
        domain_of:
        - ToolRun
        range: AnyValue
        inlined: true
      input_file_sha256:
        name: input_file_sha256
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: The input hash lets anyone verify they are re-running on byte-identical
              inputs; without it, a "reproduction" may quietly use different data,
              and disagreements can no longer be traced to inputs versus code.
          explanation:
            tag: explanation
            value: A SHA-256 hash is a fingerprint of a file — if even one byte changes,
              the fingerprint changes completely. Comparing fingerprints proves two
              files are exactly the same without inspecting their contents.
        description: SHA256 of the input file (CSV / parquet).
        title: Input File SHA-256 Hash
        examples:
        - value: 9f8e7d6c5b4a...
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://doi.org/10.6028/NIST.FIPS.180-4
        owner: ToolRun
        domain_of:
        - ToolRun
        range: string
      input_row_count:
        name: input_row_count
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: The row count is a coarse but instant integrity check — a truncated
              or partially delivered input shows up immediately as the wrong count.
              It also anchors the input side of input/output cardinality checks.
          explanation:
            tag: explanation
            value: Just the number of lines of data that went in. If you expected
              3 addresses and the count says 2, something was lost before the tool
              ever ran.
        description: Number of rows in the input.
        title: Input Row Count
        examples:
        - value: '3'
          description: one row per cohort address
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: ToolRun
        domain_of:
        - ToolRun
        range: integer
      output_file_sha256:
        name: output_file_sha256
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: The output hash proves the companion data file is the one this
              metadata describes; without it, a swapped or regenerated file can silently
              detach the values from their provenance.
          explanation:
            tag: explanation
            value: A fingerprint of the result file — change one byte and the fingerprint
              changes. It ties this metadata record to exactly one version of the
              data it describes.
        description: SHA256 of the output file (CSV / parquet).
        title: Output File SHA-256 Hash
        examples:
        - value: 1c2d3e4f5a6b...
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://doi.org/10.6028/NIST.FIPS.180-4
        owner: ToolRun
        domain_of:
        - ToolRun
        range: string
      output_row_count:
        name: output_row_count
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: The expected output cardinality (e.g. 3 subjects × 153 days = 459
              rows) is checkable at a glance; a mismatch flags dropped subjects or
              dates before any analysis runs on the data.
          explanation:
            tag: explanation
            value: The number of lines of data produced. Outputs often have a predictable
              size, so a wrong count is an early warning that rows went missing along
              the way.
        description: Number of rows in the output.
        title: Output Row Count
        examples:
        - value: '459'
          description: 3 subjects × 153 days
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: ToolRun
        domain_of:
        - ToolRun
        range: integer
      run_log_excerpt:
        name: run_log_excerpt
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: The log tail captures warnings and error summaries that no structured
              field carries; without it, diagnosing a suspect run means hunting for
              logs that may no longer exist. Omission costs auditability, not reproducibility.
          explanation:
            tag: explanation
            value: The last few lines the program printed while running — its own
              account of what it did and whether anything looked wrong. Keeping a
              snippet is like stapling the receipt to the record.
        description: Last ~50 lines of the run log, where useful for debugging or
          audit.
        title: Run Log Excerpt
        examples:
        - value: '[2026-05-23 14:19:19] daymet 1.0.0 finished: wrote 459 rows to /output/tmax.csv
            (0 errors, 0 warnings)'
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: ToolRun
        domain_of:
        - ToolRun
        range: string
      run_log_excerpt_missing_reason:
        name: run_log_excerpt_missing_reason
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Stating why the log excerpt is absent (e.g. logs exist on the runner
              but are not captured) distinguishes a deliberate omission from data
              loss and tells auditors where to look. A blank is a bug; a null-with-reason
              is information.
          explanation:
            tag: explanation
            value: A note explaining why no log snippet is attached — often the logs
              live on the machine that ran the job and were simply never copied into
              the record.
        description: Reason `run_log_excerpt` is null.
        title: Reason Log Excerpt Is Missing
        examples:
        - value: available_but_not_extracted
          description: e.g. logs exist on the runner but are not captured by the pipeline
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: ToolRun
        domain_of:
        - ToolRun
        range: MissingReasonEnum
    class_uri: prov:Activity
  ProvenanceChain:
    name: ProvenanceChain
    annotations:
      domain_of_use:
        tag: domain_of_use
        value: environmental_exposure
    description: The ordered list of all upstream `ToolRun`s whose outputs were inputs
      to this run, terminating in a typed root. Patterned after W3C PROV (`prov:wasDerivedFrom`,
      `prov:wasGeneratedBy`).
    title: Provenance Chain
    from_schema: https://w3id.org/linkml/microschemas/envar
    see_also:
    - https://www.w3.org/TR/prov-o/
    - https://www.w3.org/TR/prov-primer/
    slots:
    - provenance_chain_steps
    - provenance_chain_terminus_type
    - chain_compatibility_assertions
    attributes:
      provenance_chain_steps:
        name: provenance_chain_steps
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: A value like a daily temperature is usually the end of several
              runs (geocode, then extract); without the ordered steps a consumer can
              verify only the last hop, and any upstream error is invisible. The chain
              lets anyone walk the full derivation back to its root.
          explanation:
            tag: explanation
            value: A step-by-step history of every program run that led to this data,
              oldest first — like a parcel's tracking history showing each station
              it passed through on the way to you.
        description: Ordered list of upstream `ToolRun`s, from oldest to most recent,
          whose outputs were inputs to this run.
        title: Provenance Chain Steps
        examples:
        - description: a single upstream geocoding step preceding the daymet run
          object:
            tool_name: geocoder
            tool_version: 3.3.0
            run_timestamp_utc: '2026-05-23T14:02:11Z'
            output_file_sha256: 5b6c7d8e9f0a...
        from_schema: https://w3id.org/linkml/microschemas/envar
        see_also:
        - https://www.w3.org/TR/prov-o/
        owner: ProvenanceChain
        domain_of:
        - ProvenanceChain
        range: ToolRun
        multivalued: true
        inlined: true
        inlined_as_list: true
      provenance_chain_terminus_type:
        name: provenance_chain_terminus_type
        annotations:
          tier:
            tag: tier
            value: recommended
          justification:
            tag: justification
            value: A chain that just stops is unverifiable — stating whether it ends
              at a raw source download, synthetic data, or a pre-existing curated
              dataset tells consumers what kind of trust the root deserves, and makes
              the no-orphaned-steps validation rule checkable.
          explanation:
            tag: explanation
            value: This says what the very first link of the history is — freshly
              downloaded raw data, simulated data, or an existing curated dataset.
              Different starting points deserve different levels of scrutiny.
        description: The kind of root of the chain.
        title: Provenance Chain Terminus Type
        examples:
        - value: raw_source_download
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: ProvenanceChain
        domain_of:
        - ProvenanceChain
        range: ProvenanceChainTerminusEnum
      chain_compatibility_assertions:
        name: chain_compatibility_assertions
        annotations:
          tier:
            tag: tier
            value: optional
          justification:
            tag: justification
            value: Version bumps in one chain step can silently break the assumptions
              of the next (e.g. a changed output column schema); explicit compatibility
              declarations make such mismatches machine-checkable in strict mode instead
              of surfacing later as wrong values.
          explanation:
            tag: explanation
            value: These are notes saying "step B was built to accept what step A
              produces" — like declaring that a plug and a socket follow the same
              standard, so a checker can catch mismatched pairs automatically.
        description: Declarations that two chain steps are compatible (e.g. `daymet@1.0.0`
          expects `geocoder@>=3.0.0` output column schema). Optional but enables strict-mode
          validation.
        title: Chain Compatibility Assertions
        examples:
        - object: daymet@1.0.0 expects geocoder@>=3.0.0 output column schema
        from_schema: https://w3id.org/linkml/microschemas/envar
        owner: ProvenanceChain
        domain_of:
        - ProvenanceChain
        range: string
        multivalued: true
    class_uri: prov:Bundle
  DerivedHeatMetric:
    name: DerivedHeatMetric
    annotations:
      domain_of_use:
        tag: domain_of_use
        value: environmental_exposure
    description: 'Methodology slots specific to derived heat metrics (WBGT, Heat Index,
      UTCI, apparent temperature, heat-wave flag, etc.). Captures the decisions that
      the heat-epidemiology literature flags as critical sources of cross-study disagreement:
      which equation variant, which indoor / outdoor regime, which solar-radiation
      input, and -- for percentile-based metrics -- the reference period, scope, and
      seasonal window. One per record where applicable.'
    title: Derived Heat Metric
    from_schema: https://w3id.org/linkml/microschemas/envar
    see_also:
    - https://en.wikipedia.org/wiki/Wet-bulb_globe_temperature
    - https://www.weather.gov/safety/heat-index
    - http://www.utci.org/
    slots:
    - heat_metric_family
    - equation_variant
    - equation_variant_missing_reason
    - equation_inputs
