id: https://w3id.org/linkml/microschemas/envar/common
name: envar-common
title: EnVar Microschemas — Common Types
version: "0.1.0"
description: |-
  Shared enums and slots used across the EnVar microschemas.
  Pulls in the LinkML Microschema Profile (MicroschemaDefinition,
  ValueMicroschemaDefinition, Quantity, CodedValue, …) so downstream modules
  can compose against a common base.
license: Apache-2.0

prefixes:
  envar: https://w3id.org/linkml/microschemas/envar/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  xsd: http://www.w3.org/2001/XMLSchema#
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  CF: http://vocab.nerc.ac.uk/standard_name/
  UCUM: https://ucum.org/
  ECTO: http://purl.obolibrary.org/obo/ECTO_
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  LOINC: https://loinc.org/
  SNOMED: http://snomed.info/id/
  SPDX: https://spdx.org/licenses/
  EPSG: https://epsg.io/
default_prefix: envar
default_range: string

imports:
- linkml:types
- https://raw.githubusercontent.com/linkml/linkml-microschema-profile/v0.3.0/src/linkml_microschema_profile/schema/linkml_microschema_profile

#────────────────────────────────────────────────────────────────
# SHARED CLASSES
#────────────────────────────────────────────────────────────────

classes:

  AnyValue:
    title: Any Value
    class_uri: linkml:Any
    description: >-
      An arbitrary passthrough object (open-ended key/value map) whose keys are
      not fixed by this schema — e.g. ACDD global attributes or a run-environment
      map. Lets such payloads be carried as native objects rather than opaque
      JSON strings.
    see_also:
    - https://wiki.esipfed.org/Attribute_Convention_for_Data_Discovery_1-3

#────────────────────────────────────────────────────────────────
# SHARED SLOTS
#────────────────────────────────────────────────────────────────

slots:

  schema_version:
    title: Schema Version
    range: string
    description: >-
      The version of the EnVar micro-schema this document conforms to. Required
      on every sidecar so downstream consumers can branch on schema evolution.
    examples:
    - value: "0.1"
    see_also:
    - https://semver.org/
    required: true

    annotations:
      tier: core
      justification: >-
        Downstream consumers must branch on schema evolution: a parser built
        for one version will silently misread or wrongly reject sidecars
        written against another. Without this slot there is no way to tell
        which iteration of the schema a document targets.
      explanation: >-
        Schemas change over time, like editions of a paper form. This is the
        edition number stamped on the document, so anyone reading it knows
        exactly which version of the form was filled in and can interpret
        the fields accordingly.
  provenance_id:
    title: Record Identifier
    range: string
    description: >-
      Stable identifier for this sidecar / record (ULID recommended). This is
      the value the downstream health-data layer's source-value field carries
      to link a row back to its provenance (for OMOP, that field is
      `external_exposure.exposure_source_value`).
    examples:
    - value: 01HFA7K8R3M6XP-daymet-deposit
      description: ULID-based sidecar identifier for the Daymet Tmax deposit
    see_also:
    - https://github.com/ulid/spec
    - https://ohdsi.github.io/CommonDataModel/
    required: true

    annotations:
      tier: core
      justification: >-
        This identifier is what the downstream health-data layer's
        source-value field carries (for OMOP,
        `external_exposure.exposure_source_value`); it is the only hook that
        links an exposure value in the health layer back to its full
        spatial, temporal, and model provenance. Omit it and the value
        becomes untraceable — its metadata can never be recovered.
      explanation: >-
        A unique serial number for this metadata document, like the tracking
        number on a parcel. Wherever the data value ends up, that number
        lets you look up exactly where it came from and how it was made.
  phi_status:
    title: PHI Status
    range: PhiStatusEnum
    description: >-
      Whether the sidecar carries any Protected Health Information. A
      record-level safety assertion; by design, sidecars are PHI-free.
    examples:
    - value: no_phi
    see_also:
    - https://www.hhs.gov/hipaa/for-professionals/privacy/index.html
    required: true

    annotations:
      tier: core
      justification: >-
        Sidecars are designed to be PHI-free, and this slot is the explicit
        machine-readable assertion of that. Without it, every sharing,
        deposit, or export step must treat the document as potentially
        containing patient data and re-review it manually before it can
        leave a protected environment.
      explanation: >-
        PHI (protected health information) means private medical details
        about an identifiable person. This flag is a written promise on the
        document saying "no private patient information inside", so it can
        be passed around and published safely.
  missing_reason:
    title: Reason Value Is Missing
    range: MissingReasonEnum
    description: >-
      Controlled reason a nullable slot is null. Every nullable slot in the
      EnVar schemas should be paired with a *_missing_reason slot taking this
      range. CF-Conventions "missing_value with reason" pattern lifted to the
      metadata layer.
    examples:
    - value: not_provided_by_source
      description: the source product genuinely does not produce this information
    see_also:
    - https://cfconventions.org/
    annotations:
      tier: optional
      justification: >-
        An unexplained empty field is ambiguous: it could be a terminal gap
        in the source product, a fixable extraction gap, or a pipeline bug
        that dropped data. Recording the reason lets completeness checkers
        and roadmap planning tell these apart instead of treating every
        blank as equally hopeless.
      explanation: >-
        When a box on a form is left empty, it helps to know why — was the
        question not applicable, did nobody ask it, or did the answer get
        lost on the way? This slot records that "why" instead of leaving a
        silent blank.

#────────────────────────────────────────────────────────────────
# SHARED ENUMS
#────────────────────────────────────────────────────────────────

enums:

  MissingReasonEnum:
    title: Missing-Value Reason
    description: >-
      Controlled reasons that a slot value is missing. Distinguishes a slot
      the source genuinely does not produce (terminal) from one we could
      extract but did not (roadmap) from a bug in the chain.
    permissible_values:
      not_provided_by_source:
        description: Source product does not produce this information. Terminal.
      available_but_not_extracted:
        description: >-
          Source produces this information but the current pipeline does not
          surface it. Roadmap item.
      upstream_data_not_propagated:
        description: >-
          An upstream tool emitted this information but the current pipeline
          dropped it on the way through. Bug.
      under_investigation:
        description: We are working on populating this slot.
      not_applicable:
        description: This slot does not apply to this variable / record.

  DataTypeEnum:
    title: Value Data Type
    description: The data type of an exposure value.
    permissible_values:
      continuous_numeric:
        description: Continuous numeric value (e.g. temperature in °C).
      categorical:
        description: Categorical value (e.g. land-use class).
      binary_flag:
        description: Binary flag (e.g. extreme-heat-day yes/no).
      count:
        description: Integer count (e.g. consecutive heat days).
      event_marker:
        description: Date-stamped event (e.g. wildfire smoke plume).

  PhiStatusEnum:
    title: PHI Status
    description: PHI content of the sidecar.
    permissible_values:
      no_phi:
        description: The sidecar carries no PHI.
      aggregated_no_phi:
        description: The sidecar carries aggregated values with no PHI.
      phi_present:
        description: >-
          The sidecar carries PHI. Should never happen; sidecars are by
          design PHI-free.

  ConceptStatusEnum:
    title: Concept Status
    description: >-
      Status of a variable's representation in the target health-data
      vocabulary named by `target_concept_vocabulary` (e.g. the OHDSI
      Standardised Vocabulary, the BioData Catalyst model). `existing` = a
      concept id is available now; `proposed` = a submission is in flight;
      `gap` = no concept exists and none is proposed.
    see_also:
    - https://athena.ohdsi.org/
    - https://biodatacatalyst.nhlbi.nih.gov/
    permissible_values:
      existing:
        description: A concept id is available in the target vocabulary.
      proposed:
        description: A concept submission is in flight.
      gap:
        description: No concept exists yet and none is yet proposed.
