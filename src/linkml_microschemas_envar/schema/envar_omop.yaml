---
id: https://w3id.org/linkml/microschemas/envar/omop
name: envar-omop
title: EnVar Microschemas — OMOP Linkage and FAIR Deposit
version: "0.1.0"
description: |-
  OMOP / BDC linkage hooks and FAIR deposit-time slots. Covers §12 and §13
  of envar-heat-scenario-requirements.md.
license: Apache-2.0

prefixes:
  envar: https://w3id.org/linkml/microschemas/envar/
  linkml: https://w3id.org/linkml/
  SPDX: https://spdx.org/licenses/
default_prefix: envar
default_range: string

imports:
  - linkml:types
  - envar_common

#────────────────────────────────────────────────────────────────
# CLASSES
#────────────────────────────────────────────────────────────────

classes:

  OmopLinkage:
    description: >-
      Hooks the sidecar uses to interface with OMOP (or BDC, or another)
      health-data layer. These are *not* clinical metadata — they are the
      hooks the exposure record needs to be findable from the health side.
      One per record.
    annotations:
      domain_of_use: environmental_exposure
    slots:
      - omop_external_exposure_link_field
      - bdc_link_field
      - bdc_link_field_missing_reason
      - cohort_size_anchored
      - cohort_size_anchored_missing_reason
      - phi_status
    slot_usage:
      omop_external_exposure_link_field:
        required: true
      phi_status:
        required: true

  DepositMetadata:
    description: >-
      Deposit-time slots required when the sidecar travels alongside a
      published FAIR object (Zenodo / Dryad / C-HER / etc.). Most slots are
      pulled from other modules; this class names the required-for-deposit
      subset and adds a few deposit-specific slots.
    annotations:
      domain_of_use: environmental_exposure
    slots:
      - deposit_doi
      - deposit_doi_missing_reason
      - deposit_repository
      - deposit_repository_missing_reason
      - deposit_license_spdx
      - deposit_redistribution_constraints_inherited
      - recommended_citation
      - dcat_distribution_url
      - dcat_distribution_url_missing_reason

#────────────────────────────────────────────────────────────────
# SLOTS
#────────────────────────────────────────────────────────────────

slots:

  omop_external_exposure_link_field:
    range: string
    description: >-
      Name of the OMOP field carrying `provenance_id`. Default
      `exposure_source_value`.

  bdc_link_field:
    range: string
    description: BDC equivalent of `omop_external_exposure_link_field`.

  bdc_link_field_missing_reason:
    range: MissingReasonEnum
    description: Reason `bdc_link_field` is null.

  cohort_size_anchored:
    range: integer
    description: >-
      Number of distinct persons this exposure record was extracted for.
      Helps downstream estimate the volume of OMOP rows the sidecar
      describes.

  cohort_size_anchored_missing_reason:
    range: MissingReasonEnum
    description: Reason `cohort_size_anchored` is null.

  phi_status:
    range: PhiStatusEnum
    description: >-
      Whether the sidecar carries any Protected Health Information. By
      design, sidecars are PHI-free.

  deposit_doi:
    range: string
    description: >-
      DOI assigned by the deposit repository (e.g. Zenodo).

  deposit_doi_missing_reason:
    range: MissingReasonEnum
    description: Reason `deposit_doi` is null (e.g. pre-deposit).

  deposit_repository:
    range: DepositRepositoryEnum
    description: Repository hosting the deposit.

  deposit_repository_missing_reason:
    range: MissingReasonEnum
    description: Reason `deposit_repository` is null.

  deposit_license_spdx:
    range: string
    description: >-
      SPDX identifier of the license under which the *derived* exposure
      record (not the source) is published.

  deposit_redistribution_constraints_inherited:
    range: string
    multivalued: true
    description: >-
      Constraints from any input source that pass through to the deposit.

  recommended_citation:
    range: string
    description: >-
      One-line recommended citation derived from the slots above.

  dcat_distribution_url:
    range: uri
    description: >-
      DCAT-compatible distribution URL for catalogue integration.

  dcat_distribution_url_missing_reason:
    range: MissingReasonEnum
    description: Reason `dcat_distribution_url` is null.

#────────────────────────────────────────────────────────────────
# ENUMS
#────────────────────────────────────────────────────────────────

enums:

  PhiStatusEnum:
    description: PHI content of the sidecar.
    permissible_values:
      no_phi:
        description: The sidecar carries no PHI.
      aggregated_no_phi:
        description: The sidecar carries aggregated values with no PHI.
      phi_present:
        description: >-
          The sidecar carries PHI. Should never happen; sidecars are by
          design PHI-free.

  DepositRepositoryEnum:
    description: Repository hosting a FAIR deposit.
    permissible_values:
      zenodo:
        description: Zenodo.
      dryad:
        description: Dryad.
      figshare:
        description: Figshare.
      c-her:
        description: ORNL C-HER (Centralized Health and Exposomic Resource).
      osf:
        description: Open Science Framework.
